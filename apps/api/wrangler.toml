name = "nlqdb-api"
main = "src/index.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# `workers_dev = true` is REQUIRED for Workers-Versions previews
# (`SK-AUTH-014`). Wrangler defaults `workers_dev` to `false` when
# `[[routes]]` are present, which leaves the `*.workers.dev`
# subdomain unprovisioned — and `wrangler versions upload` then
# can't return a `preview_url`, so `scripts/extract-wrangler-preview-url.sh`
# correctly degrades to "see dashboard" and the PR preview comment
# loses its clickable URL. Setting this to `true` exposes
# `nlqdb-api.<account>.workers.dev` alongside the `app.nlqdb.com`
# custom domain. Safe for an API surface — OAuth callbacks are pinned
# to `app.nlqdb.com` (`SK-AUTH-008`) and APIs don't have the SEO-
# duplication concern that gates `workers_dev` for `apps/web`.
#
# MUST stay above any `[[table]]` headers — TOML scopes bare keys to
# the most recent table header, so misplacing this line below e.g.
# `[[r2_buckets]]` makes wrangler reject it as "Unexpected fields
# found in r2_buckets[0]".
workers_dev = true

[observability]
enabled = true

# Scheduled triggers. Dispatch on `controller.cron` in `scheduled()`
# in `src/index.ts`:
#
# • `0 4 * * *` — W5 daily workload-analyser (`SK-MIGRATE-001`). 04:00
#   UTC sits in the cross-region quiet window between US/EU traffic
#   peaks. The handler ack-and-skips when `TINYBIRD_TOKEN` is unset
#   (matches `SK-EVENTS-005`'s unconfigured sink posture).
#
# • `*/4 13-21 * * 1-5` — Neon keep-warm (`SK-HDC-014`). Every 4 minutes
#   on weekdays, 13:00–21:00 UTC (EU afternoon + US morning). One
#   `SELECT 1` per fire keeps the Free-tier compute warm — see
#   `SK-HDC-014` for the 100 CU-h/month budget math. Sub-minute interval
#   isn't supported by Cloudflare Cron Triggers; 4 min is the smallest
#   value strictly under Neon's 5-min auto-suspend.
#
# • `0 6 * * 1` — ICP pipeline: Monday 06:00 UTC. Scrapes HN Algolia,
#   Reddit, and GitHub Issues (when GH_TOKEN set); scores with Groq →
#   Gemini; clusters into themes; writes evidence file to GitHub.
[triggers]
crons = ["0 4 * * *", "*/4 13-21 * * 1-5", "0 6 * * 1"]

# Public, non-secret config. NODE_ENV switches Better Auth between the
# `OAUTH_GITHUB_*` (prod) and `OAUTH_GITHUB_*_DEV` (Wrangler dev) credential
# pairs at module load (apps/api/src/auth.ts). `wrangler dev` overrides this
# to "development" via .dev.vars (gitignored; copy from .dev.vars.example).
[vars]
NODE_ENV = "production"

# Resources provisioned by `scripts/provision-cf-resources.sh`. The
# script fills in resolved IDs idempotently — IDs are public identifiers
# (account-scoped), not secrets, and are committed for deterministic
# `wrangler dev` + CI builds.
#
# R2 service requires a one-time opt-in click on the Cloudflare dashboard
# (account → R2 → Get Started). Once enabled, the provisioning script
# creates `nlqdb-assets` idempotently. The webhook handler at
# `/v1/stripe/webhook` writes raw event payloads here for audit/replay.

[[kv_namespaces]]
binding = "KV"
id = "5b086b03ead54f508271f31fc421bbaa"

[[d1_databases]]
binding = "DB"
database_name = "nlqdb-app"
database_id = "98767eb0-65df-4787-87bf-c3952d851b29"
migrations_dir = "migrations"

# Producer-side binding for product events (`@nlqdb/events`). The drain
# side lives in `apps/events-worker` (consumer-only worker subscribed
# to the same queue). Free-tier ops budget: 10K/day on Workers Free,
# ~3.3K msgs/day at 3 ops/msg — comfortable through Phase 1.
[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "nlqdb-events"

# R2 bucket for blob surfaces. Phase 0 use: Stripe-event raw-payload
# archive at `stripe-events/YYYY/MM/DD/{event_id}.json`. Future surfaces
# (logos, query exports, plan snapshots) share the bucket via prefix.
# Bucket names are account-scoped — `bucket_name` is the only identifier.
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "nlqdb-assets"

# `STATIC_ASSETS` (not `ASSETS`) avoids colliding with the R2 binding above.
[assets]
directory = "../web/dist"
binding = "STATIC_ASSETS"
not_found_handling = "404-page"
# Run the Worker before serving assets for the whole marketing surface, so the
# `SK-WEB-026` front-controller can 301 it on `app.nlqdb.com` to the canonical
# marketing host (it ships in this build but must not be indexed as a duplicate
# of `nlqdb.com`). Kept in lock-step with `MARKETING_MIRROR_PREFIXES`
# (`marketing-mirror.ts`) — a unit test fails if the two lists drift. Product
# (`/app/*`), auth (`/auth/*`, `/oauth/*`), the root `/`, and API paths keep the
# zero-cost asset-first / Hono paths.
run_worker_first = [
  "/blog", "/blog/*", "/solve", "/solve/*", "/vs", "/vs/*",
  "/agents", "/agents/*", "/architecture", "/architecture/*",
  "/integrations", "/integrations/*", "/manifesto", "/manifesto/*",
  "/pricing", "/pricing/*", "/privacy", "/privacy/*",
  "/terms", "/terms/*", "/security", "/security/*",
  "/llms.txt", "/rss.xml", "/sitemap.xml",
]

# `custom_domain = true` (vs `pattern + zone_name`) gives the worker
# exclusive ownership of `app.nlqdb.com` and lets wrangler create the
# DNS record + provision the cert on first deploy. OAuth callbacks in
# RUNBOOK §5/§5b are registered against this hostname.
[[routes]]
pattern = "app.nlqdb.com"
custom_domain = true

# Preview deploys use Workers Versions on this worker (see
# `.github/workflows/preview-app.yml` — `wrangler versions upload`).
# Each PR push uploads a non-production version inheriting the
# bindings above; CF assigns a `<id>-nlqdb-api.omer-hochman.workers.dev`
# URL per version. The promoted version (and `app.nlqdb.com`)
# stay untouched until merge runs `wrangler deploy` via
# `.github/workflows/deploy-api.yml`.
#
# Preview vars (`NODE_ENV=preview`, `MOCK_IDP=1`, etc.) are injected
# at upload time via `wrangler versions upload --var KEY:VALUE` from
# the workflow — not via a `[env.preview]` block here, to mirror the
# canary pattern (`apps/api/wrangler.canary.toml` / `SK-AUTH-017`)
# where each non-prod surface lives in its own file. If a preview
# ever needs separate KV+D1 namespaces, create `wrangler.preview.toml`
# alongside `wrangler.canary.toml` and switch the workflow's wrangler
# command to `--config wrangler.preview.toml` rather than reviving
# `--env preview`.
