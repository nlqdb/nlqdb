name = "nlqdb-mcp-server"
main = "src/index.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# Hosted MCP Worker for `mcp.nlqdb.com` — `SK-MCP-010` slice 3b.
# OAuthProvider + McpAgent DO sessions on top of `apps/api/` (auth-of-
# record) via `@nlqdb/sdk` (`SK-MCP-005`). DO + KV bindings back OAuth
# state + per-session caching only; never touch D1.
workers_dev = true

[observability]
enabled = true

# `NLQDB_API_BASE_URL` targets the upstream API; `NLQDB_WEB_ORIGIN`
# hosts the consent screen (`apps/web`). Override via `.dev.vars`.
[vars]
NODE_ENV = "production"
NLQDB_API_BASE_URL = "https://app.nlqdb.com"
NLQDB_WEB_ORIGIN = "https://app.nlqdb.com"

# `custom_domain = true` gives wrangler exclusive ownership of
# `mcp.nlqdb.com` and provisions the cert on first deploy.
[[routes]]
pattern = "mcp.nlqdb.com"
custom_domain = true

# `workers-oauth-provider` requires the binding name OAUTH_KV. The
# `id` is pinned because wrangler's auto-provisioning writes the id
# back to wrangler.toml on disk — fine for local dev, but in CI the
# write-back is discarded with the runner, so every deploy re-creates
# the namespace and hits "title already exists" (CF error 10014).
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "5e0ffc161a37499493264553a6168452"

# `McpAgent` Durable Object — one instance per OAuth grant
# (`SK-MCP-014`'s `revalidated_at` stamp lives in the DO's SQL store).
[[durable_objects.bindings]]
class_name = "NlqdbMcpAgent"
name = "MCP_AGENT"

[[migrations]]
tag = "slice-3b"
new_sqlite_classes = ["NlqdbMcpAgent"]
