name = "nlqdb-events-worker"
main = "src/index.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# Queue-only worker: no HTTP route, no public URL. `workers_dev = false`
# suppresses the `*.workers.dev` URL wrangler defaults to; `preview_urls
# = false` disables per-deployment preview URLs likewise. Both would
# 404 on every request anyway since `export default { queue }` exposes
# no `fetch` handler — disabling them is cleaner than serving 404s.
workers_dev = false
preview_urls = false

[observability]
enabled = true

# `nlqdb-events` is the only product-event queue today. Producers
# (apps/api, eventually apps/web) write via the EVENTS_QUEUE binding;
# this Worker drains.
#
# Tuning notes:
#   max_batch_size = 100  — `ask.completed` is the high-volume event
#                           (one per /v1/ask success). Tinybird ingests
#                           the whole batch in one HTTP call so a
#                           larger batch reduces queue ops + Tinybird
#                           request count without hurting LogSnag-bound
#                           events (which iterate one-by-one regardless).
#   max_batch_timeout = 1 — One-second flush keeps query_log freshness
#                           bounded; W5's daily reshape doesn't need
#                           sub-second latency, but the bound caps how
#                           stale the workload analyser's view can be
#                           if traffic dries up.
#   max_retries = 3       — Cloudflare default. After exhaustion the
#                           message is dropped (no DLQ configured —
#                           add `dead_letter_queue = "nlqdb-events-dlq"`
#                           and a corresponding queue when retry-
#                           exhaustion starts appearing in metrics).
[[queues.consumers]]
queue = "nlqdb-events"
max_batch_size = 100
max_batch_timeout = 1
max_retries = 3
