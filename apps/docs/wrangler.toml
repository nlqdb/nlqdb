name = "nlqdb-docs"
compatibility_date = "2026-04-27"

# Astro Starlight static site served via Workers Static Assets. No
# adapter — Astro pre-renders everything to ./dist at build time.

workers_dev = true

[assets]
directory = "./dist"
not_found_handling = "404-page"

[observability]
enabled = true

# `custom_domain = true` lets wrangler create the proxied CNAME +
# Universal SSL cert for docs.nlqdb.com on first deploy. Mirror of the
# pattern in apps/mcp/wrangler.toml.
[[routes]]
pattern = "docs.nlqdb.com"
custom_domain = true
