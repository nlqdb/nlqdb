# Release config for the `nlq` CLI. Triggered by release-cli.yml on
# `v*` tag push. Local dry-run:
#   cd cli && goreleaser release --snapshot --clean --skip=publish

version: 2

project_name: nlq

before:
  hooks:
    - go mod tidy
    # Repo LICENSE lives at the root; stage a copy next to .goreleaser.yml so the archive picks it up.
    - sh -c 'cp ../LICENSE LICENSE.txt'

builds:
  - id: nlq
    binary: nlq
    main: ./cmd/nlq
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: [-s -w]

archives:
  - id: nlq
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - src: LICENSE.txt
        dst: LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: nlq
    # Runbook §"CLI releases": without HOMEBREW_TAP_GITHUB_TOKEN the GitHub
    # Release still creates and only the tap bump skips (formula stays in
    # dist/). An empty token otherwise 401s and fails the whole release —
    # every deploy-cli run 2026-05-19 → 07-11 died here. `index` keeps local
    # snapshot runs (env var absent entirely) from a template key error.
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    repository:
      owner: nlqdb
      name: homebrew-tap
      token: '{{ index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}'
    homepage: https://nlqdb.com
    description: "Natural-language databases — talk to your data, ship without a backend."
    license: MIT
    install: |
      bin.install "nlq"
    test: |
      system "#{bin}/nlq", "--version"

release:
  github:
    owner: nlqdb
    name: nlqdb
  name_template: "nlq {{ .Version }}"
  prerelease: auto
