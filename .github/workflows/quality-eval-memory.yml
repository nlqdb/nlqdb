# quality-eval — memory-quality (nlqdb's OWN agent-memory-quality benchmark).
# SK-QUAL-023: the wedge-relevant quality number. GLOBAL-036 leads with
# "analytical memory for AI agents"; this scores whether the memory itself is
# good across four EX-scorable axes (retrieval / temporal / forgetting /
# consolidation) plus the analytical-over-memory showcase. The dataset +
# runner wiring (`--dataset memory-quality`) shipped offline-first; this is the
# documented remaining half — the dispatchable `workflow_dispatch` that turns
# the 15 gold-verified questions into an EX number for the scorecard Engine
# lane.
#
# Manual on-demand only (SK-QUAL-002); never a PR gate. Like persona-bench and
# unlike BIRD/Spider there is NO upstream fixture download — the
# `agent_memory_v1` corpus is inline DDL in `memory-quality.ts`, materialised
# to SQLite by `loadMemoryQuality`. And no baseline + no emit: memory-quality
# is a measurement, never the canonical baseline, so a dispatch never
# overwrites BIRD/Spider and is not blocked by the SK-QUAL-002 < 7-day gate.
#
# The analytical-memory-vs-vector head-to-head (SK-QUAL-023) needs a pgvector
# embedding baseline and is infra-gated (E-05) — a documented follow-on, not
# here. The free-vs-frontier LLM delta below is the GLOBAL-026 bet applied to
# the memory shape and IS supported (generic runner lane, opt-in per dispatch).

name: Quality eval — memory-quality (agent-memory)

on:
  workflow_dispatch:
    inputs:
      include_frontier:
        description: "Run the frontier lane too (paid OpenRouter) → free-vs-frontier delta on the agent-memory shape (the GLOBAL-025 headline KPI applied to the GLOBAL-036 wedge)"
        type: boolean
        default: false
      include_agentic_frontier:
        description: "Run the SK-QUAL-009 agentic-frontier lane (exec-retry; ~3x provider RPS)"
        type: boolean
        default: false

permissions:
  contents: read

# Coalesce with the other eval workflows' posture: one memory-quality run at a
# time so a second dispatch queues rather than competing for the shared
# free-tier budget. NOT cancel-in-progress — let a started run finish.
concurrency:
  group: quality-eval-memory
  cancel-in-progress: false

jobs:
  run:
    name: Run memory-quality (free chain + optional frontier)
    runs-on: ubuntu-latest
    # 15 questions × (≈3 s throttle, SK-QUAL-012 + ~2 s LLM tail) ≈ a couple
    # of minutes; ×2 lanes with the frontier toggle. 30 min absorbs
    # single-provider degradation + the bounded SK-QUAL-013 capacity waits.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Run quality-eval (memory-quality)
        working-directory: tools/eval
        env:
          # Free chain — same provider keys as production (SK-LLM-023 /
          # SK-LLM-028). The router skips any provider whose key is absent,
          # so a partial-key run still ships.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # Frontier chain — opt-in per dispatch (default off to preserve the
          # OpenRouter paid budget). The agentic lane (SK-QUAL-009) needs the
          # same key + the explicit `include_agentic_frontier` toggle so an
          # `include_frontier=true` run doesn't fire the 3x-RPS exec budget.
          OPENROUTER_FRONTIER_API_KEY: ${{ (inputs.include_frontier == true || inputs.include_agentic_frontier == true) && secrets.OPENROUTER_FRONTIER_API_KEY || '' }}
          RUN_AGENTIC_FRONTIER: ${{ inputs.include_agentic_frontier == true && '1' || '' }}
        run: |
          set -euo pipefail
          # The `agent_memory_v1` schema is inline DDL materialised under
          # --data-dir — no --questions-json (the loader generates them) and no
          # upstream fixture download. No --baseline / no --emit: a
          # measurement, never the canonical baseline (SK-QUAL-023).
          mkdir -p memory_data
          bun src/runner.ts \
            --dataset memory-quality \
            --data-dir memory_data \
            --out results \
            --throttle-ms 3000 \
            --capacity-wait-ms 65000

      - name: Upload report JSON
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: quality-eval-memory-${{ github.run_id }}
          path: tools/eval/results/*.json
          retention-days: 90

      # Same step-summary shape as BIRD/Spider/persona-bench so the operator's
      # eye doesn't context-switch, plus a per-axis EX breakdown — the four
      # quality axes are the whole point of SK-QUAL-023, so surfacing which
      # axis is weakest is the lever signal for the next run.
      - name: Emit run summary
        if: always()
        run: |
          set -euo pipefail
          latest=$(ls -t tools/eval/results/*.json 2>/dev/null | head -1 || true)
          if [ -z "$latest" ]; then
            echo "::warning::No results JSON produced (runner failed)."
            exit 0
          fi
          {
            echo "## quality-eval — memory-quality (agent-memory, SK-QUAL-023)"
            echo ""
            jq -r '
              "Run at: " + .run_at,
              "Dataset: " + .dataset,
              "Questions: " + (.question_count | tostring),
              (if .transport_failed == true then "Transport collapse: chain unreachable — EX is an outage, not a measurement (SK-QUAL-020)" else empty end),
              (if .resumable == true then "Resumable: true (capacity budget-stop — re-dispatch to resume, SK-QUAL-013)" else empty end),
              "",
              "| Lane | Match | Attempted | EX | p50 ms | p95 ms |",
              "|---|---|---|---|---|---|",
              (.lanes[] | "| " + .lane + " | " + (.match | tostring) + " | " + (.attempted | tostring) + " | " + ((.execution_accuracy * 100 | tostring) + "%") + " | " + (.p50_latency_ms | tostring) + " | " + (.p95_latency_ms | tostring) + " |"),
              "",
              "Free-vs-frontier delta: " + (if .free_vs_frontier_delta == null then "n/a (free-only run — set include_frontier)" else ((.free_vs_frontier_delta * 100 | tostring) + " pts") end)
            ' "$latest"
            # Per-axis EX for the free lane. question_id → axis is fixed by the
            # dataset (3 questions per axis, ids 0-14, SK-QUAL-023); gold_error
            # rows are excluded from the denominator like the lane EX.
            echo ""
            echo "### Per-axis EX (free lane)"
            echo ""
            jq -r '
              def axis(id):
                if id < 3 then "retrieval"
                elif id < 6 then "temporal"
                elif id < 9 then "forgetting"
                elif id < 12 then "consolidation"
                else "analytical" end;
              "| Axis | Match | Scored | EX |",
              "|---|---|---|---|",
              ( [.results[] | select(.lane == "free")]
                | group_by(axis(.question_id))
                | .[]
                | { axis: axis(.[0].question_id),
                    match: ([.[] | select(.outcome == "match")] | length),
                    scored: ([.[] | select(.outcome != "gold_error")] | length) }
                | "| " + .axis
                  + " | " + (.match | tostring)
                  + " | " + (.scored | tostring)
                  + " | " + (if .scored > 0 then ((.match / .scored * 100) | tostring) + "%" else "n/a" end)
                  + " |"
              )
            ' "$latest"
          } >> "$GITHUB_STEP_SUMMARY"
