# quality-eval — Spider 2.0-lite SQLite-subset free-vs-frontier run.
# SK-QUAL-007 + SK-QUAL-008: all 135 `local###` rows scored via the
# canonical multi-CSV result-set evaluator (column-major comparator with
# 1e-2 numeric tolerance + per-instance `condition_cols` / `ignore_order`
# from `evaluation_suite/gold/spider2lite_eval.jsonl`). Manual on-demand
# only per SK-QUAL-002 — the scheduled crons were retired. Two dispatch
# modes: `full` (135q + emit) and `smoke` (sampled, no emit, resumable).

name: Quality eval — Spider 2.0-lite

on:
  # SK-QUAL-002 — manual on-demand only; the scheduled weekly + 4h smoke
  # crons were retired. `mode` picks the full canonical pass or the sampled
  # smoke; both are operator-triggered, never a PR gate.
  workflow_dispatch:
    inputs:
      mode:
        description: "full = 135q + emit · smoke = sampled slice, no emit"
        type: choice
        options: [full, smoke]
        default: full
      limit:
        description: "Question count for full mode (Spider 2.0-lite SQLite subset caps at 135)"
        default: "135"
        required: false
      include_frontier:
        description: "Run the frontier lane too (paid OpenRouter); full mode only"
        type: boolean
        default: false
      include_agentic_frontier:
        description: "Run the SK-QUAL-009 agentic-frontier lane (exec-retry; ~3x provider RPS); full mode only"
        type: boolean
        default: false
      skip_emit:
        description: "Skip POSTing the report to /v1/events/eval (full mode; default false)"
        type: boolean
        default: false

permissions:
  contents: read

# Coalesce: at most one eval runs at a time; a second manual dispatch
# queues behind the first rather than competing for the shared free-tier
# budget. NOT cancel-in-progress — a half-finished run is worth letting
# complete.
concurrency:
  group: quality-eval-spider2-lite
  cancel-in-progress: false

jobs:
  run:
    name: Run Spider 2.0-lite SQLite (full)
    if: inputs.mode != 'smoke'
    runs-on: ubuntu-latest
    # 135 questions × ~1s p50 × N lanes is ~5 min; LLM tail can push
    # to ~15 min. 60 min ceiling absorbs single-provider degradation.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # Spider 2.0-lite has two upstream pieces:
      #   (1) The questions JSONL + the `evaluation_suite/gold/` tree
      #       (`spider2lite_eval.jsonl` + 135 instances × 1–4 multi-CSV
      #       gold result-set files) — both live in xlang-ai/Spider2 on
      #       GitHub. We sparse-clone just `spider2-lite/` (~2 MB).
      #   (2) The SQLite database files (~150 MB unzipped) hosted on
      #       Google Drive per the upstream README quickstart. gdown
      #       handles Drive's interstitial confirm token.
      # Bumping the cache key forces a fresh download on the next run.
      - name: Cache Spider 2.0-lite fixtures
        id: spider2-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: spider2_data
          key: spider2-lite-v2-${{ hashFiles('.github/workflows/quality-eval-spider2-lite.yml') }}

      - name: Download Spider 2.0-lite (when cache miss)
        if: steps.spider2-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p spider2_data/resource/databases/spider2-localdb
          # Gold tree (eval metadata + multi-CSV gold answers) — sparse
          # clone `spider2-lite/evaluation_suite/gold/` from upstream.
          # `--filter=blob:none` defers blob fetches until checkout, so
          # the initial clone stays metadata-only; `--sparse` then narrows
          # the checkout to one subdirectory (~2 MB on disk vs ~150 MB
          # for the full repo). Cone mode auto-includes top-level files
          # of every ancestor of the included path, so
          # `spider2-lite/spider2-lite.jsonl` (the questions JSONL) ships
          # in the same checkout without an explicit pattern.
          tmp_clone=$(mktemp -d)
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/xlang-ai/Spider2 "$tmp_clone"
          (cd "$tmp_clone" && git sparse-checkout set spider2-lite/evaluation_suite/gold)
          mkdir -p spider2_data/evaluation_suite
          cp -r "$tmp_clone/spider2-lite/evaluation_suite/gold" spider2_data/evaluation_suite/gold
          cp "$tmp_clone/spider2-lite/spider2-lite.jsonl" spider2_data/spider2-lite.jsonl
          rm -rf "$tmp_clone"
          # SQLite database files — Google Drive (upstream README §1).
          # File ID `1coEVsCZq-Xvj9p2TnhBFoFTsY-UoYGmG` from
          # github.com/xlang-ai/Spider2/tree/main/spider2-lite README.
          pip install --quiet --user gdown
          # gdown 6 (2026-05) removed --fuzzy; the canonical uc?id= URL is
          # accepted by every gdown version and auto-resolves Drive's
          # large-file confirm token, so pass it directly.
          ~/.local/bin/gdown "https://drive.google.com/uc?id=1coEVsCZq-Xvj9p2TnhBFoFTsY-UoYGmG" \
            -O spider2_data/spider2-localdb.zip
          unzip -q spider2_data/spider2-localdb.zip -d spider2_data/resource/databases/spider2-localdb
          rm -f spider2_data/spider2-localdb.zip

      # SK-QUAL-013 — a capacity budget-stop keeps its checkpoint; the
      # cache lets a re-dispatch of the SAME commit resume instead of
      # re-burning quota. Keyed by sha so two code versions never share a
      # canonical run's partial scores.
      - name: Restore full-run checkpoint
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tools/eval/results/*.partial.jsonl
          key: eval-full-spider-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            eval-full-spider-${{ github.sha }}-

      - name: Run quality-eval
        working-directory: tools/eval
        env:
          # Free chain — same provider keys as production.
          # CEREBRAS_API_KEY leads the planner tier per SK-LLM-023; absent
          # key → the chain falls over to the Gemini-first order.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # SK-LLM-028 — Mistral planner-tier capacity backstop (chain tail).
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # Frontier chain — opt-in per dispatch (default off to preserve
          # the OpenRouter paid budget). The agentic lane (SK-QUAL-009)
          # needs the same key + the explicit `include_agentic_frontier`
          # toggle so `include_frontier=true` doesn't accidentally fire
          # the 3x-RPS exec-retry budget.
          OPENROUTER_FRONTIER_API_KEY: ${{ (inputs.include_frontier == true || inputs.include_agentic_frontier == true) && secrets.OPENROUTER_FRONTIER_API_KEY || '' }}
          RUN_AGENTIC_FRONTIER: ${{ inputs.include_agentic_frontier == true && '1' || '' }}
          EVAL_API_URL: ${{ vars.EVAL_API_URL || 'https://app.nlqdb.com' }}
          EVAL_INGEST_TOKEN: ${{ secrets.EVAL_INGEST_TOKEN }}
          SKIP_EMIT: ${{ inputs.skip_emit == true }}
        run: |
          set -euo pipefail
          limit="${{ inputs.limit || '135' }}"
          # Event-pipeline emit: skip on workflow_dispatch when the
          # operator opted out, or when the token is unset.
          emit_args=""
          if [ "$SKIP_EMIT" != "true" ] && [ -n "${EVAL_INGEST_TOKEN:-}" ]; then
            emit_args="--emit-url $EVAL_API_URL --emit-token $EVAL_INGEST_TOKEN"
          fi
          # No baseline diff in slice 3a — `baseline-2026-06-15.json`
          # is BIRD-only. Slice 3b will mint a Spider baseline once
          # the 111-row multi-CSV scorer lands and EA stabilises.
          # shellcheck disable=SC2086  # word-splitting on optional args is intentional
          bun src/runner.ts \
            --dataset spider2-lite-sqlite \
            --data-dir ../../spider2_data \
            --limit "$limit" \
            --out results \
            --throttle-ms 3000 \
            --capacity-wait-ms 65000 \
            $emit_args

      # A completed run deletes its checkpoint (SK-QUAL-011), so only save
      # when a budget-stop left one behind.
      - name: Check for checkpoint
        id: ckpt
        if: always()
        run: echo "exists=$(compgen -G 'tools/eval/results/*.partial.jsonl' > /dev/null && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Save full-run checkpoint
        if: always() && steps.ckpt.outputs.exists == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tools/eval/results/*.partial.jsonl
          key: eval-full-spider-${{ github.sha }}-${{ github.run_id }}

      - name: Upload report JSON
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: quality-eval-spider2-lite-${{ github.run_id }}
          path: tools/eval/results/*.json
          retention-days: 90

      # Same step-summary shape as BIRD so the operator's eye doesn't
      # have to context-switch between the two reports.
      - name: Emit run summary
        if: always()
        run: |
          set -euo pipefail
          latest=$(ls -t tools/eval/results/*.json 2>/dev/null | head -1 || true)
          if [ -z "$latest" ]; then
            echo "::warning::No results JSON produced (runner failed)."
            exit 0
          fi
          {
            echo "## quality-eval — Spider 2.0-lite SQLite"
            echo ""
            jq -r '
              "Run at: " + .run_at,
              "Dataset: " + .dataset,
              "Questions: " + (.question_count | tostring),
              (if .resumable == true then "Resumable: true (capacity budget-stop — re-dispatch this commit to resume)" else empty end),
              "",
              "| Lane | Match | Attempted | EA (scored) | Gold errors | p50 ms | p95 ms |",
              "|---|---|---|---|---|---|---|",
              (.lanes[] | "| " + .lane + " | " + (.match | tostring) + " | " + (.attempted | tostring) + " | " + ((.execution_accuracy * 100 | tostring) + "%") + " | " + (.gold_error | tostring) + " | " + (.p50_latency_ms | tostring) + " | " + (.p95_latency_ms | tostring) + " |"),
              "",
              "Free-vs-frontier delta: " + (if .free_vs_frontier_delta == null then "n/a" else ((.free_vs_frontier_delta * 100 | tostring) + " pts") end),
              "",
              "Note (SK-QUAL-008): all 135 `local###` rows now score via the canonical Spider 2.0 multi-CSV evaluator (column-major comparator, 1e-2 abs tolerance, per-instance `condition_cols` / `ignore_order`). `gold_error` here means the instance had no gold CSV in the cached `evaluation_suite/gold/exec_result/` tree, not a routing short-circuit."
            ' "$latest"
          } >> "$GITHUB_STEP_SUMMARY"

  # SK-QUAL-011 — sampled smoke slice, manual dispatch (`mode: smoke`),
  # resumable. No change-since-`last_eval_sha` gate: a manual dispatch is
  # an intentional run. Smoke never emits and never overwrites the baseline.
  smoke:
    name: Smoke EX (sampled, SK-QUAL-011)
    if: inputs.mode == 'smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Fixed smoke slice (SK-QUAL-011) — same seed + limit every run.
    env:
      SMOKE_SEED: "20260607"
      SMOKE_LIMIT: "40"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Cache Spider 2.0-lite fixtures
        id: spider2-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: spider2_data
          key: spider2-lite-v2-${{ hashFiles('.github/workflows/quality-eval-spider2-lite.yml') }}

      - name: Download Spider 2.0-lite (when cache miss)
        if: steps.spider2-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p spider2_data/resource/databases/spider2-localdb
          tmp_clone=$(mktemp -d)
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/xlang-ai/Spider2 "$tmp_clone"
          (cd "$tmp_clone" && git sparse-checkout set spider2-lite/evaluation_suite/gold)
          mkdir -p spider2_data/evaluation_suite
          cp -r "$tmp_clone/spider2-lite/evaluation_suite/gold" spider2_data/evaluation_suite/gold
          cp "$tmp_clone/spider2-lite/spider2-lite.jsonl" spider2_data/spider2-lite.jsonl
          rm -rf "$tmp_clone"
          pip install --quiet --user gdown
          # gdown 6 (2026-05) removed --fuzzy; the canonical uc?id= URL is
          # accepted by every gdown version and auto-resolves Drive's
          # large-file confirm token, so pass it directly.
          ~/.local/bin/gdown "https://drive.google.com/uc?id=1coEVsCZq-Xvj9p2TnhBFoFTsY-UoYGmG" \
            -O spider2_data/spider2-localdb.zip
          unzip -q spider2_data/spider2-localdb.zip -d spider2_data/resource/databases/spider2-localdb
          rm -f spider2_data/spider2-localdb.zip

      # SK-QUAL-011 — the smoke checkpoint persists across dispatches so a
      # budget-stopped smoke resumes on the next `mode: smoke` dispatch.
      - name: Restore eval state
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: eval-state
          key: eval-state-spider-${{ github.run_id }}
          restore-keys: |
            eval-state-spider-

      - name: Smoke run (resumable)
        id: smoke
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p eval-state
          bun tools/eval/src/runner.ts \
            --dataset spider2-lite-sqlite \
            --data-dir spider2_data \
            --limit "$SMOKE_LIMIT" --sample-seed "$SMOKE_SEED" \
            --throttle-ms 3000 \
            --capacity-wait-ms 65000 \
            --out eval-state
          latest=$(ls -t eval-state/*.json | head -1)
          if jq -e '.resumable == true' "$latest" >/dev/null 2>&1; then
            echo "Budget stop — checkpoint kept; re-dispatch (mode: smoke) resumes."
            echo "status=resumable" >> "$GITHUB_OUTPUT"
          else
            echo "status=completed" >> "$GITHUB_OUTPUT"
          fi
          echo "report=$latest" >> "$GITHUB_OUTPUT"

      - name: Smoke summary
        run: |
          set -euo pipefail
          latest="${{ steps.smoke.outputs.report }}"
          {
            echo "## quality-eval — Spider smoke (sampled ${SMOKE_LIMIT}, seed ${SMOKE_SEED})"
            echo ""
            echo "Status: ${{ steps.smoke.outputs.status }}"
            if [ -n "$latest" ] && [ -f "$latest" ]; then
              jq -r '
                "Run at: " + .run_at,
                (if .resumable == true then "Resumable: true (chain rate-limited)" else "" end),
                "",
                "| Lane | Match | Attempted | Smoke EX |",
                "|---|---|---|---|",
                (.lanes[] | "| " + .lane + " | " + (.match | tostring) + " | " + (.attempted | tostring) + " | " + ((.execution_accuracy * 100 | tostring) + "%") + " |")
              ' "$latest"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-eval-spider2-smoke-${{ github.run_id }}
          path: eval-state/*.json
          retention-days: 30

      - name: Prune reports from eval state
        if: always()
        run: |
          set -euo pipefail
          find eval-state -maxdepth 1 -name '*.json' -delete 2>/dev/null || true

      - name: Save eval state
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: eval-state
          key: eval-state-spider-${{ github.run_id }}
