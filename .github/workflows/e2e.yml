# nlqdb — unified E2E dispatcher (SK-E2E-004).
#
# One `workflow_dispatch` entry point routes to per-surface reusable
# workflows. Surfaces:
#   • web        — opencheck against the staging URL (existing reusable)
#   • cli        — Go testscript fixtures, hermetic
#   • sdk        — vitest + cassettes, hermetic
#   • mcp        — InMemoryTransport protocol tests, hermetic
#   • examples   — Playwright framework smoke + bash shell smokes
#   • all        — every surface above, in series, sharing one staging URL
#
# Why workflow_dispatch only: every run can burn Neon-branch capacity,
# Workers Versions slots, and Groq quota. An implicit `pull_request`
# trigger would exhaust the free-tier envelope (GLOBAL-013). External
# scheduling (the same Claude cron job that drives `e2e-opencheck.yml`)
# can still POST the dispatch endpoint on a cadence.
#
# Why one dispatcher (vs one workflow per surface): single Actions-tab
# entry point so the operator never has to remember which file runs
# what. Per-surface reusables stay reusable for finer-grained future
# triggers (e.g. a per-PR auto-run on a label, behind a follow-up
# decision per the FEATURE.md's open-questions section).
#
# Existing `e2e-opencheck.yml` is unchanged and continues to be a
# valid backwards-compat entry point for web-only manual triggers.

name: E2E (dispatcher)

on:
  workflow_dispatch:
    inputs:
      surface:
        description: "Which surface(s) to test"
        type: choice
        required: true
        default: web
        options:
          - web
          - cli
          - sdk
          - mcp
          - examples
          - all

# Serialise per-surface dispatch but allow different surfaces to
# overlap with one another by namespacing the group on the input.
# `surface=all` shares the `e2e-all` lock with itself only.
concurrency:
  group: e2e-dispatcher-${{ inputs.surface }}
  cancel-in-progress: false

# SK-CIPERM-001 — default-deny at the workflow root.
permissions: {}

# Fixed staging name so cleanup can find it regardless of which step
# failed mid-run.
env:
  E2E_NEON_BRANCH: e2e
  E2E_PREVIEW_ALIAS: e2e

jobs:
  # Spin up the ephemeral preview only when a surface actually needs
  # it. Hermetic surfaces (cli, sdk, mcp) skip this and run faster.
  # The deploy logic is the same shape as `e2e-opencheck.yml`'s
  # `deploy-staging` job — see that file for rationale on every
  # `--var` flag (MOCK_IDP=1 / MOCK_STRIPE=1 / etc.).
  deploy-staging:
    name: Spin up ephemeral preview (web + examples-live)
    if: inputs.surface == 'web' || inputs.surface == 'examples' || inputs.surface == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      base_url: ${{ steps.url.outputs.base_url }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Preflight — required secrets present
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${NEON_API_KEY:-}" ] || missing+=(NEON_API_KEY)
          [ -n "${NEON_PROJECT_ID:-}" ] || missing+=(NEON_PROJECT_ID)
          [ -n "${PREVIEW_BETTER_AUTH_SECRET:-}" ] || missing+=(PREVIEW_BETTER_AUTH_SECRET)
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          [ -n "${GROQ_API_KEY:-}" ] || missing+=(GROQ_API_KEY)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Build apps/web
        working-directory: apps/web
        run: bun run build

      - name: Strip real sign-in page (mock-IdP override)
        run: rm -rf apps/web/dist/auth/sign-in

      - name: Recreate Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          existing=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -n "$existing" ]; then
            echo "deleting stale ${E2E_NEON_BRANCH} branch (${existing})"
            curl -fsSL -X DELETE \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${existing}" \
              -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          fi
          response=$(curl -fsSL -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"${E2E_NEON_BRANCH}\"}, \"endpoints\": [{\"type\": \"read_write\"}]}")
          db_url=$(echo "$response" | jq -r '.connection_uris[0].connection_uri // empty')
          if [ -z "$db_url" ]; then
            echo "::error::Neon API did not return connection_uris[0].connection_uri"
            echo "$response" | jq .
            exit 1
          fi
          echo "::add-mask::$db_url"
          echo "database_url=$db_url" >> "$GITHUB_OUTPUT"

      - name: Upload preview version
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
          PREVIEW_BASE_URL: "https://${{ env.E2E_PREVIEW_ALIAS }}-nlqdb-api.omer-hochman.workers.dev"
        run: |
          set -euo pipefail
          mkdir -p "$WRANGLER_OUTPUT_FILE_DIRECTORY"
          bunx wrangler versions upload \
            --message "E2E @ ${{ github.sha }} (dispatcher surface=${{ inputs.surface }})" \
            --preview-alias "${E2E_PREVIEW_ALIAS}" \
            --var "NODE_ENV:preview" \
            --var "MOCK_IDP:1" \
            --var "MOCK_STRIPE:1" \
            --var "BETTER_AUTH_URL:${PREVIEW_BASE_URL}" \
            --var "MAGIC_LINK_WEB_ORIGIN:${PREVIEW_BASE_URL}" \
            --var "DATABASE_URL:${DATABASE_URL}" \
            --var "BETTER_AUTH_SECRET:${BETTER_AUTH_SECRET}"

      - name: Extract preview URL
        env:
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
          CF_WORKERS_SUBDOMAIN: omer-hochman
        run: sh "$GITHUB_WORKSPACE/scripts/extract-wrangler-preview-url.sh"

      - id: url
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_URL:-}" ]; then
            echo "::error::no preview URL captured from wrangler output"
            exit 1
          fi
          echo "captured base_url=$PREVIEW_URL"
          echo "base_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

  web:
    name: Web · opencheck
    if: |
      always() &&
      (inputs.surface == 'web' || inputs.surface == 'all') &&
      needs.deploy-staging.result == 'success'
    needs: deploy-staging
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
    secrets:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  cli:
    name: CLI · testscript
    if: inputs.surface == 'cli' || inputs.surface == 'all'
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-cli.yml

  sdk:
    name: SDK · vitest cassettes
    if: inputs.surface == 'sdk' || inputs.surface == 'all'
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-sdk.yml

  mcp:
    name: MCP · InMemoryTransport
    if: inputs.surface == 'mcp' || inputs.surface == 'all'
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-mcp.yml

  examples:
    name: Examples · Playwright + shell
    if: |
      always() &&
      (inputs.surface == 'examples' || inputs.surface == 'all') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    needs: deploy-staging
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-examples.yml
    with:
      # Empty string when staging didn't run — the reusable still
      # runs Playwright (hermetic) but the bash shell smokes
      # short-circuit with their own SKIP messages (no live URL).
      base_url: ${{ needs.deploy-staging.outputs.base_url || '' }}

  cleanup:
    name: Delete Neon branch
    needs: [deploy-staging, web, examples]
    # Run cleanup only when staging actually deployed. `always() &&`
    # ensures it runs even when a surface job failed.
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - name: Delete branch
        shell: bash
        run: |
          set -euo pipefail
          branches=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")
          branch_id=$(echo "$branches" | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -z "$branch_id" ]; then
            echo "no branch named ${E2E_NEON_BRANCH} — nothing to clean up"
            exit 0
          fi
          curl -fsSL -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          echo "deleted Neon branch ${branch_id} (${E2E_NEON_BRANCH})"
