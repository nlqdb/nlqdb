# nlqdb — preview deploys for apps/api on every PR push.
#
# Uploads the PR's HEAD as a non-production *version* of the prod
# `nlqdb-api` Worker (`wrangler versions upload`). Each push gets a
# unique URL of the form
# `<version-prefix>-nlqdb-api.omer-hochman.workers.dev`; the
# promoted production version (and `app.nlqdb.com`) are untouched
# until merge runs `wrangler deploy` via deploy-api.yml.
#
# Why this and not `--env preview` against a separate worker:
# Workers Versions gives a unique URL per push, so two open PRs
# never overwrite each other's preview. No bootstrap dance needed —
# CF generates the per-version URL automatically the first time.
# Preview URLs must be enabled on the `nlqdb-api` worker in the
# dashboard (one-time, already done).
#
# Versions inherit the prod worker's bindings (KV / D1 / Queue /
# R2) — same shared-bindings model we had with --env preview, just
# with a saner URL story. Schema-changing PRs still need local
# testing: this workflow does NOT run `migrate:remote` (uploading a
# version doesn't apply migrations, and the PR may not be merge-
# ready for a prod migration).
#
# Concurrency: keyed by PR number with `cancel-in-progress: true`
# so only the latest push for each PR is in flight; older versions
# stay reachable on their own URLs in the dashboard until a future
# cleanup pass garbage-collects them. Versions GC followup is tracked
# in IMPLEMENTATION §8 ("preview Workers Versions GC").

name: Preview API

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/api/**"
      - "packages/auth-internal/**"
      - "packages/db/**"
      - "packages/events/**"
      - "packages/llm/**"
      - "packages/otel/**"
      - ".github/workflows/preview-api.yml"

concurrency:
  group: preview-api-pr-${{ github.event.number }}
  cancel-in-progress: true

# `deployments: write` was previously declared but unused — Workers
# Versions doesn't create a GitHub Deployment object; the sticky
# comment uses the `pull-requests: write` scope. Dropped per the
# least-privilege principle.
permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: wrangler versions upload
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # Run wrangler directly. wrangler-action@v3's `postCommands`
      # doesn't see `WRANGLER_OUTPUT_DIR` (set only in the wrangler
      # subprocess env), and its `deployment-url` output is broken for
      # `versions upload` (cloudflare/wrangler-action#343). Direct
      # invocation lets us pin `WRANGLER_OUTPUT_FILE_DIRECTORY` to a
      # known path and parse the ND-JSON in a follow-up step.
      - name: Upload preview version
        id: deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
        run: |
          mkdir -p "$WRANGLER_OUTPUT_FILE_DIRECTORY"
          bunx wrangler versions upload --message "PR #${{ github.event.number }} @ ${{ github.event.pull_request.head.sha }}"

      # Always attempt extraction so the comment step can distinguish
      # "deploy succeeded but URL parse failed" from "deploy failed".
      - name: Extract preview URL
        if: always() && steps.deploy.outcome == 'success'
        env:
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
          # See preview-web.yml for the rationale — when the worker
          # hasn't been `wrangler deploy`-ed yet, wrangler omits
          # `preview_url` from the `version-upload` event and the
          # script falls back to constructing the URL itself.
          CF_WORKERS_SUBDOMAIN: omer-hochman
        run: sh "$GITHUB_WORKSPACE/scripts/extract-wrangler-preview-url.sh"

      # Sticky comment — looks up an existing preview comment by a
      # hidden marker and edits it in place. Keeps the PR conversation
      # clean: one comment per PR, updated on every push, instead of a
      # new comment per deploy.
      #
      # `if: always()` so a deploy failure still updates the sticky
      # comment with a "FAILED — see logs" line instead of leaving a
      # stale "deployed" message from the previous push.
      - name: Sticky preview comment
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        with:
          script: |
            const outcome = process.env.DEPLOY_OUTCOME ?? '';
            const url = process.env.PREVIEW_URL ?? '';

            const sha = context.sha.slice(0, 7);
            const marker = '<!-- preview-api-sticky -->';
            const ts = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let header;
            let urlLine;

            if (outcome !== 'success') {
              header = '❌ **Preview API deploy FAILED**';
              urlLine = `- See logs: <${runUrl}>`;
            } else if (url) {
              header = '🚀 **Preview API deployed**';
              urlLine = `- URL: <${url}>`;
            } else {
              // Deploy succeeded but URL parse degraded — still useful
              // info for the reviewer; point them at the dashboard.
              header = '🚀 **Preview API deployed** (URL parse degraded — see logs)';
              urlLine = '- URL: latest version visible in the dashboard → `nlqdb-api` → Versions';
            }

            const body = [
              marker,
              header,
              '',
              urlLine,
              '- Worker: `nlqdb-api` (non-production version — `app.nlqdb.com` untouched)',
              `- Commit: \`${sha}\``,
              `- Updated: ${ts}`,
              '',
              'Versions inherit prod bindings (KV / D1 / Queue / R2). Schema-changing PRs need local testing — this workflow does **not** run `migrate:remote`. See [RUNBOOK §6](../blob/main/RUNBOOK.md).',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
