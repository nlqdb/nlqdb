# Examples e2e — Playwright framework smoke tests (hermetic file-content
# checks today; framework-runtime checks `test.fixme`'d until Phase 1
# publishes `elements.nlqdb.com/v1.js`) plus bash shell smokes for the
# curl + CLI examples. Trigger after any change to `examples/**` or the
# `<nlq-data>` attribute contract. See `tests/e2e/examples/` for the
# harness and SK-E2E-005 / SK-E2E-004 for rationale.
#
# `live` input (default `false`): when `true`, this workflow spins up
# its own ephemeral preview (Neon branch + Workers Versions alias) so
# the bash curl + CLI smokes can hit a real `/v1/ask` endpoint. Default
# `false` runs the hermetic Playwright matrix only — fastest and the
# common case for an examples-only change.

name: E2E Examples

on:
  workflow_dispatch:
    inputs:
      live:
        description: "Deploy staging + run the curl/CLI shell smokes against it (slower; needs Neon + Cloudflare secrets)."
        required: false
        type: boolean
        default: false

concurrency:
  # Share the lock with `e2e-opencheck.yml` whenever this workflow
  # deploys staging — both write to the same `e2e` Neon branch +
  # Workers preview alias, so overlap would orphan resources.
  group: e2e-staging
  cancel-in-progress: false

# SK-CIPERM-001 — default-deny at workflow root.
permissions: {}

env:
  E2E_NEON_BRANCH: e2e
  E2E_PREVIEW_ALIAS: e2e

jobs:
  playwright:
    name: examples · framework smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # @playwright/test is a root workspace devDependency (hoisted so
      # spec files under `examples/<framework>/e2e/` can resolve it via
      # the standard upward node_modules walk). The local install adds
      # only the typecheck + bash smoke wiring.
      - name: Install e2e-examples deps
        working-directory: tests/e2e/examples
        run: bun install

      - name: Restore Playwright browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-examples-${{ runner.os }}-${{ hashFiles('tests/e2e/examples/package.json', 'package.json') }}
          restore-keys: |
            playwright-examples-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: tests/e2e/examples
        run: bunx playwright install chromium --with-deps

      - name: Typecheck (config + spec discovery)
        working-directory: tests/e2e/examples
        run: bun run typecheck

      - name: Run framework smoke tests
        working-directory: tests/e2e/examples
        run: bun run test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-examples-${{ github.run_id }}
          path: tests/e2e/examples/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  # Staging deploy is only needed for the live shell smokes. The deploy
  # logic mirrors `e2e-opencheck.yml`'s `deploy-staging` job — see that
  # file for rationale on every `--var` flag (MOCK_IDP / MOCK_STRIPE /
  # NODE_ENV=preview / etc.). The shared `e2e-staging` concurrency
  # group above keeps this from racing the opencheck workflow on the
  # same Neon branch.
  deploy-staging:
    name: Spin up ephemeral preview (live shell smokes)
    if: ${{ inputs.live }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      base_url: ${{ steps.url.outputs.base_url }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Preflight — required secrets present
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${NEON_API_KEY:-}" ] || missing+=(NEON_API_KEY)
          [ -n "${NEON_PROJECT_ID:-}" ] || missing+=(NEON_PROJECT_ID)
          [ -n "${PREVIEW_BETTER_AUTH_SECRET:-}" ] || missing+=(PREVIEW_BETTER_AUTH_SECRET)
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Build apps/web
        working-directory: apps/web
        run: bun run build

      - name: Strip real sign-in page (mock-IdP override)
        run: rm -rf apps/web/dist/auth/sign-in

      - name: Recreate Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          existing=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -n "$existing" ]; then
            echo "deleting stale ${E2E_NEON_BRANCH} branch (${existing})"
            curl -fsSL -X DELETE \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${existing}" \
              -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          fi
          response=$(curl -fsSL -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"${E2E_NEON_BRANCH}\"}, \"endpoints\": [{\"type\": \"read_write\"}]}")
          db_url=$(echo "$response" | jq -r '.connection_uris[0].connection_uri // empty')
          if [ -z "$db_url" ]; then
            echo "::error::Neon API did not return connection_uris[0].connection_uri"
            echo "$response" | jq .
            exit 1
          fi
          echo "::add-mask::$db_url"
          echo "database_url=$db_url" >> "$GITHUB_OUTPUT"

      - name: Upload preview version
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
          PREVIEW_BASE_URL: "https://${{ env.E2E_PREVIEW_ALIAS }}-nlqdb-api.omer-hochman.workers.dev"
        run: |
          set -euo pipefail
          mkdir -p "$WRANGLER_OUTPUT_FILE_DIRECTORY"
          bunx wrangler versions upload \
            --message "E2E examples @ ${{ github.sha }}" \
            --preview-alias "${E2E_PREVIEW_ALIAS}" \
            --var "NODE_ENV:preview" \
            --var "MOCK_IDP:1" \
            --var "MOCK_STRIPE:1" \
            --var "BETTER_AUTH_URL:${PREVIEW_BASE_URL}" \
            --var "MAGIC_LINK_WEB_ORIGIN:${PREVIEW_BASE_URL}" \
            --var "DATABASE_URL:${DATABASE_URL}" \
            --var "BETTER_AUTH_SECRET:${BETTER_AUTH_SECRET}"

      - name: Extract preview URL
        env:
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
          CF_WORKERS_SUBDOMAIN: omer-hochman
        run: sh "$GITHUB_WORKSPACE/scripts/extract-wrangler-preview-url.sh"

      - id: url
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_URL:-}" ]; then
            echo "::error::no preview URL captured from wrangler output"
            exit 1
          fi
          echo "base_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

  shell-smokes:
    name: examples · curl + cli (live)
    needs: deploy-staging
    if: ${{ inputs.live && needs.deploy-staging.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cli/go.mod

      - name: Build nlq binary for CLI shell smoke
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          go -C cli build -o "$RUNNER_TEMP/bin/nlq" ./cmd/nlq
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run curl shell smoke
        env:
          NLQDB_API_URL: ${{ needs.deploy-staging.outputs.base_url }}
          # The CI key is a publishable test key minted against the
          # staging tenant — same pattern as preview-api.yml. Secret
          # is `STAGING_NLQDB_API_KEY` (mint via dashboard if missing).
          NLQDB_API_KEY: ${{ secrets.STAGING_NLQDB_API_KEY }}
        run: |
          if [ -z "${NLQDB_API_KEY:-}" ]; then
            echo "::warning::STAGING_NLQDB_API_KEY not set — curl smoke will skip itself"
          fi
          bash examples/curl/e2e/smoke.sh

      - name: Run CLI shell smoke
        env:
          NLQDB_API_URL: ${{ needs.deploy-staging.outputs.base_url }}
          NLQDB_API_KEY: ${{ secrets.STAGING_NLQDB_API_KEY }}
        run: bash examples/cli/e2e/smoke.sh

  cleanup:
    name: Delete Neon branch
    needs: [deploy-staging, shell-smokes]
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - name: Delete branch
        shell: bash
        run: |
          set -euo pipefail
          branches=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")
          branch_id=$(echo "$branches" | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -z "$branch_id" ]; then
            echo "no branch named ${E2E_NEON_BRANCH} — nothing to clean up"
            exit 0
          fi
          curl -fsSL -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          echo "deleted Neon branch ${branch_id} (${E2E_NEON_BRANCH})"
