# Auto-deploys apps/mcp on merge. Mirrors deploy-events-worker.yml —
# no D1, no asset bundle, no Worker secrets to mirror yet. wrangler
# auto-provisions OAUTH_KV + mcp.nlqdb.com DNS + cert on first run.

name: Deploy MCP server

on:
  push:
    branches: [main]
    paths:
      - "apps/mcp/**"
      - "packages/mcp/**"
      - "packages/sdk/**"
      - "packages/otel/**"
      - ".github/workflows/deploy-mcp.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/mcp
          command: deploy
