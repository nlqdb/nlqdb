# Reusable: examples e2e — Playwright framework smoke tests (hermetic
# file-content checks today; framework-runtime checks `test.fixme`'d
# until Phase 1 publishes `elements.nlqdb.com/v1.js`) plus bash shell
# smokes for the curl + CLI examples (live-mode only). See
# `tests/e2e/examples/` for the harness and SK-E2E-005 for rationale.
#
# `base_url` is empty in hermetic mode (no staging). When the
# dispatcher's `surface=all` or `surface=examples` deploys staging,
# `base_url` is the per-run preview URL; the bash smokes then exercise
# the README's curl + CLI walkthroughs against it.

name: E2E Examples (reusable)

on:
  workflow_call:
    inputs:
      base_url:
        description: "Staging URL for live shell smokes; empty in hermetic mode."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  playwright:
    name: examples · framework smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # @playwright/test is a root workspace devDependency (hoisted
      # so spec files under `examples/<framework>/e2e/` can resolve
      # it via the standard upward node_modules walk). The local
      # install adds only the typecheck + bash smoke wiring.
      - name: Install e2e-examples deps
        working-directory: tests/e2e/examples
        run: bun install

      # Playwright Chromium binary cache. Keyed on the test harness
      # package.json hash so a Playwright bump invalidates cleanly.
      - name: Restore Playwright browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-examples-${{ runner.os }}-${{ hashFiles('tests/e2e/examples/package.json', 'package.json') }}
          restore-keys: |
            playwright-examples-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: tests/e2e/examples
        run: bunx playwright install chromium --with-deps

      - name: Typecheck (config + spec discovery)
        working-directory: tests/e2e/examples
        run: bun run typecheck

      - name: Run framework smoke tests
        working-directory: tests/e2e/examples
        run: bun run test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-examples-${{ github.run_id }}
          path: tests/e2e/examples/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  shell-smokes:
    name: examples · curl + cli (live)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    # The shell smokes only have signal in live-mode; skip cleanly if
    # the dispatcher didn't spin up staging (saves wasted runner time).
    if: inputs.base_url != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cli/go.mod

      # Build the nlq binary into a tmp dir so the CLI shell smoke
      # has it on PATH.
      - name: Build nlq binary for CLI shell smoke
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          go -C cli build -o "$RUNNER_TEMP/bin/nlq" ./cmd/nlq
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run curl shell smoke
        env:
          NLQDB_API_URL: ${{ inputs.base_url }}
          # The CI key is a publishable test key minted against the
          # staging tenant — same pattern as preview-api.yml. Secret
          # is `STAGING_NLQDB_API_KEY` (mint via dashboard if missing).
          NLQDB_API_KEY: ${{ secrets.STAGING_NLQDB_API_KEY }}
        run: |
          if [ -z "${NLQDB_API_KEY:-}" ]; then
            echo "::warning::STAGING_NLQDB_API_KEY not set — curl smoke will skip itself"
          fi
          bash examples/curl/e2e/smoke.sh

      - name: Run CLI shell smoke
        env:
          NLQDB_API_URL: ${{ inputs.base_url }}
          NLQDB_API_KEY: ${{ secrets.STAGING_NLQDB_API_KEY }}
        run: bash examples/cli/e2e/smoke.sh
