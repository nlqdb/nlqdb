# nlqdb — auto-deploy apps/api (Cloudflare Worker `nlqdb-api`) on merge.
#
# Triggers when files under apps/api/** or its workspace dependencies
# change on main. The deploy sequence is the same one documented in
# RUNBOOK and apps/api/README:
#
#   migrate:remote   — wrangler d1 migrations apply (idempotent;
#                      missing this silently 500s auth/db routes per
#                      the PR #30 incident).
#   deploy           — wrangler deploy.
#
# secrets:remote stays a manual step. The script reads from `.envrc`
# which only exists on author dev boxes; CI doesn't carry it.
# Mirror secrets locally with `bun run --cwd apps/api secrets:remote`
# whenever a secret rotates.
#
# Manual re-deploy: workflow_dispatch on the Actions tab, or run the
# three-step sequence locally per RUNBOOK §`apps/api`.

name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/auth-internal/**"
      - "packages/db/**"
      - "packages/events/**"
      - "packages/llm/**"
      - "packages/otel/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  id-token: write
  attestations: write

jobs:
  deploy:
    name: D1 migrate + wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build (wrangler dry-run for attestation subject)
        working-directory: apps/api
        run: bun run build

      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "apps/api/dist/**"

      - name: Migrate + deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          # `migrate:remote` calls scripts/migrate-d1.sh which uses
          # wrangler (provided by this action). Runs BEFORE deploy so
          # the worker boots against an up-to-date D1 schema.
          preCommands: |
            bun run migrate:remote
          command: deploy
