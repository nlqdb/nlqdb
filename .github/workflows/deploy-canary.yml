# nlqdb — auto-deploy canary worker (`nlqdb-api-canary`) on every push
# to `main`. Canary is the integration gate between PR previews
# (mock IdP, `SK-AUTH-018`) and production (`SK-AUTH-017`).
#
# Mirrors `deploy-api.yml`'s shape (build apps/web → migrate D1 → deploy)
# but points at `wrangler.canary.toml` so the canary D1, KV, Queue, and
# R2 bindings are used. Secrets (`BETTER_AUTH_SECRET`, `OAUTH_GITHUB_*`,
# `GOOGLE_CLIENT_*`, `DATABASE_URL`, `RESEND_API_KEY` — names per
# `apps/api/src/env.d.ts`; OAuth values must be the canary App pair,
# SK-AUTH-008) are set manually with
# `bun run --cwd apps/api secrets:canary <NAME>` — same model as prod.

name: Deploy — Canary

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/auth-internal/**"
      - "packages/db/**"
      - "packages/events/**"
      - "packages/llm/**"
      - "packages/otel/**"
      - ".github/workflows/deploy-canary.yml"
  workflow_dispatch:
    inputs:
      # TEMPORARY one-shot: create the anon-mode Turnstile widget with the
      # write-scoped CF_TURNSTILE_EDIT_API_TOKEN (this repo's env-side
      # CLOUDFLARE_API_TOKEN is Turnstile read-only). When true the normal
      # canary deploy is skipped and only the widget job runs. Revert this
      # input + job once the widget exists.
      create_turnstile_widget:
        description: "One-shot: create the nlqdb-anon Turnstile widget (skips the canary deploy)"
        type: boolean
        default: false

concurrency:
  group: deploy-canary
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # TEMPORARY one-shot job — see the create_turnstile_widget input above.
  create-turnstile-widget:
    name: Create nlqdb-anon Turnstile widget (one-shot)
    if: ${{ inputs.create_turnstile_widget == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create or fetch the invisible widget
        env:
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CF_TURNSTILE_EDIT_API_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/challenges/widgets"

          # Idempotency guard: if a widget named nlqdb-anon already exists,
          # print its sitekey and skip creation. The list response can carry
          # per-widget secrets, so we only ever extract .sitekey through jq —
          # the raw body is never echoed.
          existing="$(curl -sS -X GET "$api" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r '.result[]? | select(.name=="nlqdb-anon") | .sitekey' | head -n1)"

          if [ -n "${existing}" ] && [ "${existing}" != "null" ]; then
            echo "Widget nlqdb-anon already exists — not creating a duplicate."
            echo "TURNSTILE_SITEKEY=${existing}"
            exit 0
          fi

          # Create the widget. The response body contains the widget SECRET,
          # so it is captured to a var and NEVER echoed raw — only piped
          # through jq that strips everything but success/errors/sitekey.
          resp="$(curl -sS -X POST "$api" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"nlqdb-anon","mode":"invisible","domains":["nlqdb.com","app.nlqdb.com"]}')"

          printf '%s' "$resp" | jq '{success, errors, sitekey: .result.sitekey}'

          sitekey="$(printf '%s' "$resp" | jq -r '.result.sitekey // empty')"
          if [ -z "${sitekey}" ]; then
            echo "ERROR: no sitekey in response (see success/errors above)"
            exit 1
          fi
          echo "TURNSTILE_SITEKEY=${sitekey}"

  deploy:
    name: D1 migrate + wrangler deploy (canary)
    # Skip the normal deploy on the one-shot widget dispatch.
    if: ${{ inputs.create_turnstile_widget != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build apps/web (Astro static output)
        working-directory: apps/web
        run: bun run build

      - name: Migrate canary D1 + deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          # Canary uses the same migration set as prod — Better Auth's
          # tables don't diverge across environments. `--config` points
          # the migrate command at `wrangler.canary.toml` so the canary
          # D1 (binding `DB`) is targeted.
          preCommands: |
            wrangler d1 migrations apply nlqdb-canary --config wrangler.canary.toml --remote
          command: deploy --config wrangler.canary.toml
