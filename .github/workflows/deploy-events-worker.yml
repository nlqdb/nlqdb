# nlqdb — auto-deploy apps/events-worker (queue consumer Worker) on
# merge. Drains `nlqdb-events` and posts to LogSnag.
#
# Sequence:
#   deploy           — wrangler deploy.
#   secrets:remote   — `scripts/mirror-secrets-workers.sh remote
#                      events-worker` re-syncs worker-level secrets
#                      from GHA → Worker. Runs after deploy so latest
#                      = deployed (CF API code 10214 otherwise). Same
#                      script as the local `bun run secrets:remote`.
#                      Without this, every deploy resets drifted
#                      worker-level secrets — the OAuth-init incident
#                      class on 2026-05-08, generalised.
#
# Manual re-deploy: workflow_dispatch on the Actions tab, or
# `bun run --cwd apps/events-worker deploy` from a dev machine.

name: Deploy events-worker

on:
  push:
    branches: [main]
    paths:
      - "apps/events-worker/**"
      - "packages/events/**"
      - "packages/otel/**"
      - ".github/workflows/deploy-events-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-events-worker
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # `bunx wrangler` resolves wrangler's bin via `#!/usr/bin/env
      # node`, so wrangler runs on the runner's Node — not Bun.
      # Wrangler ≥4.x requires Node ≥22; ubuntu-latest currently
      # ships Node 20.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/events-worker
          command: deploy

      # Re-sync worker-level secrets from GHA secrets. Same script
      # path as `bun run --cwd apps/events-worker secrets:remote` —
      # no CI-only push code path. Latest = deployed at this point
      # because `wrangler deploy` just ran; `wrangler secret bulk`
      # requires that.
      - name: Sync Worker secrets (mirror-secrets-workers.sh)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          jq -r 'to_entries[] | "export \(.key)=\(.value | @sh)"' <<<"$ALL_SECRETS" > .envrc
          ./scripts/mirror-secrets-workers.sh remote events-worker
          rm -f .envrc
