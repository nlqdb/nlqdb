# nlqdb — auto-deploy apps/coming-soon to Cloudflare Pages on merge.
#
# Mirror of `scripts/deploy-coming-soon.sh` minus the project-create
# step (project already exists; first-run creation stays a human
# action). Triggers only when files under apps/coming-soon/** change
# on main, so unrelated merges don't churn the Pages deployment list.
#
# Manual re-deploy: workflow_dispatch button on the Actions tab, or
# `bun run --cwd apps/coming-soon deploy` from a dev machine.

name: Deploy coming-soon

on:
  push:
    branches: [main]
    paths:
      - "apps/coming-soon/**"
      - ".github/workflows/deploy-coming-soon.yml"
  workflow_dispatch:

concurrency:
  group: deploy-coming-soon
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: wrangler pages deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # `bunx wrangler` resolves wrangler's bin via `#!/usr/bin/env
      # node`, so wrangler runs on the runner's Node — not Bun.
      # Wrangler ≥4.x requires Node ≥22; ubuntu-latest currently
      # ships Node 20.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      # wrangler-action auto-detects bun.lock at the repo root and
      # tries to install wrangler with bun. Without setup-bun the
      # action fails: "Unable to locate executable file: bun" (ran
      # 24982411375). Setting up bun first keeps the action's
      # auto-detection happy.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/coming-soon --project-name=nlqdb-coming-soon --branch=main --commit-dirty=true
