# nlqdb — supply-chain + SAST scans on every PR.
#
# Semgrep runs the curated p/typescript + p/security-audit + OWASP
# Top 10 rulesets — fast (~30s), low false positive, blocks PRs that
# introduce a new finding. CodeQL nightly is a separate workflow
# (CodeQL is heavier and only matters once a week).
#
# Renovate covers dependency upgrades; vulnerabilityAlerts in
# renovate.json5 surface CVEs as PRs the same day they're published.

name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Sundays 06:00 UTC — picks up rules updated through the week.
    - cron: "0 6 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 6
    container:
      # TODO: pin to a SHA digest once we've verified one. Earlier
      # attempt used a fabricated digest that failed to pull. Renovate's
      # container manager will replace this `:latest` tag with a
      # digest-pinned form on its first run; manually pin in the meantime
      # if supply-chain hardening becomes urgent.
      image: semgrep/semgrep:latest
    # Skip on dependabot/renovate PRs — they trigger `pull_request_target`-
    # style scoping that doesn't expose SEMGREP_APP_TOKEN, so the run
    # would fail-noisy with no signal. Renovate-bumped deps still get
    # scanned on the merge to main via the push trigger above.
    if: ${{ !contains('dependabot[bot] renovate[bot]', github.actor) }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        # `semgrep ci` already exits non-zero on findings — no flag
        # needed. Earlier `--error` was a `semgrep scan` flag and was
        # removed from `semgrep ci` in 1.x. False positives silence
        # via `# nosemgrep` annotations on the offending line.
        run: |
          semgrep ci \
            --config p/typescript \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
