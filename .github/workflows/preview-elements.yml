# nlqdb — preview deploys for packages/elements on every PR push.
#
# Builds the PR's HEAD bundle (esbuild → dist/v1.js) and pushes a
# Pages preview deployment to `nlqdb-elements` under branch
# `pr-<number>`. Stable preview URL:
# `pr-<number>.nlqdb-elements.pages.dev/v1.js`. Sticky across pushes
# — useful when third parties want to pin a specific PR's bundle
# while reviewing.
#
# Why GH Actions over Cloudflare Pages git integration: see header
# of preview-web.yml; same reasoning applies to the elements bundle.

name: Preview elements

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "packages/elements/**"
      - ".github/workflows/preview-elements.yml"

concurrency:
  group: preview-elements-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: esbuild + wrangler pages deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # `bunx wrangler` resolves wrangler's bin via `#!/usr/bin/env
      # node`, so wrangler runs on the runner's Node — not Bun.
      # Wrangler ≥4.x requires Node ≥22; ubuntu-latest currently
      # ships Node 20.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run --cwd packages/elements build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            bunx wrangler pages project create nlqdb-elements --production-branch main --compatibility-date "$(date -u +%Y-%m-%d)" || true
          command: pages deploy packages/elements/dist --project-name=nlqdb-elements --branch=pr-${{ github.event.number }} --commit-dirty=true

      - name: Sticky preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const aliasUrl = `${{ steps.deploy.outputs.pages-deployment-alias-url }}`;
            const url = `${{ steps.deploy.outputs.deployment-url }}`;
            const sha = context.sha.slice(0, 7);
            const marker = '<!-- preview-elements-sticky -->';
            const ts = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';

            const base = aliasUrl || url || `https://pr-${context.issue.number}.nlqdb-elements.pages.dev`;
            const bundle = `${base.replace(/\/$/, '')}/v1.js`;

            const body = [
              marker,
              '📦 **Preview elements deployed**',
              '',
              `- Bundle: <${bundle}>`,
              `- Project: \`nlqdb-elements\` (branch \`pr-${context.issue.number}\` — non-production)`,
              `- Commit: \`${sha}\``,
              `- Updated: ${ts}`,
              '',
              `Embed in a test page: \`<script src="${bundle}" type="module"></script>\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
