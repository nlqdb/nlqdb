# Reusable: run opencheck against a given baseUrl with Groq
# (`meta-llama/llama-4-scout-17b-16e-instruct`) through the
# OpenAI-compatible endpoint. The `workflow_call` trigger means this
# file never appears in the manual-dispatch list — callers (see
# `e2e-opencheck.yml`) drive it.
#
# Why OpenAI-compat (and not provider-specific LangChain packages):
#   opencheck v0.3.0 pins `@langchain/core ^1.1.24` (the LangChain JS v1
#   ecosystem). Provider-specific LangChain packages outside the v1
#   range cause a peer-dep split (two copies of core at runtime, broken
#   types). `@langchain/openai` v1.4.5 is on the same v1 ecosystem and
#   works cleanly. Groq exposes a native OpenAI-compatible endpoint
#   (https://console.groq.com/docs/openai), so pointing ChatOpenAI at
#   it with the Groq key is the no-upstream-change path.
#
# Why Groq / llama-4-scout (three pivots lived and died before this):
#   1. Gemini 2.5 Flash through run #17: free tier 10 RPM → 429s.
#   2. OpenRouter `qwen/qwen3-coder:free` for run #19: 429 on the
#      VERY FIRST call. The shared upstream pool is rate-limited by
#      the provider (Together / Fireworks), not our account quota.
#   3. Groq `openai/gpt-oss-120b` for runs #20-#21: 8 K TPM on our
#      on-demand account + hidden reasoning_tokens (it's a thinking
#      model) → 85-90 s between LLM calls → every test hits the
#      240 s timeout with only 2-3 calls. Verified via the
#      LANGCHAIN_VERBOSE=true log and x-ratelimit-limit-tokens header.
#   llama-4-scout-17b has 30 K TPM (x-ratelimit-limit-tokens: 30000,
#   confirmed via curl against our GROQ_API_KEY), proper function
#   calling, and no reasoning-token inflation → ~15-20 s per call at
#   typical browser-snapshot sizes → ~12 calls per 240 s test budget.

name: E2E opencheck (reusable)

on:
  workflow_call:
    inputs:
      base_url:
        description: "Base URL the E2E flow runs against (per-run staging URL)."
        required: true
        type: string
    secrets:
      GROQ_API_KEY:
        description: "Groq API key. Surfaced to ChatOpenAI via OPENAI_API_KEY + Groq OpenAI-compat base URL."
        required: true

# SK-CIPERM-001 — default-deny at workflow root.
permissions: {}

jobs:
  run:
    name: opencheck
    runs-on: ubuntu-latest
    # 240 s per-test × 14 tests = 56 min absolute worst case (cold cache,
    # isolated sessions). With sessionMode:persistent + the profile-lock
    # wrapper, each test starts where the last one left off — the agent
    # does ONE step instead of re-walking the full prereq chain, so
    # real runs land in the 15-25 min range. 45 min is comfortable slack
    # for the Playwright/opencheck dep installs + the trace upload.
    timeout-minutes: 45
    # SK-CIPERM-002 — minimal grant. No PR comment from this reusable
    # (callers attach their own surface via step summary / artifacts);
    # `contents: read` is enough for the checkout.
    permissions:
      contents: read
    env:
      BASE_URL: ${{ inputs.base_url }}
      # @langchain/openai's ChatOpenAI delegates to the OpenAI Node SDK,
      # which reads OPENAI_API_KEY + OPENAI_BASE_URL from env. Pointing
      # OPENAI_BASE_URL at Groq's OpenAI-compat endpoint routes every
      # /chat/completions call to Groq while keeping the SDK surface
      # identical.
      OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_BASE_URL: https://api.groq.com/openai/v1
      # Dump every LangChain step (model start/end, tool calls, tool
      # results) to stdout so the job log captures the full agent
      # loop. Without this we only see opencheck's high-level
      # PASS/FAIL/SKIP verdict and the LLM's after-the-fact reasoning
      # — useless for diagnosing why a test got stuck or which tool
      # call burned the timeout budget. Enabling adds ~5-10x to the
      # log volume but lands the post-mortem signal we need to
      # iterate on the cases. Drop once the cases stabilise.
      LANGCHAIN_VERBOSE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # The opencheck deps tree (LangChain v1 + Playwright MCP) is heavy
      # and intentionally NOT in root `workspaces:` to keep the global
      # CI install lean. Install locally instead.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # Playwright browser binaries (~150 MB) live outside node_modules
      # at ~/.cache/ms-playwright. @playwright/mcp 0.0.60 (and its
      # bundled playwright / playwright-core) has no postinstall, so
      # the binaries are pulled by the explicit `Install Playwright
      # Chromium` step below — this cache step just persists what that
      # step writes. Keyed on opencheck-tests package.json hash so a
      # dep bump that moves playwright's version invalidates cleanly;
      # otherwise we save the whole download on every run.
      - name: Restore Playwright browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/opencheck/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # opencheck's step cache. The point of caching it is to skip LLM
      # re-derivation when the UI hasn't changed; the point of keying on
      # app source (not just tests.yaml) is to invalidate when the UI
      # CAN have changed — otherwise opencheck's "self-healing on UI
      # changes" can quietly route past a regression. tests.yaml is in
      # the key too so edits to test cases force re-derivation.
      - name: Restore opencheck step cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tests/opencheck/.opencheck-cache
          key: opencheck-cache-${{ runner.os }}-${{ hashFiles('apps/web/src/**', 'apps/api/src/**', 'tests/opencheck/tests.yaml') }}
          restore-keys: |
            opencheck-cache-${{ runner.os }}-

      - name: Install opencheck deps
        working-directory: tests/opencheck
        # No frozen lockfile — `tests/opencheck/` is non-workspace and
        # we don't ship its bun.lock. Daily E2E doesn't need byte-for-byte
        # repro; minor patch drifts in @langchain/openai are acceptable.
        #
        # `@playwright/mcp` is pinned to 0.0.60 in package.json. Why:
        # opencheck@0.3.0 (`node_modules/opencheck/src/agent/mcp-client.ts:77,80`)
        # hardcodes `--save-trace` + `--save-video=...` when it spawns
        # @playwright/mcp. Those flags shipped through 0.0.60 and were
        # removed before 0.0.70. Without the pin, bun resolves
        # @playwright/mcp transitively from `npx -y @playwright/mcp@latest`
        # in opencheck's spawn path — which lands on 0.0.75 today and
        # the MCP stdio handshake dies on `error: unknown option
        # '--save-trace'`. opencheck's `resolvePlaywrightMcp()` checks
        # `process.cwd()/node_modules/@playwright/mcp/cli.js` first,
        # so pinning here makes opencheck use this version and bypass
        # the broken `--latest` path. Unpin once opencheck publishes a
        # fix that uses `--save-session`.
        run: bun install

      # Playwright browser binaries don't ship with any of the npm
      # packages above (no postinstall hook in @playwright/mcp@0.0.60,
      # playwright, or playwright-core). Without this step, Chromium
      # is absent at ~/.cache/ms-playwright/ and every opencheck test
      # fails because the MCP server can't find a browser executable.
      # Chromium-only — webkit/firefox aren't selected via tests.yaml.
      - name: Install Playwright Chromium
        working-directory: tests/opencheck
        run: bunx playwright install chromium

      # Patch @playwright/mcp CLI for three reasons:
      #
      # 1. --no-sandbox: GitHub-hosted ubuntu runners' AppArmor profile
      #    denies the unprivileged user-namespace clone Chromium needs.
      #    opencheck@0.3.0 has no sandbox config knob.
      #
      # 2. Profile lock cleanup (sessionMode:persistent): opencheck creates
      #    ONE user-data-dir for the whole run but spawns a NEW playwright-mcp
      #    subprocess per test. The previous test's Chromium may still hold
      #    the SingletonLock when the next subprocess starts, causing
      #    "Browser is already in use" on every test after the first.
      #    The wrapper kills any stale Chromium for the same profile (SIGTERM
      #    → 3 s grace → SIGKILL) and removes the lock before starting.
      #    Chromium writes cookies + localStorage to the profile dir on clean
      #    exit, so the session state survives across the per-test restarts.
      #
      # 3. Snapshot truncation: browser_snapshot returns ~40 KB accessibility
      #    trees per call. With LangChain's default message retention, context
      #    grows: 3 K → 13 K → 50 K+ tokens within one test, driving LLM call
      #    latency from ~1 s to 100 s and hitting the 240 s timeout. We spawn
      #    cli.original.js as a child process, pipe its stdio through, and
      #    truncate any MCP result content[].text block exceeding SNAP_LIMIT
      #    characters. 3000 chars ≈ 750 tokens — fits well inside a 30 K TPM
      #    budget per LLM call while preserving enough of the UI structure for
      #    the agent to navigate. Drop once opencheck exposes a snapshotLimit.
      #
      # Idempotent: if cli.original.js is already present (cached node_modules
      # or re-run), the step skips. Drop once opencheck fixes the above.
      - name: Patch @playwright/mcp to inject --no-sandbox + fix profile lock + truncate snapshots
        working-directory: tests/opencheck
        run: |
          set -euo pipefail
          cli="node_modules/@playwright/mcp/cli.js"
          orig="node_modules/@playwright/mcp/cli.original.js"
          if [ -f "$orig" ]; then
            echo "wrapper already in place — skipping"
            exit 0
          fi
          mv "$cli" "$orig"
          cat > "$cli" <<'EOF'
          #!/usr/bin/env node
          // --no-sandbox + profile-lock cleanup + snapshot truncation wrapper.
          // See _e2e-opencheck.yml step comment for full rationale.
          const { execSync, spawnSync, spawn } = require("child_process");
          const fs = require("fs");
          const path = require("path");
          const readline = require("readline");

          const SNAP_LIMIT = 3000; // chars per content[].text block

          // 1. Profile lock cleanup — must run before spawning Chromium.
          const userDataDirArg = process.argv.find(a => a.startsWith("--user-data-dir="));
          if (userDataDirArg) {
            const dir = userDataDirArg.slice("--user-data-dir=".length);
            const lock = path.join(dir, "SingletonLock");
            if (fs.existsSync(lock)) {
              try { execSync(`pkill -TERM -f "user-data-dir=${dir}"`, { stdio: "ignore" }); } catch {}
              const deadline = Date.now() + 3000;
              while (fs.existsSync(lock) && Date.now() < deadline) spawnSync("sleep", ["0.1"]);
              try { fs.unlinkSync(lock); } catch {}
            }
          }

          // 2. Inject --no-sandbox and spawn the real CLI as a child.
          const args = [...process.argv.slice(2), "--no-sandbox"];
          const child = spawn(process.execPath, [path.join(__dirname, "cli.original.js"), ...args], {
            stdio: ["inherit", "pipe", "inherit"],
          });

          // 3. Intercept child stdout line-by-line; truncate large snapshot blobs.
          const rl = readline.createInterface({ input: child.stdout, crlfDelay: Infinity });
          rl.on("line", (line) => {
            let msg;
            try { msg = JSON.parse(line); } catch { process.stdout.write(line + "\n"); return; }
            // MCP tool result messages have result.content[].text
            if (msg && msg.result && Array.isArray(msg.result.content)) {
              msg.result.content = msg.result.content.map((block) => {
                if (block.type === "text" && typeof block.text === "string" && block.text.length > SNAP_LIMIT) {
                  const truncated = block.text.slice(0, SNAP_LIMIT);
                  const dropped = block.text.length - SNAP_LIMIT;
                  return { ...block, text: truncated + `\n[... ${dropped} chars truncated by wrapper ...]` };
                }
                return block;
              });
            }
            process.stdout.write(JSON.stringify(msg) + "\n");
          });

          child.on("exit", (code, signal) => {
            if (signal) process.kill(process.pid, signal);
            else process.exit(code ?? 0);
          });
          EOF
          chmod +x "$cli"
          echo "patched $cli"

      # opencheck's YAML parser does NOT interpolate env vars; substitute
      # the placeholder before invocation. Writing to a new file (not
      # mutating the checked-in tests.yaml) keeps the working tree clean.
      - name: Render tests.yaml with runtime baseUrl
        working-directory: tests/opencheck
        run: |
          sed "s|__BASE_URL__|${BASE_URL}|g" tests.yaml > tests-runtime.yaml
          echo "::group::rendered tests-runtime.yaml"
          cat tests-runtime.yaml
          echo "::endgroup::"

      - name: Run opencheck
        id: oc
        working-directory: tests/opencheck
        shell: bash
        # `set +e` + PIPESTATUS so a non-zero opencheck exit doesn't kill
        # the job before we can capture the log + upload recordings.
        run: |
          set +e
          bunx opencheck --config tests-runtime.yaml 2>&1 | tee /tmp/opencheck-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # opencheck writes Playwright traces + videos into
      # `.opencheck-recordings/`. Always upload, even on success — first
      # successful run lets us validate the artifact path; failure runs
      # drag the trace.zip into trace.playwright.dev for triage.
      - name: Upload recordings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opencheck-recordings-${{ github.run_id }}
          path: tests/opencheck/.opencheck-recordings/
          if-no-files-found: ignore
          retention-days: 30

      - name: Step summary
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.oc.outputs.exit_code }}
          STAGING_URL: ${{ inputs.base_url }}
        run: |
          {
            echo "## opencheck results"
            echo
            if [ "$EXIT_CODE" = "0" ]; then
              echo "✅ All tests passed"
            else
              echo "❌ Tests failed (exit code $EXIT_CODE)"
            fi
            echo
            echo "- Staging URL: $STAGING_URL"
            echo "- Recordings: see the \`opencheck-recordings-${{ github.run_id }}\` artifact on this run."
            echo "- Trace viewer: drag \`trace.zip\` into https://trace.playwright.dev"
            echo
            echo "### Run log"
            echo '```'
            cat /tmp/opencheck-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Propagate opencheck exit code
        if: always()
        shell: bash
        run: exit "${{ steps.oc.outputs.exit_code }}"
