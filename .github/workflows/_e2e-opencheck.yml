# Reusable: run one opencheck suite against a given baseUrl via the OpenAI-compatible endpoint (workflow_call only — callers drive it).
# OpenAI-compat: opencheck pins @langchain/core ^1.1.24 (v1 ecosystem); @langchain/openai v1.4.5 matches; Groq + OpenRouter :free all expose compatible endpoints.
#
# FREE MODELS ONLY (GLOBAL-013 — $0 free tier). NEVER wire a paid model here, even via OpenRouter — :free suffix required on OpenRouter slugs.
# The agent model is NOT hard-coded: the pre-flight walks `candidate_models` in order and the first
# model that answers a real tool-call probe is substituted into the suite YAML (`model: "__MODEL__"`).
# PRIMARY lane = NVIDIA NIM gpt-oss-120b (2026-07-11 swap): OpenRouter's free pool saturates as a
# unit and FLAPS past the 3-probe gate (13 consecutive failed runs 07-02 → 07-10, then 216s
# agent-starvation on a probe-healthy pick, run 29144964531), while the NIM pool — same weights,
# independent $0 dev-program tier, ~40 RPM — ran agent tests in 7.7–25s on both live firings.
# When the primary lane is unhealthy the pre-flight walks the fallback lane (`fallback_*` inputs;
# default = the previous 5-candidate OpenRouter `:free` walk).
# Canonical free-model table + switching guide: docs/features/e2e-coverage/opencheck-operations.md

name: E2E opencheck (reusable)

on:
  workflow_call:
    inputs:
      base_url:
        description: "Base URL the E2E flow runs against (per-run staging URL)."
        required: true
        type: string
      config_file:
        description: "opencheck config file relative to tests/opencheck/ (e.g. tests-a-bootstrap.yaml)."
        required: true
        type: string
      provider_base_url:
        description: "OpenAI-compatible base URL for the agent LLM provider (must be free per GLOBAL-013). Default NVIDIA NIM ($0 dev-program tier, ~40 RPM, NOT in the app's engine chain — the two-budget split invariant): promoted from fallback to primary 2026-07-11 after OpenRouter's shared free pool flapped past the 3-probe gate (216s agent starvation, run 29144964531) while NIM ran the same tests in 7.7–25s."
        required: false
        type: string
        default: https://integrate.api.nvidia.com/v1
      candidate_models:
        description: "Ordered comma-separated agent-model ids on provider_base_url, ALL free per GLOBAL-013. Pre-flight picks the first one that answers 3 consecutive tool-call probes. gpt-oss-120b = the same weights as the only model with a full green run. Per-model evidence + run ids: docs/features/e2e-coverage/opencheck-operations.md."
        required: false
        type: string
        default: "openai/gpt-oss-120b"
      fallback_provider_base_url:
        description: "Second-provider lane walked only when EVERY primary candidate fails the pre-flight. Default OpenRouter (the pre-2026-07-11 primary): 5 `:free` candidates, model-diverse but pool-identical — its free pool saturates as a unit for hours (13 consecutive failed runs 07-02→07-10), so it now backs up the independent NIM pool instead of fronting it."
        required: false
        type: string
        default: https://openrouter.ai/api/v1
      fallback_candidate_models:
        description: "Ordered agent-model ids on fallback_provider_base_url, ALL free per GLOBAL-013 — on OpenRouter the `:free` suffix is REQUIRED (a bare slug is PAID; 2026-05-21 a paid Mistral slug burned ~$14). Order = proven agent competence first; nemotron-3-super is BANNED (probe-healthy but collapses to text-format tool calls mid-loop)."
        required: false
        type: string
        default: "openai/gpt-oss-120b:free,qwen/qwen3-coder:free,qwen/qwen3-next-80b-a3b-instruct:free,meta-llama/llama-3.3-70b-instruct:free,openai/gpt-oss-20b:free"
    secrets:
      LLM_API_KEY:
        description: "LLM API key for the active provider. Surfaced via OPENAI_API_KEY + provider-specific OPENAI_BASE_URL."
        required: true
      FALLBACK_LLM_API_KEY:
        description: "API key for fallback_provider_base_url. Omit to disable the fallback lane."
        required: false

# SK-CIPERM-001 — default-deny at workflow root.
permissions: {}

jobs:
  run:
    name: opencheck
    runs-on: ubuntu-latest
    # persistent-mode actual: 20-30 min; 60 min covers dep-install + trace-upload slack.
    timeout-minutes: 60
    # SK-CIPERM-002 — minimal grant. No PR comment from this reusable
    # (callers attach their own surface via step summary / artifacts);
    # `contents: read` is enough for the checkout.
    permissions:
      contents: read
    env:
      BASE_URL: ${{ inputs.base_url }}
      # ChatOpenAI reads OPENAI_API_KEY + OPENAI_BASE_URL; update both to swap provider.
      OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
      # Provider endpoint — caller-supplied so each suite can use an independent free-tier budget (GLOBAL-013).
      # Every id in `candidate_models` must exist on this endpoint.
      OPENAI_BASE_URL: ${{ inputs.provider_base_url }}
      # Opt-in debug: flip to "true" to dump the full agent loop (~5-10x log
      # volume) when triaging a stuck case. Off by default — keeps job logs readable.
      LANGCHAIN_VERBOSE: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # opencheck deps intentionally excluded from root workspaces (LangChain v1 + Playwright MCP would bloat global CI install).
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # Playwright bins live at ~/.cache/ms-playwright; no postinstall — explicit install step below writes them.
      - name: Restore Playwright browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/opencheck/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Skip LLM re-derivation on unchanged UI; keyed on app + config file; cleared below and re-saved fresh.
      - name: Restore opencheck step cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tests/opencheck/.opencheck-cache
          key: opencheck-cache-${{ runner.os }}-${{ inputs.config_file }}-${{ hashFiles('apps/web/src/**', 'apps/api/src/**', format('tests/opencheck/{0}', inputs.config_file)) }}
          restore-keys: |
            opencheck-cache-${{ runner.os }}-${{ inputs.config_file }}-
            opencheck-cache-${{ runner.os }}-

      # Always start fresh — stale plans omit steps from prior page state; post-job hook re-saves fresh ones.
      - name: Clear stale opencheck step cache
        working-directory: tests/opencheck
        run: rm -rf .opencheck-cache

      - name: Install opencheck deps
        working-directory: tests/opencheck
        # No frozen lockfile — non-workspace dir, bun.lock not shipped; minor patch drift acceptable.
        # @playwright/mcp pinned to 0.0.60: opencheck@0.3.0 hardcodes --save-trace flag removed after 0.0.60.
        run: bun install

      # No postinstall hook in @playwright/mcp@0.0.60 — binaries must be installed explicitly.
      - name: Install Playwright Chromium
        working-directory: tests/opencheck
        run: bunx playwright install chromium

      # Wrapper injects --no-sandbox (AppArmor), cleans SingletonLock between tests (persistent sessionMode), truncates snapshots at 8K chars to prevent context bloat.
      - name: Patch @playwright/mcp — no-sandbox + profile lock + snapshot truncation
        working-directory: tests/opencheck
        run: |
          set -euo pipefail
          cli="node_modules/@playwright/mcp/cli.js"
          orig="node_modules/@playwright/mcp/cli.original.js"
          if [ -f "$orig" ]; then
            echo "wrapper already in place — skipping"
            exit 0
          fi
          mv "$cli" "$orig"
          cat > "$cli" <<'EOF'
          #!/usr/bin/env node
          // --no-sandbox + profile-lock cleanup + snapshot truncation wrapper.
          const { spawnSync, spawn } = require("child_process");
          const fs = require("fs");
          const path = require("path");
          const readline = require("readline");

          const SNAP_LIMIT = 8000; // total chars kept per content[].text block
          // Keep a trailing slice, not just the head: the chat composer + Send control render
          // AFTER the message list in the DOM (apps/web ChatPanel.tsx), so head-only truncation
          // hid their refs once the persistent-session history grew past ~8K chars — the agent
          // then couldn't click "Ask about your data…" in the later read tests. A head+tail
          // window keeps bottom-of-DOM interactive elements reachable at the same token budget.
          const SNAP_TAIL = 2000;

          // 1. Profile lock cleanup — must run before spawning Chromium.
          const userDataDirArg = process.argv.find(a => a.startsWith("--user-data-dir="));
          if (userDataDirArg) {
            const dir = userDataDirArg.slice("--user-data-dir=".length);
            const lock = path.join(dir, "SingletonLock");
            // Always kill — Chromium can be orphaned with lock removed after non-timeout exits.
            // pgrep finds stale PIDs; filter own PID to avoid self-kill (wrapper argv also has user-data-dir).
            const pgrepOut = spawnSync("pgrep", ["-f", `user-data-dir=${dir}`], { encoding: "utf8" });
            const stalePids = (pgrepOut.stdout || "").trim().split("\n")
              .filter(p => p.trim() && p.trim() !== String(process.pid));
            if (stalePids.length > 0) {
              for (const pid of stalePids) {
                try { spawnSync("kill", ["-TERM", pid.trim()], { stdio: "ignore" }); } catch {}
              }
              const deadline = Date.now() + 3000;
              while (fs.existsSync(lock) && Date.now() < deadline) spawnSync("sleep", ["0.1"]);
              for (const pid of stalePids) {
                try { spawnSync("kill", ["-KILL", pid.trim()], { stdio: "ignore" }); } catch {}
              }
              spawnSync("sleep", ["0.5"]);
            }
            try { fs.unlinkSync(lock); } catch {}
          }

          // 2. Inject --no-sandbox and spawn the real CLI as a child.
          const args = [...process.argv.slice(2), "--no-sandbox"];
          const child = spawn(process.execPath, [path.join(__dirname, "cli.original.js"), ...args], {
            stdio: ["inherit", "pipe", "inherit"],
          });

          // 3. Intercept child stdout line-by-line; truncate large snapshot blobs.
          const rl = readline.createInterface({ input: child.stdout, crlfDelay: Infinity });
          rl.on("line", (line) => {
            let msg;
            try { msg = JSON.parse(line); } catch { process.stdout.write(line + "\n"); return; }
            if (msg && msg.result && Array.isArray(msg.result.content)) {
              msg.result.content = msg.result.content.map((block) => {
                if (block.type === "text" && typeof block.text === "string" && block.text.length > SNAP_LIMIT) {
                  const head = block.text.slice(0, SNAP_LIMIT - SNAP_TAIL);
                  const tail = block.text.slice(-SNAP_TAIL);
                  const dropped = block.text.length - SNAP_LIMIT;
                  return { ...block, text: `${head}\n[... ${dropped} chars truncated by wrapper ...]\n${tail}` };
                }
                return block;
              });
            }
            process.stdout.write(JSON.stringify(msg) + "\n");
          });

          // Drain readline before exiting so no buffered JSON lines are lost when the child exits.
          let childExitCode = null;
          let childSignal = null;
          child.on("exit", (code, signal) => {
            childExitCode = code; childSignal = signal;
          });
          rl.on("close", () => {
            if (childSignal) process.kill(process.pid, childSignal);
            else process.exit(childExitCode ?? 0);
          });
          EOF
          chmod +x "$cli"
          echo "patched $cli"

      # Patch opencheck system prompt: replace "prefer browser_evaluate" with browser_snapshot guidance.
      # browser_evaluate runs code in the BROWSER context — Playwright API (page.*) is not available there,
      # causing "not well-serializable" / "Not connected" loops (model-agnostic; first hit on mistral-small).
      - name: Patch opencheck — fix browser_evaluate system-prompt guidance
        working-directory: tests/opencheck
        run: |
          agent_ts="node_modules/opencheck/src/agent/agent-factory.ts"
          sed -i \
            's|"Token efficiency:",|"Important: browser_evaluate runs in the BROWSER context — page.* Playwright API is NOT available inside it.",|' \
            "$agent_ts"
          sed -i \
            's|"- Prefer browser_evaluate (returns only the JS result, not the full page tree) over",|"- Use browser_snapshot to read page state and check elements, text, or loading states.",|' \
            "$agent_ts"
          sed -i \
            's|"  browser_snapshot for checking elements, text, loading states, and polling.",|"- Only use browser_evaluate for pure browser JS (document.querySelector etc.) — never pass page.* API.",|' \
            "$agent_ts"
          echo "patched $agent_ts"

      # Add 30s per-call HTTP timeout + retry-with-backoff to the LLM client. Without the timeout, a hung
      # provider response burns the entire 240s test budget silently — no error, no recording, just a
      # timeout at the test level. 30s is plenty for any real LLM response; if the provider doesn't reply
      # in 30s it's effectively down. maxRetries 6 (LangChain exponential backoff) absorbs the BRIEF
      # saturation blips of OpenRouter free pools — run 28759073164 lost 10 tests to mid-run 429s that a
      # pre-flight can't predict (default maxRetries is 2, which the flapping pool outlasted).
      - name: Patch opencheck — add 30s per-call LLM timeout + 429 backoff
        working-directory: tests/opencheck
        run: |
          model_ts="node_modules/opencheck/src/agent/model-factory.ts"
          python3 - "$model_ts" <<'PYEOF'
          import sys
          path = sys.argv[1]
          with open(path) as f:
              src = f.read()
          old = '...(config.modelProvider ? { modelProvider: config.modelProvider } : {}),'
          new = '...(config.modelProvider ? { modelProvider: config.modelProvider } : {}),\n    timeout: 30000,\n    maxRetries: 6,'
          if old not in src:
              print(f"WARNING: target string not found in {path} — skipping patch")
          else:
              with open(path, 'w') as f:
                  f.write(src.replace(old, new, 1))
              print(f"patched {path} (added timeout: 30000, maxRetries: 6)")
          PYEOF

      # Fail-fast: pick the first HEALTHY candidate model before burning 20+ min on opencheck.
      # The probe is tool-call shaped (the agent loop is all tool calls — a model that answers "ping"
      # but can't emit tool_calls would pass a plain probe and then fail every test), and it inspects
      # the BODY, not just the status code: OpenRouter returns HTTP 200 with an `error` envelope when
      # the model's free pool is saturated (same gateway trap the engine fixed as SK-LLM-042).
      # THREE consecutive probes ~2s apart, all healthy: saturated free pools FLAP — run 28756818845's
      # Suite A watched gpt-oss-120b:free pass a single probe at :55 and then 429 every agent call
      # from :00 to :19. One lucky 200 is not health; three in a row over ~5s almost always is.
      - name: Pre-flight — pick the first healthy agent model
        id: pick
        shell: bash
        env:
          CANDIDATE_MODELS: ${{ inputs.candidate_models }}
          FALLBACK_BASE_URL: ${{ inputs.fallback_provider_base_url }}
          FALLBACK_CANDIDATE_MODELS: ${{ inputs.fallback_candidate_models }}
          FALLBACK_API_KEY: ${{ secrets.FALLBACK_LLM_API_KEY }}
        run: |
          set -euo pipefail
          probe() {
            local model="$1" base_url="$2" api_key="$3"
            local http_code
            http_code=$(curl -s -o /tmp/llm-preflight.json -w "%{http_code}" \
              --max-time 15 \
              -H "Authorization: Bearer ${api_key}" \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"${model}\",\"messages\":[{\"role\":\"user\",\"content\":\"Click the button with ref b1 using the click tool.\"}],\"tools\":[{\"type\":\"function\",\"function\":{\"name\":\"click\",\"description\":\"Click an element\",\"parameters\":{\"type\":\"object\",\"properties\":{\"ref\":{\"type\":\"string\"}},\"required\":[\"ref\"]}}}],\"max_tokens\":2000}" \
              "${base_url}/chat/completions") || { echo "  curl failed/timed out"; return 1; }
            if [ "$http_code" != "200" ]; then
              echo "  HTTP ${http_code}"
              return 1
            fi
            if jq -e '.error' /tmp/llm-preflight.json > /dev/null 2>&1; then
              echo "  HTTP 200 but error envelope in body (SK-LLM-042 trap): $(jq -c '.error | {code, message}' /tmp/llm-preflight.json)"
              return 1
            fi
            if ! jq -e '.choices[0].message.tool_calls[0].function.name == "click"' /tmp/llm-preflight.json > /dev/null 2>&1; then
              echo "  no well-formed tool call in reply"
              return 1
            fi
            return 0
          }
          # Walk one provider lane; on the first healthy model, emit outputs and exit 0.
          walk_lane() {
            local base_url="$1" api_key="$2" models_csv="$3" is_fallback="$4"
            local models m i healthy
            IFS=',' read -ra models <<< "${models_csv// /}"
            for m in "${models[@]}"; do
              echo "Probing ${m} on ${base_url} (3 consecutive tool-call probes, 15s timeout each)..."
              healthy=true
              for i in 1 2 3; do
                if ! probe "$m" "$base_url" "$api_key"; then
                  echo "  probe ${i}/3 failed — trying next candidate"
                  healthy=false
                  break
                fi
                echo "  probe ${i}/3 ok"
                [ "$i" -lt 3 ] && sleep 2
              done
              if [ "$healthy" = true ]; then
                echo "Selected agent model: ${m} on ${base_url}"
                echo "model=${m}" >> "$GITHUB_OUTPUT"
                echo "use_fallback=${is_fallback}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
          }
          walk_lane "${OPENAI_BASE_URL}" "${OPENAI_API_KEY}" "${CANDIDATE_MODELS}" "false"
          # Each lane is one upstream pool — walk the second provider before giving up.
          if [ -n "${FALLBACK_API_KEY}" ] && [ -n "${FALLBACK_CANDIDATE_MODELS}" ]; then
            echo "No primary candidate healthy — walking the fallback provider lane."
            walk_lane "${FALLBACK_BASE_URL}" "${FALLBACK_API_KEY}" "${FALLBACK_CANDIDATE_MODELS}" "true"
            fallback_state="${FALLBACK_CANDIDATE_MODELS} also unhealthy"
          else
            fallback_state="lane disabled (FALLBACK_LLM_API_KEY unset)"
          fi
          echo "ERROR: no candidate agent model is healthy right now (primary: ${CANDIDATE_MODELS}; fallback: ${fallback_state}) — aborting before burning the opencheck budget"
          exit 1

      # opencheck's YAML parser doesn't interpolate env vars — substitute at invocation time into a temp file (keeps working tree clean).
      - name: Render config with runtime baseUrl + selected model
        working-directory: tests/opencheck
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
          AGENT_MODEL: ${{ steps.pick.outputs.model }}
        run: |
          sed -e "s|__BASE_URL__|${BASE_URL}|g" -e "s|__MODEL__|${AGENT_MODEL}|g" "${CONFIG_FILE}" > tests-runtime.yaml
          echo "::group::rendered ${CONFIG_FILE} → tests-runtime.yaml"
          cat tests-runtime.yaml
          echo "::endgroup::"

      - name: Run opencheck
        id: oc
        working-directory: tests/opencheck
        shell: bash
        # Step-level env re-points the agent at whichever provider lane the
        # pre-flight selected (step env overrides the job-level primary).
        env:
          OPENAI_BASE_URL: ${{ steps.pick.outputs.use_fallback == 'true' && inputs.fallback_provider_base_url || inputs.provider_base_url }}
          OPENAI_API_KEY: ${{ steps.pick.outputs.use_fallback == 'true' && secrets.FALLBACK_LLM_API_KEY || secrets.LLM_API_KEY }}
        # `set +e` + PIPESTATUS so a non-zero opencheck exit doesn't kill
        # the job before we can capture the log + upload recordings.
        run: |
          set +e
          bunx opencheck --config tests-runtime.yaml 2>&1 | tee /tmp/opencheck-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # Always upload even on success — failure runs drag trace.zip into trace.playwright.dev for triage.
      - name: Upload recordings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opencheck-recordings-${{ inputs.config_file }}-${{ github.run_id }}
          path: tests/opencheck/.opencheck-recordings/
          # .opencheck-recordings is a dot-folder; upload-artifact@v4.4+ excludes hidden
          # paths by default, which silently dropped every trace ("No files were found").
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 30

      - name: Step summary
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.oc.outputs.exit_code }}
          STAGING_URL: ${{ inputs.base_url }}
          CONFIG_FILE: ${{ inputs.config_file }}
        run: |
          {
            echo "## opencheck results — ${CONFIG_FILE}"
            echo
            if [ "$EXIT_CODE" = "0" ]; then
              echo "✅ All tests passed"
            else
              echo "❌ Tests failed (exit code $EXIT_CODE)"
            fi
            echo
            echo "- Suite config: \`${CONFIG_FILE}\`"
            echo "- Staging URL: $STAGING_URL"
            echo "- Recordings: see the \`opencheck-recordings-${CONFIG_FILE}-${{ github.run_id }}\` artifact on this run."
            echo "- Trace viewer: drag \`trace.zip\` into https://trace.playwright.dev"
            echo
            echo "### Run log (last 800 KB)"
            echo '```'
            # Missing file = the job aborted before opencheck ran (e.g. no healthy agent model).
            tail -c 800000 /tmp/opencheck-output.txt 2>/dev/null || echo "(no opencheck output — job aborted before the opencheck step)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Propagate opencheck exit code
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.oc.outputs.exit_code }}
        # Empty when opencheck never ran (pre-flight abort) — `exit ""` is a shell error, so default to 1.
        run: exit "${EXIT_CODE:-1}"
