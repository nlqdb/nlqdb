# `@nlqdb/*` npm releases via changesets. Per-package gate is
# `"private": true`; un-gated packages emit `dist/` and ship.
# Auth path: OIDC trusted publishing (SK-CIPERM-003) — no NPM_TOKEN.
# Trusted Publisher config per package: see .changeset/README.md.

name: Release npm

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: changesets version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      # fetch-depth: 0 so changesets can diff history for the CHANGELOG.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # OIDC trusted publishing requires npm >= 11.5.1; the shared setup pins
      # Node 22 (bundled npm 10.9.7). Override to Node 24 (bundles npm 11.x)
      # here, with registry-url so .npmrc primes the OIDC-aware endpoint.
      # Skipping a direct `npm install -g npm@latest` step on purpose: it hits
      # npm/cli#9151 when jumping major versions, and Node 24's bundled npm
      # already clears the OIDC threshold.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Add a filter entry as each `@nlqdb/*` package un-gates (see .changeset/README.md).
      - name: Build publishable packages
        run: bun run --filter='@nlqdb/sdk' --filter='@nlqdb/cli' build

      - name: Create Version PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
