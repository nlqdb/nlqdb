# `@nlqdb/*` npm releases via changesets. Per-package gate is
# `"private": true`; un-gated packages emit `dist/` and ship.
# Auth path documented in .changeset/README.md (Trusted Publishing
# default per SK-CIPERM-003; NPM_TOKEN bootstrap for first publish).

name: Release npm

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: changesets version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      # fetch-depth: 0 so changesets can diff history for the CHANGELOG.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # Trusted Publishing requires npm CLI ≥ 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm to v11
        run: npm install -g npm@11

      # Add a filter entry as each `@nlqdb/*` package un-gates (see .changeset/README.md).
      - name: Build publishable packages
        run: bun run --filter='@nlqdb/sdk' build

      - name: Create Version PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bootstrap-only: remove once every un-gated @nlqdb/* has a Trusted Publisher configured.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Sigstore-signed provenance attestations on every publish (works under both NPM_TOKEN and OIDC paths).
          NPM_CONFIG_PROVENANCE: "true"
