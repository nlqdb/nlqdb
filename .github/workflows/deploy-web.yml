# nlqdb — auto-deploy apps/web on merge to main.
#
# Static Astro site served via Cloudflare Workers Static Assets
# (migrated off Pages 2026-04). `astro build` emits dist/, then
# `wrangler deploy` from apps/web uploads the assets bundle.
#
# Manual re-deploy: workflow_dispatch on the Actions tab, or
# `bun run --cwd apps/web deploy` from a dev machine.

name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/elements/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  id-token: write
  attestations: write

jobs:
  deploy:
    name: astro build + wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run --cwd apps/web build

      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "apps/web/dist/**"

      - name: Deploy to Cloudflare Workers Static Assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
