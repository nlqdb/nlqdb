# nlqdb — auto-deploy apps/web on merge to main.
#
# Static Astro site served via Cloudflare Workers Static Assets
# (migrated off Pages 2026-04). `astro build` emits dist/, then
# `wrangler deploy` from apps/web uploads the assets bundle.
#
# Manual re-deploy: workflow_dispatch on the Actions tab, or
# `bun run --cwd apps/web deploy` from a dev machine.

name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/elements/**"
      - "packages/sdk/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  id-token: write
  attestations: write

jobs:
  deploy:
    name: astro build + wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # `astro build` writes apps/web/dist; the SLSA attestation step
      # below globs that path, so this build must succeed before the
      # attestation runs.
      #
      # `PUBLIC_API_BASE` is baked into the client bundle at build time
      # (Astro/Vite exposes `PUBLIC_*` env vars to client code via
      # `import.meta.env.PUBLIC_API_BASE`). The marketing hero on
      # `nlqdb.com` POSTs to `${apiBase}/v1/ask`; without this env the
      # build falls back to `""` (same-origin), which 404s on `nlqdb-web`
      # because the marketing Worker has no `/v1/*` route. Cross-origin
      # to `app.nlqdb.com` works because the API CORS allow-list already
      # includes `https://nlqdb.com` (`apps/api/src/index.ts`
      # `CORS_ALLOWED_ORIGINS`). Preview builds (`preview-app.yml`)
      # deliberately leave this unset so the preview hero stays
      # same-origin — see comment in `apps/web/src/components/Hero.astro`.
      # NOTE: this env block covers only the nlqdb.com (marketing) copy
      # of the bundle. app.nlqdb.com serves the copy deploy-api.yml
      # builds — keep the two env blocks mirrored (deploy-api.yml omits
      # PUBLIC_API_BASE on purpose: same-origin there).
      - name: Build site
        env:
          PUBLIC_API_BASE: https://app.nlqdb.com
          # Cloudflare Turnstile sitekey for the anon-create bot floor
          # (SK-ANON-009/012). Baked into the client bundle at build time
          # (`import.meta.env.PUBLIC_TURNSTILE_SITE_KEY`, read by
          # `apps/web/src/lib/turnstile.ts`). Public by design — safe as a
          # literal, mirroring PUBLIC_API_BASE above. Widget: nlqdb-anon,
          # invisible mode, domains nlqdb.com + app.nlqdb.com. ARM IN
          # LOCKSTEP: the matching worker secret TURNSTILE_SECRET must be
          # set on the prod API in the same release this ships — a secret
          # without this sitekey 428-kills every anon create (run-56).
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAAD3WnUiwKEWfcy_X
          # PostHog client capture on the /app product surfaces only
          # (SK-WEB-024 / GLOBAL-034). Key lives in repo secrets
          # (founder-resolved 2026-07-16 — never a literal in the repo);
          # `scripts/mirror-secrets-gha.sh` sets both from .envrc. Absent
          # on preview/local builds → the SDK never loads, so marketing +
          # previews stay SDK-free.
          PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_API_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: bun run --cwd apps/web build

      # SLSA L3 build-provenance attestation. The action's
      # /repos/.../attestations API requires GitHub Pro/Team/Enterprise
      # OR a public repository — `nlqdb/nlqdb` is private + Free, so
      # the API rejects with "Feature not available for the nlqdb
      # organization" and would fail the deploy. `continue-on-error`
      # keeps the deploy unblocked; once the repo flips public (Phase
      # 3+ per README) or we're on a paid plan, attestations start
      # publishing automatically with no further change.
      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        continue-on-error: true
        with:
          subject-path: "apps/web/dist/**"

      - name: Deploy to Cloudflare Workers Static Assets
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

      # Push the freshly-deployed sitemap URLs to IndexNow (Bing / Yandex /
      # Seznam / Naver — not Google). Runs after deploy so the <key>.txt
      # file and any new pages are already live when engines verify the key.
      # Non-blocking: an IndexNow outage must never fail a web deploy
      # (SK-WEB-023). No secrets — the IndexNow key is public by design.
      - name: Ping IndexNow with the live sitemap
        continue-on-error: true
        run: bun scripts/submit-indexnow.ts
