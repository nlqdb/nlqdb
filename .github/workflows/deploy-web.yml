# nlqdb — auto-deploy apps/web on merge to main.
#
# Static Astro site served via Cloudflare Workers Static Assets
# (migrated off Pages 2026-04). `astro build` emits dist/, then
# `wrangler deploy` from apps/web uploads the assets bundle.
#
# Manual re-deploy: workflow_dispatch on the Actions tab, or
# `bun run --cwd apps/web deploy` from a dev machine.

name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/elements/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  id-token: write
  attestations: write

jobs:
  deploy:
    name: astro build + wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # `astro build` writes apps/web/dist; the SLSA attestation step
      # below globs that path, so this build must succeed before the
      # attestation runs.
      - name: Build site
        run: bun run --cwd apps/web build

      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "apps/web/dist/**"

      - name: Deploy to Cloudflare Workers Static Assets
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
