# Per-PR `wrangler versions upload` to nlqdb-mcp-server with a sticky
# pr-<N> preview alias. Bindings (OAUTH_KV, McpAgent DO) are inherited
# from prod — previews are author-only, fine to share OAuth state.

name: Preview MCP server

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/mcp/**"
      - "packages/mcp/**"
      - "packages/sdk/**"
      - "packages/otel/**"
      - ".github/workflows/preview-mcp.yml"

concurrency:
  group: preview-mcp-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: wrangler versions upload
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # Direct wrangler call — wrangler-action's deployment-url output
      # is broken for `versions upload` (cloudflare/wrangler-action#343).
      - name: Upload preview version
        id: deploy
        working-directory: apps/mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
        run: |
          mkdir -p "$WRANGLER_OUTPUT_FILE_DIRECTORY"
          bunx wrangler versions upload \
            --message "PR #${{ github.event.number }} @ ${{ github.event.pull_request.head.sha }}" \
            --preview-alias "pr-${{ github.event.number }}"

      - name: Extract preview URL
        if: steps.deploy.outcome == 'success'
        env:
          WRANGLER_OUTPUT_FILE_DIRECTORY: ${{ github.workspace }}/wrangler-out
        run: ./scripts/extract-wrangler-preview-url.sh

      - name: Sticky preview comment
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
          BOOTSTRAP_NEEDED: ${{ env.PREVIEW_BOOTSTRAP_NEEDED }}
        with:
          script: |
            const url = process.env.PREVIEW_URL || '';
            const bootstrap = process.env.BOOTSTRAP_NEEDED === '1';
            const sha = context.sha.slice(0, 7);
            const marker = '<!-- preview-mcp-sticky -->';
            const ts = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';

            const lines = [marker, '🔌 **Preview MCP server uploaded**', ''];
            if (bootstrap) {
              lines.push('- Status: **bootstrap required** — `nlqdb-mcp-server` has never been deployed. Merge to `main` (or run `deploy-mcp.yml` once) to provision the workers.dev subdomain.');
            } else if (url) {
              const base = url.replace(/\/$/, '');
              lines.push(`- URL: <${url}>`, `- MCP endpoint: \`${base}/mcp\``, `- OAuth discovery: \`${base}/.well-known/oauth-authorization-server\``);
            } else {
              lines.push('- Status: deploy succeeded but URL not captured — see run log.');
            }
            lines.push(`- Commit: \`${sha}\``, `- Updated: ${ts}`);

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
