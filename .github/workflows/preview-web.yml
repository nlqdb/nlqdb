# nlqdb — preview deploys for apps/web on every PR push.
#
# Workers Versions: each PR push uploads a non-production version of
# the apps/web Worker (Static Assets bundle inherited from the prod
# config). CF assigns a stable `<id>-nlqdb-web.<account>.workers.dev`
# URL per version. The promoted version (and nlqdb.com) stay untouched
# until merge runs `wrangler deploy` via deploy-web.yml.

name: Preview web

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/web/**"
      - "packages/elements/**"
      - ".github/workflows/preview-web.yml"

concurrency:
  group: preview-web-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: astro build + wrangler versions upload
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run --cwd apps/web build

      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: versions upload --message "PR #${{ github.event.number }} ${{ github.sha }}"

      - name: Sticky preview comment
        uses: actions/github-script@v7
        env:
          # Pass wrangler output via env, not GitHub interpolation —
          # multi-line stdout/stderr breaks the JS template-string
          # interpolation `${{ ... }}` produces. Search both since
          # wrangler emits the per-version URL on stderr in some
          # versions and stdout in others.
          WRANGLER_STDOUT: ${{ steps.deploy.outputs.command-output }}
          WRANGLER_STDERR: ${{ steps.deploy.outputs.command-stderr }}
        with:
          script: |
            const all = `${process.env.WRANGLER_STDOUT ?? ''}\n${process.env.WRANGLER_STDERR ?? ''}`;
            // `wrangler versions upload` prints the per-version URL as
            // `https://<id>-nlqdb-web.<subdomain>.workers.dev`. Match
            // any *.workers.dev URL with the worker name in the host.
            const match = all.match(/https:\/\/[a-z0-9-]+-nlqdb-web\.[a-z0-9.-]+\.workers\.dev/i);
            const url = match ? match[0] : '';
            const sha = context.sha.slice(0, 7);
            const marker = '<!-- preview-web-sticky -->';
            const ts = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';

            const urlLine = url
              ? `- URL: <${url}>`
              : '- URL: `<id>-nlqdb-web.omer-hochman.workers.dev` (latest version visible in the dashboard → `nlqdb-web` → Versions)';

            const body = [
              marker,
              '🌐 **Preview web deployed**',
              '',
              urlLine,
              `- Worker: \`nlqdb-web\` (preview version — non-production)`,
              `- Commit: \`${sha}\``,
              `- Updated: ${ts}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
