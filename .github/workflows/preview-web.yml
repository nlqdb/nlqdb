# nlqdb — preview deploys for apps/web on every PR push.
#
# Workers Versions: each PR push uploads a non-production version of
# the apps/web Worker (Static Assets bundle inherited from the prod
# config). CF assigns a stable per-version URL; the promoted prod
# version (and nlqdb.com) stay untouched until merge runs
# `wrangler deploy` via deploy-web.yml.
#
# URL extraction: cloudflare/wrangler-action@v3 does NOT populate the
# `deployment-url` step output for the `versions upload` command —
# tracked at cloudflare/wrangler-action#343. The official machine-
# readable hook is `WRANGLER_OUTPUT_FILE_PATH`: wrangler writes an
# ND-JSON event log we parse for the `version-upload` entry, which
# carries `preview_url`. Documented at
# https://developers.cloudflare.com/workers/wrangler/system-environment-variables/.

name: Preview web

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/web/**"
      - "packages/elements/**"
      - ".github/workflows/preview-web.yml"

concurrency:
  group: preview-web-pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: astro build + wrangler versions upload
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      # Job-scoped so the action AND the comment step both see the
      # same file path. `runner.temp` is unique per job invocation.
      WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-output.ndjson
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run --cwd apps/web build

      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: versions upload --message "PR #${{ github.event.number }} ${{ github.sha }}"

      - name: Sticky preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const outputPath = process.env.WRANGLER_OUTPUT_FILE_PATH;

            // Parse the ND-JSON event log wrangler wrote during upload.
            // Each non-blank line is one event; we want the first
            // `version-upload` entry's `preview_url` (or its alias
            // form). Schema:
            //   { version: 1, type: "version-upload",
            //     worker_name, worker_tag, version_id,
            //     preview_url, preview_alias_url, timestamp }
            let url = '';
            try {
              const text = fs.readFileSync(outputPath, 'utf8');
              for (const line of text.split('\n')) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                try {
                  const evt = JSON.parse(trimmed);
                  if (evt.type === 'version-upload') {
                    url = evt.preview_url || evt.preview_alias_url || '';
                    if (url) break;
                  }
                } catch { /* skip malformed lines */ }
              }
            } catch (err) {
              core.warning(`Could not read wrangler output: ${err.message}`);
            }

            const sha = context.sha.slice(0, 7);
            const marker = '<!-- preview-web-sticky -->';
            const ts = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';

            const urlLine = url
              ? `- URL: <${url}>`
              : '- URL: latest version visible in the dashboard → `nlqdb-web` → Versions';

            const body = [
              marker,
              '🌐 **Preview web deployed**',
              '',
              urlLine,
              `- Worker: \`nlqdb-web\` (preview version — non-production)`,
              `- Commit: \`${sha}\``,
              `- Updated: ${ts}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
