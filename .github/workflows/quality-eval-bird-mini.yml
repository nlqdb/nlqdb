# quality-eval — BIRD Mini-Dev (SQLite) free-vs-frontier run.
# SK-QUAL-002: manual on-demand only (workflow_dispatch); never a PR gate.
# The harness output drives decisions (semantic-layer promotion,
# regression alerting), not merges. Engine north-star instrument per
# GLOBAL-025 / SK-QUAL-005 — baseline JSON must exist by 2026-06-15 for
# the Phase 2 exit gate. The resumable runner is SK-QUAL-011.

name: Quality eval — BIRD Mini-Dev

on:
  # SK-QUAL-002 — manual on-demand only; the scheduled weekly + 4h smoke
  # crons were retired. The harness is a measurement tool, run when an
  # operator wants a fresh number, never a PR gate.
  workflow_dispatch:
    inputs:
      limit:
        description: "Question count (BIRD Mini-Dev caps at 500)"
        default: "500"
        required: false
      include_frontier:
        description: "Run the frontier lane too (paid OpenRouter)"
        type: boolean
        default: false
      include_agentic_frontier:
        description: "Run the SK-QUAL-009 agentic-frontier lane (exec-retry; ~3x provider RPS)"
        type: boolean
        default: false
      skip_emit:
        description: "Skip POSTing the report to /v1/events/eval (default false)"
        type: boolean
        default: false

permissions:
  contents: read

# Coalesce: at most one eval runs at a time; a second manual dispatch
# queues behind the first rather than competing for the shared free-tier
# budget. NOT cancel-in-progress — a half-finished run is worth letting
# complete.
concurrency:
  group: quality-eval-bird-mini
  cancel-in-progress: false

jobs:
  run:
    name: Run BIRD Mini-Dev
    # Manual dispatch only.
    runs-on: ubuntu-latest
    # 500 questions × ~1s p50 latency × N lanes = ~10 min; bigger LLM
    # tail can push to ~25 min. The 60 min ceiling absorbs single-
    # provider degradation without flaking the run.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # BIRD Mini-Dev's questions JSON is on HuggingFace; the SQLite
      # database files (~50 MB compressed) are on Google Drive. gdown
      # handles Drive's interstitial confirm token. Cached by SHA so
      # subsequent runs skip the download.
      - name: Cache BIRD Mini-Dev fixtures
        id: bird-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: bird_data
          key: bird-mini-dev-v2-${{ hashFiles('.github/workflows/quality-eval-bird-mini.yml') }}

      - name: Download BIRD Mini-Dev (when cache miss)
        if: steps.bird-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p bird_data
          # Questions JSON — HuggingFace (no auth needed for public datasets).
          curl -fsSL \
            "https://huggingface.co/datasets/birdsql/bird_mini_dev/resolve/main/data/mini_dev_sqlite-00000-of-00001.json" \
            -o bird_data/mini_dev_sqlite.json
          # SQLite database files — Google Drive (BIRD distributes them
          # only there). File ID from https://github.com/bird-bench/mini_dev README.
          pip install --quiet --user gdown
          ~/.local/bin/gdown --fuzzy \
            "https://drive.google.com/file/d/13VLWIwpw5E3d5DUkMvzw7hvHE67a4XkG/view?usp=sharing" \
            -O bird_data/mini_dev_v2.zip
          unzip -q bird_data/mini_dev_v2.zip -d bird_data
          # Normalise layout — gdown unzips into a versioned subdir we
          # don't want the harness to depend on. Symlink the contents
          # into the canonical layout `bird_data/dev_databases/`.
          if [ ! -d bird_data/dev_databases ]; then
            found=$(find bird_data -maxdepth 3 -name "dev_databases" -type d | head -1)
            if [ -z "$found" ]; then
              echo "::error::dev_databases/ not found in BIRD Mini-Dev download"
              exit 1
            fi
            ln -s "$(realpath "$found")" bird_data/dev_databases
          fi
          rm -f bird_data/mini_dev_v2.zip

      - name: Run quality-eval
        working-directory: tools/eval
        env:
          # Free chain — same provider keys as production.
          # CEREBRAS_API_KEY leads the planner tier per SK-LLM-023; absent
          # key → the chain falls over to the Gemini-first order.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # SK-LLM-028 — Mistral planner-tier capacity backstop (chain tail).
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # Frontier chain — opt-in per dispatch (default off to preserve
          # the OpenRouter paid budget). The agentic lane (SK-QUAL-009)
          # requires the same key + the explicit `include_agentic_frontier`
          # toggle so an `include_frontier=true` run doesn't accidentally
          # fire the 3x-RPS exec-retry budget.
          OPENROUTER_FRONTIER_API_KEY: ${{ (inputs.include_frontier == true || inputs.include_agentic_frontier == true) && secrets.OPENROUTER_FRONTIER_API_KEY || '' }}
          RUN_AGENTIC_FRONTIER: ${{ inputs.include_agentic_frontier == true && '1' || '' }}
          # SK-QUAL-002: API URL + bearer token for the typed event
          # fanout. `EVAL_API_URL` defaults to prod app domain; override
          # via workflow input for staging runs once a staging worker
          # exists. Token is the GH-secret mirror of the Workers Secret.
          EVAL_API_URL: ${{ vars.EVAL_API_URL || 'https://app.nlqdb.com' }}
          EVAL_INGEST_TOKEN: ${{ secrets.EVAL_INGEST_TOKEN }}
          SKIP_EMIT: ${{ inputs.skip_emit == true }}
        run: |
          set -euo pipefail
          limit="${{ inputs.limit || '500' }}"
          # Baseline comparison: pin to `baseline-2026-06-15.json` per
          # SK-QUAL-005. The file is committed at repo root of the eval
          # workspace; a run diffs against it and emits
          # feature.eval.regression on threshold/McNemar trigger.
          baseline_arg=""
          if [ -f baseline-2026-06-15.json ]; then
            baseline_arg="--baseline baseline-2026-06-15.json"
          fi
          # Event-pipeline emit: skip on workflow_dispatch when the
          # operator opted out, or when the token is unset (matches the
          # SK-EVENTS-005 unconfigured-sink posture).
          emit_args=""
          if [ "$SKIP_EMIT" != "true" ] && [ -n "${EVAL_INGEST_TOKEN:-}" ]; then
            emit_args="--emit-url $EVAL_API_URL --emit-token $EVAL_INGEST_TOKEN"
          fi
          # shellcheck disable=SC2086  # word-splitting on optional args is intentional
          bun src/runner.ts \
            --data-dir ../../bird_data \
            --questions-json ../../bird_data/mini_dev_sqlite.json \
            --limit "$limit" \
            --out results \
            $baseline_arg \
            $emit_args

      - name: Upload report JSON
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: quality-eval-bird-mini-${{ github.run_id }}
          path: tools/eval/results/*.json
          retention-days: 90

      # Surface the headline KPIs on the run summary so an operator can
      # spot regressions without downloading the artifact.
      - name: Emit run summary
        if: always()
        run: |
          set -euo pipefail
          latest=$(ls -t tools/eval/results/*.json 2>/dev/null | head -1 || true)
          if [ -z "$latest" ]; then
            echo "::warning::No results JSON produced (runner failed)."
            exit 0
          fi
          {
            echo "## quality-eval — BIRD Mini-Dev SQLite"
            echo ""
            jq -r '
              "Run at: " + .run_at,
              "Dataset: " + .dataset,
              "Questions: " + (.question_count | tostring),
              "",
              "| Lane | Match | Attempted | EA | Gold errors | p50 ms | p95 ms |",
              "|---|---|---|---|---|---|---|",
              (.lanes[] | "| " + .lane + " | " + (.match | tostring) + " | " + (.attempted | tostring) + " | " + ((.execution_accuracy * 100 | tostring) + "%") + " | " + (.gold_error | tostring) + " | " + (.p50_latency_ms | tostring) + " | " + (.p95_latency_ms | tostring) + " |"),
              "",
              "Free-vs-frontier delta: " + (if .free_vs_frontier_delta == null then "n/a" else ((.free_vs_frontier_delta * 100 | tostring) + " pts") end)
            ' "$latest"
            # SK-QUAL-002: surface baseline comparison so the operator
            # sees regressions in the summary without downloading the
            # report JSON. Always-on; harmless when no baseline.
            if jq -e '.baseline' "$latest" > /dev/null 2>&1; then
              echo ""
              echo "### Baseline comparison (SK-QUAL-005)"
              jq -r '
                "Baseline run: " + .baseline.baseline_run_at + " (" + (.baseline.baseline_question_count | tostring) + " questions)",
                "",
                "| Lane | Baseline EA | Current EA | Delta (pp) | McNemar | Regressions |",
                "|---|---|---|---|---|---|",
                (.baseline.lanes[] |
                  "| " + .lane
                  + " | " + (if .baseline_execution_accuracy == null then "n/a (new lane)" else ((.baseline_execution_accuracy * 100 | tostring) + "%") end)
                  + " | " + ((.current_execution_accuracy * 100 | tostring) + "%")
                  + " | " + (if .delta_pp == null then "n/a" else ((.delta_pp * 100 | tostring) + " pp") end)
                  + " | " + (if .mcnemar == null then "n/a" else ("b=" + (.mcnemar.b | tostring) + " c=" + (.mcnemar.c | tostring) + " p=" + (.mcnemar.pValue | tostring)) end)
                  + " | " + (if (.regressions | length) == 0 then "OK" else ([.regressions[].trigger] | join(",")) end)
                  + " |"
                )
              ' "$latest"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
