# quality-eval — BIRD Mini-Dev (SQLite) free-vs-frontier run.
# SK-QUAL-002: manual on-demand only (workflow_dispatch); never a PR gate.
# Two dispatch modes — `full` (500q + baseline diff + emit) and `smoke`
# (sampled slice, no emit, resumable). The harness output drives decisions
# (semantic-layer promotion, regression alerting), not merges. Engine
# north-star instrument per GLOBAL-025 / SK-QUAL-005 — baseline JSON must
# exist by 2026-06-15 for the Phase 2 exit gate. Resumable runner: SK-QUAL-011.

name: Quality eval — BIRD Mini-Dev

on:
  # SK-QUAL-002 — manual on-demand only; the scheduled weekly + 4h smoke
  # crons were retired. `mode` picks the full canonical pass or the sampled
  # smoke; both are operator-triggered, never a PR gate.
  workflow_dispatch:
    inputs:
      mode:
        description: "full = 500q + baseline + emit · smoke = sampled slice, no emit"
        type: choice
        options: [full, smoke]
        default: full
      limit:
        description: "Question count for full mode (BIRD Mini-Dev caps at 500)"
        default: "500"
        required: false
      include_frontier:
        description: "Run the frontier lane too (paid OpenRouter); full mode only"
        type: boolean
        default: false
      include_agentic_frontier:
        description: "Run the SK-QUAL-009 agentic-frontier lane (exec-retry; ~3x provider RPS); full mode only"
        type: boolean
        default: false
      skip_emit:
        description: "Skip POSTing the report to /v1/events/eval (full mode; default false)"
        type: boolean
        default: false

permissions:
  contents: read

# Coalesce: at most one eval runs at a time; a second manual dispatch
# queues behind the first rather than competing for the shared free-tier
# budget. NOT cancel-in-progress — a half-finished run is worth letting
# complete.
concurrency:
  group: quality-eval-bird-mini
  cancel-in-progress: false

jobs:
  run:
    name: Run BIRD Mini-Dev (full)
    if: inputs.mode != 'smoke'
    runs-on: ubuntu-latest
    # 500 questions × (≈3 s throttle, SK-QUAL-012 + ~2 s LLM tail) ≈ 45 min;
    # the 90 min ceiling absorbs single-provider degradation + exec-retry
    # without flaking the run.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      # BIRD Mini-Dev's questions JSON is on HuggingFace; the SQLite
      # database files (~800 MB) ship in the minidev package on the
      # Aliyun OSS mirror. Cached by SHA so subsequent runs skip the
      # download.
      - name: Cache BIRD Mini-Dev fixtures
        id: bird-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: bird_data
          key: bird-mini-dev-v2-${{ hashFiles('.github/workflows/quality-eval-bird-mini.yml') }}

      - name: Download BIRD Mini-Dev (when cache miss)
        if: steps.bird-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p bird_data
          # Questions JSON — HuggingFace (no auth needed for public datasets).
          curl -fsSL \
            "https://huggingface.co/datasets/birdsql/bird_mini_dev/resolve/main/data/mini_dev_sqlite-00000-of-00001.json" \
            -o bird_data/mini_dev_sqlite.json
          # SQLite databases — BIRD's minidev package, direct from the
          # Aliyun OSS mirror named in the upstream README. Replaces the
          # prior gdown/Google-Drive path: gdown 6 removed --fuzzy (2026-05)
          # and Drive rate-limits CI; a direct HTTPS curl is robust.
          curl -fSL --retry 4 --retry-delay 5 --retry-all-errors \
            "https://bird-bench.oss-cn-beijing.aliyuncs.com/minidev.zip" \
            -o bird_data/mini_dev_v2.zip
          unzip -q bird_data/mini_dev_v2.zip -d bird_data
          # Normalise layout — minidev.zip nests dev_databases under
          # minidev/MINIDEV/. Symlink it into the canonical
          # `bird_data/dev_databases/` the loader expects.
          if [ ! -d bird_data/dev_databases ]; then
            found=$(find bird_data -maxdepth 3 -name "dev_databases" -type d | head -1)
            if [ -z "$found" ]; then
              echo "::error::dev_databases/ not found in BIRD Mini-Dev download"
              exit 1
            fi
            ln -s "$(realpath "$found")" bird_data/dev_databases
          fi
          rm -f bird_data/mini_dev_v2.zip

      - name: Run quality-eval
        working-directory: tools/eval
        env:
          # Free chain — same provider keys as production.
          # CEREBRAS_API_KEY leads the planner tier per SK-LLM-023; absent
          # key → the chain falls over to the Gemini-first order.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # SK-LLM-028 — Mistral planner-tier capacity backstop (chain tail).
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # Frontier chain — opt-in per dispatch (default off to preserve
          # the OpenRouter paid budget). The agentic lane (SK-QUAL-009)
          # requires the same key + the explicit `include_agentic_frontier`
          # toggle so an `include_frontier=true` run doesn't accidentally
          # fire the 3x-RPS exec-retry budget.
          OPENROUTER_FRONTIER_API_KEY: ${{ (inputs.include_frontier == true || inputs.include_agentic_frontier == true) && secrets.OPENROUTER_FRONTIER_API_KEY || '' }}
          RUN_AGENTIC_FRONTIER: ${{ inputs.include_agentic_frontier == true && '1' || '' }}
          # SK-QUAL-002: API URL + bearer token for the typed event
          # fanout. `EVAL_API_URL` defaults to prod app domain; override
          # via workflow input for staging runs once a staging worker
          # exists. Token is the GH-secret mirror of the Workers Secret.
          EVAL_API_URL: ${{ vars.EVAL_API_URL || 'https://app.nlqdb.com' }}
          EVAL_INGEST_TOKEN: ${{ secrets.EVAL_INGEST_TOKEN }}
          SKIP_EMIT: ${{ inputs.skip_emit == true }}
        run: |
          set -euo pipefail
          limit="${{ inputs.limit || '500' }}"
          # Baseline comparison: pin to `baseline-2026-06-15.json` per
          # SK-QUAL-005. The file is committed at repo root of the eval
          # workspace; a run diffs against it and emits
          # feature.eval.regression on threshold/McNemar trigger.
          baseline_arg=""
          if [ -f baseline-2026-06-15.json ]; then
            baseline_arg="--baseline baseline-2026-06-15.json"
          fi
          # Event-pipeline emit: skip on workflow_dispatch when the
          # operator opted out, or when the token is unset (matches the
          # SK-EVENTS-005 unconfigured-sink posture).
          emit_args=""
          if [ "$SKIP_EMIT" != "true" ] && [ -n "${EVAL_INGEST_TOKEN:-}" ]; then
            emit_args="--emit-url $EVAL_API_URL --emit-token $EVAL_INGEST_TOKEN"
          fi
          # shellcheck disable=SC2086  # word-splitting on optional args is intentional
          bun src/runner.ts \
            --data-dir ../../bird_data \
            --questions-json ../../bird_data/mini_dev_sqlite.json \
            --limit "$limit" \
            --out results \
            --throttle-ms 3000 \
            $baseline_arg \
            $emit_args

      - name: Upload report JSON
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: quality-eval-bird-mini-${{ github.run_id }}
          path: tools/eval/results/*.json
          retention-days: 90

      # Surface the headline KPIs on the run summary so an operator can
      # spot regressions without downloading the artifact.
      - name: Emit run summary
        if: always()
        run: |
          set -euo pipefail
          latest=$(ls -t tools/eval/results/*.json 2>/dev/null | head -1 || true)
          if [ -z "$latest" ]; then
            echo "::warning::No results JSON produced (runner failed)."
            exit 0
          fi
          {
            echo "## quality-eval — BIRD Mini-Dev SQLite"
            echo ""
            jq -r '
              "Run at: " + .run_at,
              "Dataset: " + .dataset,
              "Questions: " + (.question_count | tostring),
              "",
              "| Lane | Match | Attempted | EA | Gold errors | p50 ms | p95 ms |",
              "|---|---|---|---|---|---|---|",
              (.lanes[] | "| " + .lane + " | " + (.match | tostring) + " | " + (.attempted | tostring) + " | " + ((.execution_accuracy * 100 | tostring) + "%") + " | " + (.gold_error | tostring) + " | " + (.p50_latency_ms | tostring) + " | " + (.p95_latency_ms | tostring) + " |"),
              "",
              "Free-vs-frontier delta: " + (if .free_vs_frontier_delta == null then "n/a" else ((.free_vs_frontier_delta * 100 | tostring) + " pts") end)
            ' "$latest"
            # SK-QUAL-002: surface baseline comparison so the operator
            # sees regressions in the summary without downloading the
            # report JSON. Always-on; harmless when no baseline.
            if jq -e '.baseline' "$latest" > /dev/null 2>&1; then
              echo ""
              echo "### Baseline comparison (SK-QUAL-005)"
              jq -r '
                "Baseline run: " + .baseline.baseline_run_at + " (" + (.baseline.baseline_question_count | tostring) + " questions)",
                "",
                "| Lane | Baseline EA | Current EA | Delta (pp) | McNemar | Regressions |",
                "|---|---|---|---|---|---|",
                (.baseline.lanes[] |
                  "| " + .lane
                  + " | " + (if .baseline_execution_accuracy == null then "n/a (new lane)" else ((.baseline_execution_accuracy * 100 | tostring) + "%") end)
                  + " | " + ((.current_execution_accuracy * 100 | tostring) + "%")
                  + " | " + (if .delta_pp == null then "n/a" else ((.delta_pp * 100 | tostring) + " pp") end)
                  + " | " + (if .mcnemar == null then "n/a" else ("b=" + (.mcnemar.b | tostring) + " c=" + (.mcnemar.c | tostring) + " p=" + (.mcnemar.pValue | tostring)) end)
                  + " | " + (if (.regressions | length) == 0 then "OK" else ([.regressions[].trigger] | join(",")) end)
                  + " |"
                )
              ' "$latest"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # SK-QUAL-011 — sampled smoke slice, manual dispatch (`mode: smoke`),
  # resumable. No change-since-`last_eval_sha` gate: a manual dispatch is
  # an intentional run, so it always executes the sampled slice. Smoke
  # never emits and never overwrites the canonical baseline.
  smoke:
    name: Smoke EX (sampled, SK-QUAL-011)
    if: inputs.mode == 'smoke'
    runs-on: ubuntu-latest
    # 150-question sample × free chain ≈ a few min; the ceiling absorbs a
    # slow-provider tail. A budget stop (chain rate-limited) exits early.
    timeout-minutes: 30
    # Fixed smoke slice (SK-QUAL-011): same seed + limit every run so the
    # smoke EX is a stable run-to-run signal, not noise from a new slice.
    env:
      SMOKE_SEED: "20260607"
      SMOKE_LIMIT: "150"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Cache BIRD Mini-Dev fixtures
        id: bird-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: bird_data
          key: bird-mini-dev-v2-${{ hashFiles('.github/workflows/quality-eval-bird-mini.yml') }}

      - name: Download BIRD Mini-Dev (when cache miss)
        if: steps.bird-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p bird_data
          curl -fsSL \
            "https://huggingface.co/datasets/birdsql/bird_mini_dev/resolve/main/data/mini_dev_sqlite-00000-of-00001.json" \
            -o bird_data/mini_dev_sqlite.json
          # SQLite databases — BIRD's minidev package, direct from the
          # Aliyun OSS mirror named in the upstream README. Replaces the
          # prior gdown/Google-Drive path: gdown 6 removed --fuzzy (2026-05)
          # and Drive rate-limits CI; a direct HTTPS curl is robust.
          curl -fSL --retry 4 --retry-delay 5 --retry-all-errors \
            "https://bird-bench.oss-cn-beijing.aliyuncs.com/minidev.zip" \
            -o bird_data/mini_dev_v2.zip
          unzip -q bird_data/mini_dev_v2.zip -d bird_data
          if [ ! -d bird_data/dev_databases ]; then
            found=$(find bird_data -maxdepth 3 -name "dev_databases" -type d | head -1)
            if [ -z "$found" ]; then
              echo "::error::dev_databases/ not found in BIRD Mini-Dev download"
              exit 1
            fi
            ln -s "$(realpath "$found")" bird_data/dev_databases
          fi
          rm -f bird_data/mini_dev_v2.zip

      # SK-QUAL-011 — the smoke checkpoint (`*.smoke.partial.jsonl`)
      # persists across dispatches so a budget-stopped smoke resumes on the
      # next `mode: smoke` dispatch. Rolling key (run_id) + restore-keys
      # prefix gives the standard restore-latest / save-new cache pattern.
      - name: Restore eval state
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: eval-state
          key: eval-state-bird-${{ github.run_id }}
          restore-keys: |
            eval-state-bird-

      - name: Smoke run (resumable)
        id: smoke
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p eval-state
          # Smoke never emits and never touches the canonical baseline; the
          # checkpoint + report land in eval-state/ so the cache persists them.
          bun tools/eval/src/runner.ts \
            --data-dir bird_data \
            --questions-json bird_data/mini_dev_sqlite.json \
            --limit "$SMOKE_LIMIT" --sample-seed "$SMOKE_SEED" \
            --throttle-ms 3000 \
            --out eval-state
          latest=$(ls -t eval-state/*.json | head -1)
          if jq -e '.resumable == true' "$latest" >/dev/null 2>&1; then
            # Budget stop (W2 rate-limit signal saturated the chain). Keep
            # the checkpoint; a re-dispatch resumes and finishes the slice.
            echo "Budget stop — checkpoint kept; re-dispatch (mode: smoke) resumes."
            echo "status=resumable" >> "$GITHUB_OUTPUT"
          else
            echo "status=completed" >> "$GITHUB_OUTPUT"
          fi
          echo "report=$latest" >> "$GITHUB_OUTPUT"

      - name: Smoke summary
        run: |
          set -euo pipefail
          latest="${{ steps.smoke.outputs.report }}"
          {
            echo "## quality-eval — BIRD smoke (sampled ${SMOKE_LIMIT}, seed ${SMOKE_SEED})"
            echo ""
            echo "Status: ${{ steps.smoke.outputs.status }}"
            if [ -n "$latest" ] && [ -f "$latest" ]; then
              jq -r '
                "Run at: " + .run_at,
                (if .resumable == true then "Resumable: true (chain rate-limited)" else "" end),
                "",
                "| Lane | Match | Attempted | Smoke EX |",
                "|---|---|---|---|",
                (.lanes[] | "| " + .lane + " | " + (.match | tostring) + " | " + (.attempted | tostring) + " | " + ((.execution_accuracy * 100 | tostring) + "%") + " |")
              ' "$latest"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-eval-bird-smoke-${{ github.run_id }}
          path: eval-state/*.json
          retention-days: 30

      # Prune full reports before caching so eval-state only carries the
      # checkpoint across dispatches (reports are in the artifact).
      - name: Prune reports from eval state
        if: always()
        run: |
          set -euo pipefail
          find eval-state -maxdepth 1 -name '*.json' -delete 2>/dev/null || true

      - name: Save eval state
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: eval-state
          key: eval-state-bird-${{ github.run_id }}
