# nlqdb — CI. Runs on every PR and every push to main.
#
# Philosophy (DESIGN §13.2): lefthook is the first line of defence;
# CI is the backstop. Jobs are ordered cheapest-signal-first so a
# broken Biome rule fails in 10s, not after a full test run.
#
# `hashFiles()` is intentionally NOT used at job-level `if:` — GitHub
# Actions only allows it in step-level expressions, not job-level
# conditionals. Where a job is gated on a file existing, we run a
# `precheck` step that sets an output, then guard later steps on it.
#
# Setup is centralised in `.github/actions/setup` (SHA-pinned setup-bun
# + actions/cache over ~/.bun/install/cache + frozen install). Every
# job that needs the workspace uses that composite to avoid re-running
# the same install logic 8+ times per PR push without a cache.
#
# Eventually this file becomes a 4-line consumer of `nlqdb/actions@v1`
# (DESIGN §13) once that repo exists. Until then the workflow is
# inlined here.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-js:
    name: Biome (JS/TS/JSON/CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - name: Biome check
        run: bun run check

  lint-go:
    name: Go (gofumpt + vet + golangci-lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - id: precheck
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f cli/go.mod ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cli/go.mod not present — Go toolchain hasn't landed yet, skipping."
          fi

      - if: steps.precheck.outputs.exists == 'true'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      # gofumpt -d prints a unified diff of unformatted files and
      # exits 0 in BOTH the "no diff" and "diff present" cases — its
      # signal is the diff content on stdout, not the exit code. Pipe
      # the output through `wc -c` and treat any non-zero size as a
      # failure. The previous `diff <(gofumpt -d .) <(echo -n)` form
      # relied on the default `bash -eo pipefail` shell (process
      # substitution requires bash anyway), but it leaked the file
      # diffs through stderr only on failure. Capturing the diff into
      # an output file lets us print it on failure for fast triage.
      - name: gofumpt
        if: steps.precheck.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@latest
          out=$(gofumpt -d .)
          if [ -n "$out" ]; then
            echo "::group::gofumpt diff"
            echo "$out"
            echo "::endgroup::"
            echo "::error::gofumpt found unformatted files — run 'bun run check:go' locally"
            exit 1
          fi

      - name: go vet
        if: steps.precheck.outputs.exists == 'true'
        run: go vet ./...

      - name: golangci-lint
        if: steps.precheck.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          working-directory: cli
          version: latest

      - name: go test
        if: steps.precheck.outputs.exists == 'true'
        run: go test ./... -race -count=1

      # SK-CLI-001 binary-size budget. Failing CI on a regression is
      # cheaper than discovering it after a release. Linux is the
      # bound (godbus is only linked on Linux); macOS / Windows are
      # smaller on the same build flags.
      - name: Binary-size budget (SK-CLI-001)
        if: steps.precheck.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags="-s -w -X github.com/nlqdb/nlqdb/cli/internal/version.Version=ci" \
            -o /tmp/nlq-ci ./cmd/nlq
          raw=$(stat -c%s /tmp/nlq-ci)
          gzip -kf /tmp/nlq-ci
          gz=$(stat -c%s /tmp/nlq-ci.gz)
          echo "::notice::nlq linux/amd64 raw=${raw}B gz=${gz}B (caps: raw 10 MB, gz 4 MB)"
          if [ "$raw" -ge 10485760 ]; then
            echo "::error::raw binary ${raw}B ≥ 10 MB cap"
            exit 1
          fi
          if [ "$gz" -ge 4194304 ]; then
            echo "::error::gzipped binary ${gz}B ≥ 4 MB cap"
            exit 1
          fi

  lint-py:
    name: ruff (format + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - id: precheck
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml not present — Python toolchain hasn't landed yet, skipping."
          fi

      - if: steps.precheck.outputs.exists == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: ruff format --check
        if: steps.precheck.outputs.exists == 'true'
        run: uv run ruff format --check

      - name: ruff check
        if: steps.precheck.outputs.exists == 'true'
        run: uv run ruff check

  acquisition-plan-mirror:
    name: ICP tracker mirror integrity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify FLOW ids stay mirrored
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("docs/research")
          impl = (root / "automated-icp-validation-plan.md").read_text()
          verify = (root / "automated-icp-validation-plan-verification.md").read_text()
          pattern = re.compile(r"^#{2,3}\s+(FLOW-\d+)", re.MULTILINE)
          impl_ids = set(pattern.findall(impl))
          verify_ids = set(pattern.findall(verify))
          if impl_ids != verify_ids:
            print("Implementation-only:", sorted(impl_ids - verify_ids))
            print("Verification-only:", sorted(verify_ids - impl_ids))
            sys.exit(1)
          print("FLOW mirror ids:", ", ".join(sorted(impl_ids)))
          PY

      - name: Verify ICP secret wiring
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          required = {
            ".env.example": ["GH_TOKEN=", "LOGSNAG_TOKEN=", "LOGSNAG_PROJECT="],
            "scripts/mirror-secrets-gha.sh": ["GH_TOKEN", "LOGSNAG_TOKEN", "LOGSNAG_PROJECT"],
            "scripts/mirror-secrets-workers.sh": ["GH_TOKEN", "LOGSNAG_TOKEN", "LOGSNAG_PROJECT"],
            "scripts/verify-secrets.sh": ["check_http GH_TOKEN", "LOGSNAG_TOKEN", "LOGSNAG_PROJECT"],
          }
          missing = []
          for path, needles in required.items():
            text = Path(path).read_text()
            missing.extend(f"{path}: {needle}" for needle in needles if needle not in text)
          if missing:
            print("Missing ICP secret wiring:")
            print("\n".join(missing))
            sys.exit(1)
          print("ICP secret wiring present")
          PY

  test-api:
    name: apps/api (typecheck + vitest + wrangler dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        working-directory: apps/api
        run: bun run typecheck

      - name: Test
        working-directory: apps/api
        run: bun run test

      # `apps/api`'s `[assets]` binding points at `../web/dist` (`SK-AUTH-016`).
      - name: Build apps/web
        working-directory: apps/web
        run: bun run build

      - name: Wrangler build (dry-run)
        working-directory: apps/api
        run: bun run build

  test-pkgs:
    name: packages/${{ matrix.pkg }} (typecheck + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        # `test` is optional — framework-compiler-only packages skip it.
        # Directories live under packages/; `cli-shim` ships as `@nlqdb/cli`.
        pkg:
          [
            astro,
            cli-shim,
            db,
            elements,
            events,
            llm,
            mcp,
            next,
            nuxt,
            otel,
            react,
            sdk,
            solid,
            svelte,
            sveltekit,
            vue,
          ]
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        working-directory: packages/${{ matrix.pkg }}
        run: bun run typecheck

      - name: Test
        working-directory: packages/${{ matrix.pkg }}
        run: |
          if jq -e '.scripts.test' package.json > /dev/null; then
            bun run test
          else
            echo "::notice::no test script — typecheck is the gate"
          fi

      # SK-MCP-010: packages/mcp ships a bundled artifact for npm
      # consumers (npx @nlqdb/mcp). Verify the bundle builds and
      # contains the expected exports on every PR.
      - name: Build (mcp only)
        if: matrix.pkg == 'mcp'
        working-directory: packages/${{ matrix.pkg }}
        run: |
          bun run build
          test -f dist/index.js || (echo "::error::dist/index.js not produced"; exit 1)

  test-tools:
    name: tools/${{ matrix.tool }} (typecheck + bun test)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        # tools/* members. Eval harness is the BIRD Mini-Dev runner +
        # scorer per docs/features/quality-eval/FEATURE.md (SK-QUAL-001).
        # The real-LLM run is the daily workflow `quality-eval-bird-mini`;
        # PRs only assert harness wiring (mocked router, ephemeral SQLite).
        # Stranger-test is the §1.1 Playwright walker (SK-STRG-001); PRs
        # only verify the typecheck + unit-test surface — the actual
        # browser walk is agent-invoked via `bash scripts/stranger-test.sh`.
        tool: [eval, stranger-test]
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        working-directory: tools/${{ matrix.tool }}
        run: bun run typecheck

      - name: Test
        working-directory: tools/${{ matrix.tool }}
        run: bun test

  # `tests/e2e/{sdk,mcp,examples}` sit OUTSIDE the root workspace (own
  # lockfiles), so root `bun run typecheck` never sees them — they import
  # in-workspace types across a boundary CI didn't cover. That let
  # `tests/e2e/mcp` compile-rot for 11 days after `ModelCatalog` gained
  # `free`/`providers`: every dispatch since died in `tsc`, so the MCP
  # protocol suite silently stopped testing anything (run 138).
  #
  # This is compile-only — SK-E2E-004 keeps *execution* dispatch-only.
  # Typechecking costs no provider quota, no secrets, no Neon branch.
  typecheck-e2e:
    name: tests/e2e/${{ matrix.suite }} (typecheck — out-of-workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        suite: [sdk, mcp, examples]
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - name: Install suite deps
        working-directory: tests/e2e/${{ matrix.suite }}
        run: bun install
      - name: Typecheck
        working-directory: tests/e2e/${{ matrix.suite }}
        run: bun run typecheck

  build-web:
    name: apps/web (astro check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Astro check
        working-directory: apps/web
        run: bun run check

      - name: Astro build
        working-directory: apps/web
        run: bun run build

  build-elements:
    name: packages/elements (esbuild + bundle-size)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Build CDN bundle
        working-directory: packages/elements
        run: bun run build

      # DESIGN §3.5 caps the bundle at < 6 KB gzipped (strict). 6144
      # bytes is exactly 6 KB, so the failure threshold is `>= 6144`.
      # Failing CI on regression is cheaper than discovering it after
      # a release.
      - name: Bundle-size budget
        working-directory: packages/elements
        run: |
          size=$(gzip -c dist/v1.js | wc -c)
          echo "::notice::elements/v1.js gzipped: ${size} bytes (cap: 6144)"
          if [ "$size" -ge 6144 ]; then
            echo "::error::Bundle reached or exceeded 6 KB gzipped budget (DESIGN §3.5)"
            exit 1
          fi

  test-swift:
    name: packages/nlqdb-swift (swift build + swift test)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # `setup-swift@v2` falls back to Swift 5 silently (swift-actions/setup-swift#683); v3 is beta.
      - name: Install Swift 6.0.3
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils gnupg2 libc6-dev libcurl4-openssl-dev libedit2 \
            libgcc-13-dev libpython3-dev libsqlite3-0 libstdc++-13-dev \
            libxml2-dev libz3-dev pkg-config tzdata unzip zlib1g-dev
          curl -fsSL \
            "https://download.swift.org/swift-6.0.3-release/ubuntu2404/swift-6.0.3-RELEASE/swift-6.0.3-RELEASE-ubuntu24.04.tar.gz" \
            -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar -xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"

      - name: swift --version
        run: swift --version

      - name: swift build
        working-directory: packages/nlqdb-swift
        run: swift build -v

      - name: swift test
        working-directory: packages/nlqdb-swift
        run: swift test -v

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  lockfile-guard:
    name: lockfile guard (forbidden direct deps)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: ./scripts/lockfile-guard.sh

  # SK-HDC-012 — provisioner batch path's smoke test against a real
  # Neon branch. Parallel to test-api / test-pkgs / build-* so it
  # doesn't gate fast feedback on the cheap unit jobs. Uses an
  # ephemeral branch (~seconds-long lifetime) to stay inside Neon
  # Free's 10-branch/project ceiling alongside `preview-app.yml`'s
  # long-lived `pr-N` branches.
  #
  # Skipped cleanly on forks (secrets unavailable) and on missing
  # repo-level `NEON_API_KEY` / `NEON_PROJECT_ID` so the workflow
  # doesn't fail the whole CI when run in unconfigured environments.
  test-api-smoke-neon:
    name: apps/api smoke (Neon HTTP transaction batch — SK-HDC-012)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Forks don't get repository secrets — skip without failing.
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Preflight — secrets present
        id: preflight
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          if [ -z "${NEON_API_KEY:-}" ] || [ -z "${NEON_PROJECT_ID:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NEON_API_KEY/NEON_PROJECT_ID not set — smoke test skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # Belt-and-suspenders for the rare case where a previous run's
      # cleanup didn't fire (runner killed before `if: always()`).
      # Free tier's 10-branch ceiling means we can't afford orphans.
      #
      # Idempotent curl calls (sweep GET, delete DELETE) use
      # `--retry 3 --retry-delay 2 --retry-all-errors` to absorb
      # transient Neon control-plane flakes. The create POST is NOT
      # retried at the curl level — a mid-response stream drop (curl
      # exit 56 in run 25827597094) could double-create. Any branch
      # that was server-side-created but lost-in-transit lands here as
      # an orphan; the >1 h sweep above cleans it on the next run.
      - name: Sweep stale ci-smoke branches (>1 h old)
        if: steps.preflight.outputs.configured == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          cutoff=$(date -u -d '1 hour ago' +%s)
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
          | jq -r --arg cutoff "$cutoff" \
              '.branches[]
                | select(.name | startswith("ci-smoke-"))
                | select((.created_at | fromdateiso8601) < ($cutoff | tonumber))
                | .id' \
          | while read -r id; do
              [ -z "$id" ] && continue
              echo "Deleting stale branch $id"
              curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors -X DELETE \
                "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${id}" \
                -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null \
                || echo "::warning::Failed to delete stale branch $id"
            done

      - name: Create ephemeral Neon branch
        id: neon
        if: steps.preflight.outputs.configured == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          name="ci-smoke-${{ github.run_id }}-${{ github.run_attempt }}"
          # No curl --retry here: POST is not idempotent; a retry after
          # a mid-response stream drop would double-create. Orphans from
          # this kind of flake are cleaned up by the >1 h sweep above.
          response=$(curl -fsSL -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"$name\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          id=$(echo "$response" | jq -r '.branch.id // empty')
          uri=$(echo "$response" | jq -r '.connection_uris[0].connection_uri // empty')
          if [ -z "$id" ] || [ -z "$uri" ]; then
            echo "::error::Neon branch creation returned no id/connection_uri"
            echo "$response" | jq . || echo "$response"
            exit 1
          fi
          # Mask the URI in logs so the embedded password doesn't leak.
          echo "::add-mask::$uri"
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "uri=$uri" >> "$GITHUB_OUTPUT"

      # Vitest is wrapped in a 3-attempt retry to absorb cold-compute
      # first-query flakes on freshly-provisioned Neon endpoints and
      # transient HTTP drops mid-test. The integration test's
      # `beforeAll`/`afterAll` drop `test_ws6%` schemas idempotently,
      # so a retry starts from a clean state.
      - name: Run integration smoke test
        if: steps.preflight.outputs.configured == 'true'
        working-directory: apps/api
        env:
          NEON_TEST_BRANCH_URL: ${{ steps.neon.outputs.uri }}
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            if bunx vitest run src/db-create/neon-provision.integration.test.ts; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Smoke test attempt $attempt failed; retrying in $((attempt * 5))s"
              sleep $((attempt * 5))
            fi
          done
          echo "::error::Smoke test failed after 3 attempts"
          exit 1

      # `if: always()` so the branch is deleted even on test failure
      # or job cancellation — the 10-branch Free-tier ceiling makes
      # orphans expensive.
      - name: Delete ephemeral Neon branch
        if: always() && steps.neon.outputs.id != ''
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ steps.neon.outputs.id }}
        run: |
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null \
            || echo "::warning::Failed to delete branch ${BRANCH_ID} — sweep step on next run will retry"
          echo "Deleted Neon branch ${BRANCH_ID}"
