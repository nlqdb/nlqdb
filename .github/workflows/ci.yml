# nlqdb — CI. Runs on every PR and every push to main.
#
# Philosophy (DESIGN §13.2): lefthook is the first line of defence;
# CI is the backstop. Jobs are ordered cheapest-signal-first so a
# broken Biome rule fails in 10s, not after a full test run.
#
# `hashFiles()` is intentionally NOT used at job-level `if:` — GitHub
# Actions only allows it in step-level expressions, not job-level
# conditionals. Where a job is gated on a file existing, we run a
# `precheck` step that sets an output, then guard later steps on it.
#
# Setup is centralised in `.github/actions/setup` (SHA-pinned setup-bun
# + actions/cache over ~/.bun/install/cache + frozen install). Every
# job that needs the workspace uses that composite to avoid re-running
# the same install logic 8+ times per PR push without a cache.
#
# Eventually this file becomes a 4-line consumer of `nlqdb/actions@v1`
# (DESIGN §13) once that repo exists. Until then the workflow is
# inlined here.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-js:
    name: Biome (JS/TS/JSON/CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - name: Biome check
        run: bun run check

  lint-go:
    name: Go (gofumpt + vet + golangci-lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - id: precheck
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f cli/go.mod ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cli/go.mod not present — Go toolchain hasn't landed yet, skipping."
          fi

      - if: steps.precheck.outputs.exists == 'true'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      # gofumpt -d prints a unified diff of unformatted files and
      # exits 0 in BOTH the "no diff" and "diff present" cases — its
      # signal is the diff content on stdout, not the exit code. Pipe
      # the output through `wc -c` and treat any non-zero size as a
      # failure. The previous `diff <(gofumpt -d .) <(echo -n)` form
      # relied on the default `bash -eo pipefail` shell (process
      # substitution requires bash anyway), but it leaked the file
      # diffs through stderr only on failure. Capturing the diff into
      # an output file lets us print it on failure for fast triage.
      - name: gofumpt
        if: steps.precheck.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@latest
          out=$(gofumpt -d .)
          if [ -n "$out" ]; then
            echo "::group::gofumpt diff"
            echo "$out"
            echo "::endgroup::"
            echo "::error::gofumpt found unformatted files — run 'bun run check:go' locally"
            exit 1
          fi

      - name: go vet
        if: steps.precheck.outputs.exists == 'true'
        run: go vet ./...

      - name: golangci-lint
        if: steps.precheck.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          working-directory: cli
          version: latest

      - name: go test
        if: steps.precheck.outputs.exists == 'true'
        run: go test ./... -race -count=1

  lint-py:
    name: ruff (format + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - id: precheck
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml not present — Python toolchain hasn't landed yet, skipping."
          fi

      - if: steps.precheck.outputs.exists == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: ruff format --check
        if: steps.precheck.outputs.exists == 'true'
        run: uv run ruff format --check

      - name: ruff check
        if: steps.precheck.outputs.exists == 'true'
        run: uv run ruff check

  test-api:
    name: apps/api (typecheck + vitest + wrangler dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        working-directory: apps/api
        run: bun run typecheck

      - name: Test
        working-directory: apps/api
        run: bun run test

      # `bun run build` is `wrangler deploy --dry-run --outdir dist`
      # (apps/api/package.json). Same script the deploy workflow's
      # SLSA attestation step depends on — running it here keeps the
      # build-output contract under PR-time CI gates.
      - name: Wrangler build (dry-run)
        working-directory: apps/api
        run: bun run build

  test-pkgs:
    name: packages/${{ matrix.pkg }} (typecheck + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        pkg: [db, elements, llm, otel, sdk]
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Typecheck
        working-directory: packages/${{ matrix.pkg }}
        run: bun run typecheck

      - name: Test
        working-directory: packages/${{ matrix.pkg }}
        run: bun run test

  build-web:
    name: apps/web (astro check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Astro check
        working-directory: apps/web
        run: bun run check

      - name: Astro build
        working-directory: apps/web
        run: bun run build

  build-elements:
    name: packages/elements (esbuild + bundle-size)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Build CDN bundle
        working-directory: packages/elements
        run: bun run build

      # DESIGN §3.5 caps the bundle at < 6 KB gzipped (strict). 6144
      # bytes is exactly 6 KB, so the failure threshold is `>= 6144`.
      # Failing CI on regression is cheaper than discovering it after
      # a release.
      - name: Bundle-size budget
        working-directory: packages/elements
        run: |
          size=$(gzip -c dist/v1.js | wc -c)
          echo "::notice::elements/v1.js gzipped: ${size} bytes (cap: 6144)"
          if [ "$size" -ge 6144 ]; then
            echo "::error::Bundle reached or exceeded 6 KB gzipped budget (DESIGN §3.5)"
            exit 1
          fi

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  # Enforces the P3 sync rule from docs/skill-conventions.md §5: every
  # ### GLOBAL-NNN block under .claude/skills/ must be byte-identical
  # to the canonical ## GLOBAL-NNN block in docs/decisions.md, plus a
  # trailing - **Source:** docs/decisions.md#GLOBAL-NNN line. Until this
  # was wired, drift could only be caught by a reviewer running
  # `grep -rn 'GLOBAL-NNN' .claude/skills/` by hand — and at least 8
  # skills had drifted (re-wrapping, annotation suffixes on Source).
  skills-globals-sync:
    name: skill GLOBAL copies ↔ decisions.md (P3 sync)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - name: byte-identity check
        run: bun scripts/check-skill-globals.ts

  lockfile-guard:
    name: lockfile guard (forbidden direct deps)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: ./scripts/lockfile-guard.sh
