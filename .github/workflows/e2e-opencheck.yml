# Manual-trigger web e2e (opencheck) against an ephemeral preview.
# Runs up to 3 sequential suites (A→B→C); the `depth` input selects how far to go (a | ab | abc).
# B only runs if A passes (state dependency: B needs the users DB A creates); C only if B passes.
# Shares the `e2e-staging` concurrency group with e2e-examples.yml.
#
# TOKEN-BUDGET DESIGN — root cause of the 2026-05→06 repeated failures:
#   Groq's free tier has a ~100K-tokens/DAY ACCOUNT-LEVEL cap, shared across every Groq model
#   (per-model pools are per-MINUTE only). The opencheck AGENT loop alone burns ~94K/run, so when
#   both the agent and the staging app drew from Groq the day's budget 429'd before tests finished.
#   Fix: the AGENT runs on OpenRouter `:free` ($0, its own budget); Groq's daily cap is reserved
#   for the staging app's /v1/ask + NL db-create only (~20-40K/run — fits comfortably).
#
# FREE MODELS ONLY (GLOBAL-013). On OpenRouter ONLY a `:free` slug is $0 — a bare slug is PAID
# (2026-05-21: a paid Mistral slug burned ~$14). Agent model (all suites): OpenRouter
# openai/gpt-oss-120b:free — tool-call verified 2026-06-05.
# Top-5 free models + switching guide: docs/features/e2e-coverage/opencheck-operations.md

name: E2E (opencheck)

on:
  workflow_dispatch:
    inputs:
      depth:
        description: "How far to run the state-dependent chain (A→B→C). 'a' = fast ~15-min Suite-A-only signal."
        type: choice
        default: abc
        options: [a, ab, abc]

concurrency:
  group: e2e-staging
  cancel-in-progress: false

permissions: {}

jobs:
  deploy-staging:
    name: Spin up ephemeral preview
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-staging.yml
    with:
      branch_name: e2e
      wrangler_message: "E2E @ ${{ github.sha }}"
    secrets:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # App LLM key for the preview's /v1/ask + NL db-create — without it the
      # journey hangs on every LLM call (240s opencheck timeout). SK-E2E-003.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # Agent on OpenRouter :free (own budget); app-side on Groq (deploy-staging). All suites share
  # the OpenRouter account's free-model request budget (1000 req/day @ ≥$10 balance) — $0 tokens.

  # Suite A — Bootstrap: anonymous → create table → redirect → sign-in → verify adoption.
  # Creates the users DB suites B+C depend on. Always runs (depth a | ab | abc).
  opencheck-a:
    name: "Suite A — Bootstrap"
    needs: deploy-staging
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
      config_file: tests-a-bootstrap.yaml
      provider_base_url: https://openrouter.ai/api/v1
      preflight_model: openai/gpt-oss-120b:free
    secrets:
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  # Suite B — Read/Write: sign-in → trace SQL → insert Alice → read/count/vague/mismatch → CMD+K.
  # Needs the users DB from A. Runs only at depth ab | abc.
  opencheck-b:
    name: "Suite B — Read/Write"
    needs: [deploy-staging, opencheck-a]
    if: ${{ inputs.depth != 'a' }}
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
      config_file: tests-b-write.yaml
      provider_base_url: https://openrouter.ai/api/v1
      preflight_model: openai/gpt-oss-120b:free
    secrets:
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  # Suite C — UX/Cleanup: sign-in → delete-row → create 2nd DB → delete DB → API keys → sign-out → cleanup.
  # Needs the Alice row from B. Runs only at depth abc.
  opencheck-c:
    name: "Suite C — UX/Cleanup"
    needs: [deploy-staging, opencheck-b]
    if: ${{ inputs.depth == 'abc' }}
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
      config_file: tests-c-cleanup.yaml
      provider_base_url: https://openrouter.ai/api/v1
      preflight_model: openai/gpt-oss-120b:free
    secrets:
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  cleanup:
    name: Delete Neon branch
    needs: [deploy-staging, opencheck-a, opencheck-b, opencheck-c]
    # `always()` runs cleanup even when suites failed or were skipped; Neon Free's 10-branch ceiling makes orphans expensive.
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      E2E_NEON_BRANCH: e2e
    steps:
      - name: Delete branch
        shell: bash
        run: |
          set -euo pipefail
          branches=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")
          branch_id=$(echo "$branches" | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -z "$branch_id" ]; then
            echo "no branch named ${E2E_NEON_BRANCH} — nothing to clean up"
            exit 0
          fi
          curl -fsSL -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          echo "deleted Neon branch ${branch_id} (${E2E_NEON_BRANCH})"
