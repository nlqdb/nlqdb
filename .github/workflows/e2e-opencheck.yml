# Manual-trigger web e2e (opencheck) against an ephemeral preview.
# Shares the `e2e-staging` concurrency group with e2e-examples.yml.

name: E2E (opencheck)

on:
  workflow_dispatch:

concurrency:
  group: e2e-staging
  cancel-in-progress: false

permissions: {}

jobs:
  deploy-staging:
    name: Spin up ephemeral preview
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-staging.yml
    with:
      branch_name: e2e
      wrangler_message: "E2E @ ${{ github.sha }}"
    secrets:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  opencheck:
    name: Run E2E
    needs: deploy-staging
    # Reusable-workflow permissions can only be reduced; caller must grant at least what the callee asks for.
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
    # Explicit secrets list keeps the reusable's surface auditable.
    # LLM_API_KEY = current provider key (Mistral; swap to GROQ_API_KEY when
    # Groq daily quota resets — also update OPENAI_BASE_URL + model in tests.yaml).
    secrets:
      LLM_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

  cleanup:
    name: Delete Neon branch
    needs: [deploy-staging, opencheck]
    # `always()` runs cleanup even when opencheck failed; Neon Free's 10-branch ceiling makes orphans expensive.
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      E2E_NEON_BRANCH: e2e
    steps:
      - name: Delete branch
        shell: bash
        run: |
          set -euo pipefail
          branches=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")
          branch_id=$(echo "$branches" | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -z "$branch_id" ]; then
            echo "no branch named ${E2E_NEON_BRANCH} — nothing to clean up"
            exit 0
          fi
          curl -fsSL -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          echo "deleted Neon branch ${branch_id} (${E2E_NEON_BRANCH})"
