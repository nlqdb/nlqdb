# Manual-trigger web e2e (opencheck) against an ephemeral preview.
# Runs up to 3 sequential suites (A→B→C); the `depth` input selects how far to go (a | ab | abc).
# Suites are sequential (order-only `needs`, to protect the shared Groq daily budget) but each runs
# and reports INDEPENDENTLY — B/C are no longer skipped when an upstream suite fails, so every run
# yields a per-suite verdict instead of one fragile chained signal (see the opencheck-b/c `if:` notes).
# Shares the `e2e-staging` concurrency group with e2e-examples.yml.
#
# TOKEN-BUDGET DESIGN — root cause of the 2026-05→06 repeated failures:
#   Groq's free tier has a ~100K-tokens/DAY ACCOUNT-LEVEL cap, shared across every Groq model
#   (per-model pools are per-MINUTE only). The opencheck AGENT loop alone burns ~94K/run, so when
#   both the agent and the staging app drew from Groq the day's budget 429'd before tests finished.
#   Fix: the AGENT runs on OpenRouter `:free` ($0, its own budget); Groq's daily cap is reserved
#   for the staging app's /v1/ask + NL db-create only (~20-40K/run — fits comfortably).
#
# FREE MODELS ONLY (GLOBAL-013). On OpenRouter ONLY a `:free` slug is $0 — a bare slug is PAID
# (2026-05-21: a paid Mistral slug burned ~$14). Agent model (all suites): picked at run time by
# _e2e-opencheck.yml's pre-flight from its ordered `candidate_models` OpenRouter `:free` list —
# one saturated free pool no longer zeroes the run (it cost 4 consecutive runs, 06-12 → 07-05).
# If ALL OpenRouter candidates are saturated (they share one upstream; 13 straight failures
# 07-02 → 07-10), the pre-flight falls back to NVIDIA NIM (NVIDIA_API_KEY, $0 dev tier, ~40 RPM,
# outside the app's engine chain — raids no app budget).
# Engine (app-side /v1/ask) = the cerebras-led free chain (SK-LLM-023), NOT Groq; check the DAILY
# (TPD/RPD) budget of the head before triggering — per-minute headers lie (opencheck-operations.md).
# Free-model table + switching guide: docs/features/e2e-coverage/opencheck-operations.md

name: E2E (opencheck)

on:
  workflow_dispatch:
    inputs:
      depth:
        description: "How far to run the state-dependent chain (A→B→C). 'a' = fast ~15-min Suite-A-only signal."
        type: choice
        default: abc
        options: [a, ab, abc]

concurrency:
  group: e2e-staging
  cancel-in-progress: false

permissions: {}

jobs:
  deploy-staging:
    name: Spin up ephemeral preview
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-staging.yml
    with:
      branch_name: e2e
      wrangler_message: "E2E @ ${{ github.sha }}"
    secrets:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # App LLM key for the preview's /v1/ask + NL db-create — without it the
      # journey hangs on every LLM call (240s opencheck timeout). SK-E2E-003.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # Agent on OpenRouter :free (own budget); app-side on Groq (deploy-staging). All suites share
  # the OpenRouter account's free-model request budget (1000 req/day @ ≥$10 balance) — $0 tokens.

  # Suite A — Bootstrap: anonymous → create table → redirect → sign-in → verify adoption.
  # Creates the users DB suites B+C depend on. Always runs (depth a | ab | abc).
  opencheck-a:
    name: "Suite A — Bootstrap"
    needs: deploy-staging
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
      config_file: tests-a-bootstrap.yaml
    secrets:
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FALLBACK_LLM_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  # Suite B — Read/Write: sign-in → pin "users" DB by name → trace SQL → insert Alice → read/count/vague/mismatch → CMD+K.
  # Runs whenever the deploy is up and depth != 'a' — EVEN IF Suite A failed. `needs: opencheck-a` is
  # ORDER-ONLY here (keeps suites sequential so the shared Groq daily budget never spikes; the whole
  # A→B→C app-side draw is ~20-40K, well under the 100K/day cap — the ~94K consumer is the agent, on
  # OpenRouter :free). It is NOT a success gate: A's dominant flake is the bootstrap (the db.create'd DB
  # exists but isn't queryable as "users"), so the DB is still present and B can pin it by name for an
  # independent read/write signal. Turning B's skip into a signal is the fix for the documented
  # "no sense of progress" trap — one A flake used to zero out all of B+C.
  opencheck-b:
    name: "Suite B — Read/Write"
    needs: [deploy-staging, opencheck-a]
    # `!cancelled()` (not `always()`): run on Suite-A success OR failure, but still honour a manual run cancel.
    if: ${{ !cancelled() && needs.deploy-staging.result == 'success' && inputs.depth != 'a' }}
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
      config_file: tests-b-write.yaml
    secrets:
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FALLBACK_LLM_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  # Suite C — UX/Cleanup: sign-in → pin "users" DB by name → delete-row → create 2nd DB → delete DB → API keys → sign-out → cleanup.
  # Runs at depth abc EVEN IF Suite A or B failed (same order-only `needs`, budget rationale, and
  # pin-by-name as B above). C's cleanup tests still depend on B having seeded the Alice row (it does
  # not re-seed), but running-and-reporting instead of skipping converts a B flake into a visible
  # per-suite verdict + persisted trace rather than a black hole — every abc run now yields up to three
  # independent per-suite verdicts instead of one fragile chained one.
  opencheck-c:
    name: "Suite C — UX/Cleanup"
    needs: [deploy-staging, opencheck-b]
    # `!cancelled()` (not `always()`): run on Suite-B success OR failure, but still honour a manual run cancel.
    if: ${{ !cancelled() && needs.deploy-staging.result == 'success' && inputs.depth == 'abc' }}
    permissions:
      contents: read
    uses: ./.github/workflows/_e2e-opencheck.yml
    with:
      base_url: ${{ needs.deploy-staging.outputs.base_url }}
      config_file: tests-c-cleanup.yaml
    secrets:
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FALLBACK_LLM_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  cleanup:
    name: Delete Neon branch
    needs: [deploy-staging, opencheck-a, opencheck-b, opencheck-c]
    # `always()` runs cleanup even when suites failed or were skipped; Neon Free's 10-branch ceiling makes orphans expensive.
    if: always() && needs.deploy-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      E2E_NEON_BRANCH: e2e
    steps:
      - name: Delete branch
        shell: bash
        run: |
          set -euo pipefail
          branches=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")
          branch_id=$(echo "$branches" | jq -r ".branches[] | select(.name == \"${E2E_NEON_BRANCH}\") | .id")
          if [ -z "$branch_id" ]; then
            echo "no branch named ${E2E_NEON_BRANCH} — nothing to clean up"
            exit 0
          fi
          curl -fsSL -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${branch_id}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
          echo "deleted Neon branch ${branch_id} (${E2E_NEON_BRANCH})"
