# nlqdb — release the `nlq` CLI on tag push.
#
# Trigger: push a tag matching `cli-v*` (e.g. `cli-v0.1.0`).
#   git tag cli-v0.1.0
#   git push origin cli-v0.1.0
#
# What runs: goreleaser reads `cli/.goreleaser.yml`, cross-compiles
# `nlq` for linux/darwin × amd64/arm64, attaches archives + checksums
# to a GitHub Release, and pushes an updated formula to
# `nlqdb/homebrew-tap`.
#
# Required GH repo secrets:
#   - HOMEBREW_TAP_GITHUB_TOKEN — fine-grained PAT scoped to
#     `nlqdb/homebrew-tap` with `contents: write`. Without it, the
#     Homebrew step skips silently (release still creates).
#
# Manual run: workflow_dispatch with `tag` input, useful for
# re-running a failed release on the same tag (delete the GitHub
# Release first if it exists, otherwise goreleaser errors).

name: Release CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin, e.g. cli-v0.1.0)"
        required: true

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Required by goreleaser to create the GitHub Release.
  contents: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: goreleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
