# `nlq` CLI releases via goreleaser. Triggers:
#   - tag push (`cli-v*`) — manual semver bumps
#   - workflow_dispatch — re-run a tag that already exists on origin
#   - workflow_call — invoked by deploy-cli.yml after auto-tag
# Cross-compiles linux/darwin × amd64/arm64, attaches archives + SBOM
# + checksums to a GitHub Release with goreleaser-generated changelog
# (cli/.goreleaser.yml). Homebrew tap bump requires HOMEBREW_TAP_GITHUB_TOKEN.

name: Release CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin, e.g. cli-v0.1.0)"
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin)"
        required: true
        type: string

concurrency:
  group: release-cli-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      # Strip the `cli-` monorepo prefix so goreleaser v2's strict semver
      # parser accepts current + previous tags (`tag_prefix` is PRO only).
      - name: Resolve semver tags
        id: ver
        run: |
          set -euo pipefail
          raw="${{ inputs.tag || github.ref_name }}"
          echo "tag=${raw#cli-}" >> "$GITHUB_OUTPUT"
          prev_raw=$(git tag --list 'cli-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^cli-v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v -x "$raw" \
            | head -n1 || true)
          echo "prev=${prev_raw#cli-}" >> "$GITHUB_OUTPUT"

      # Syft generates the SPDX SBOM that goreleaser attaches to the release.
      - uses: anchore/sbom-action/download-syft@v0

      # --skip=validate is required because GORELEASER_CURRENT_TAG doesn't
      # match a real git tag on HEAD (the real tag is `cli-vX.Y.Z`).
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=validate
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.ver.outputs.tag }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.ver.outputs.prev }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
