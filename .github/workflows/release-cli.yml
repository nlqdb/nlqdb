# `nlq` CLI releases via goreleaser. Triggers:
#   - tag push (`v*`) — manual semver bumps
#   - workflow_dispatch — re-run a tag that already exists on origin
#   - workflow_call — invoked by deploy-cli.yml after auto-tag
# Cross-compiles linux/darwin × amd64/arm64, attaches archives + SBOM
# + checksums to a GitHub Release with goreleaser-generated changelog
# (cli/.goreleaser.yml). Homebrew tap bump requires HOMEBREW_TAP_GITHUB_TOKEN.

name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin, e.g. v0.1.0)"
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin)"
        required: true
        type: string

concurrency:
  group: release-cli-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      # Find the previous v* tag, ignoring any legacy `cli-v*` from older
      # tagging schemes so the auto-changelog window stays inside the new
      # scheme. Empty when this is the first v* release — goreleaser then
      # walks back to the initial commit.
      - name: Compute previous v* tag
        id: prev
        run: |
          set -euo pipefail
          current="${{ inputs.tag || github.ref_name }}"
          prev=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v -x "$current" \
            | head -n1 || true)
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      # Syft generates the SPDX SBOM that goreleaser attaches to the release.
      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.prev.outputs.tag }}
