# Daily acquisition-health cron — runs every agent-runnable walker
# (verify-flows + stranger-test + flow-004 + flow-005) against the
# production deployment and surfaces their JSON artifacts.
#
# Closes the open questions in docs/features/stranger-test/FEATURE.md:
# (a) §1.1 stranger-test daily cron + JSON archive,
# (b) §1.4 FLOW-004 continuous regression watch,
# and satisfies the GLOBAL-032 seven-day walker-freshness rule by
# re-running the canonical-five walkers every 24 h.
#
# Why GitHub Actions and not a Cloudflare cron Worker: CF Workers cannot
# host Chromium for the Playwright walker, and the stranger-IP rule in
# automated-icp-validation-plan.md §1.1 requires egress that is NOT a
# Worker. A GH Actions runner is a "stranger" by that definition.
#
# Why this workflow always exits 0: the operator-loop rule in
# automated-icp-validation-plan.md preamble is "no founder-facing
# notification channel of any shape." GitHub emails the repo owner when
# a scheduled workflow fails on the default branch — a hard exit on a
# walker failure would create that channel. Instead, the artifact JSON
# carries the diagnosis and the next agent run picks the failure up as
# its priority #1 (per the same preamble). Decision: SK-STRG-003.

name: Acquisition health

on:
  # Daily 06:00 UTC — same slot as the weekly ICP scrape cron so the
  # Resend-template / KV-key / middleware regression surface is checked
  # before the next stranger lands. Cron times in actions/schedule are
  # "best-effort" per GitHub docs (can drift up to ~15 min under load);
  # acceptable here because the next agent run reads the latest artifact
  # regardless of wall-clock slot.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override the deployed surface (default: app.nlqdb.com / nlqdb.com)"
        required: false
      mcp_url:
        description: "Override the MCP host for the FLOW-005 walker (default: mcp.nlqdb.com)"
        required: false
      skip_flow_004:
        description: "Skip the FLOW-004 invite-valve walk (saves 1 of 200/week SK-GATE-007 cap)"
        type: boolean
        default: false

permissions:
  contents: read

# Cron and manual triggers share a single in-flight slot — overlapping
# runs would race on the same mail.tm inbox API quota (8 QPS).
concurrency:
  group: acquisition-health
  cancel-in-progress: false

jobs:
  walk:
    name: Walk FLOW-001/002/003/004/005 + verify-flows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # SK-STRG-003: always succeed. Walker failures land in the artifact,
    # not in the workflow exit code. continue-on-error on every step
    # keeps the run green even when a deployed surface regressed.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          # Resolved Playwright version drives invalidation — a transitive
          # bump inside the `^1.49.0` range moves bun.lock but not package.json.
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tools/stranger-test/package.json', 'bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (when cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx --bun playwright install chromium --with-deps

      - name: verify-flows (curl-observable static subset)
        id: verify-flows
        continue-on-error: true
        env:
          NLQDB_BASE_URL: ${{ inputs.base_url || 'https://nlqdb.com' }}
        run: |
          # pipefail surfaces verify-flows.sh's exit code through `tee` —
          # without it `$?` is always `tee`'s exit (0), masking real walker
          # failures inside the artifact.
          set +e
          set -o pipefail
          bash scripts/verify-flows.sh | tee tools/stranger-test/results/verify-flows.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: stranger-test (Playwright FLOW-001/002/003)
        id: stranger-test
        continue-on-error: true
        env:
          NLQDB_BASE_URL: ${{ inputs.base_url || 'https://nlqdb.com' }}
        run: |
          set +e
          bash scripts/stranger-test.sh --prompts 3 --quiet \
            --out tools/stranger-test/results/walk-cron.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: flow-004-walk (invite-valve end-to-end)
        id: flow-004
        if: ${{ inputs.skip_flow_004 != true }}
        continue-on-error: true
        env:
          # SK-GATE-007 invite-valve is on app.nlqdb.com; verify-flows /
          # stranger-test hit the marketing host nlqdb.com.
          NLQDB_BASE_URL: ${{ inputs.base_url || 'https://app.nlqdb.com' }}
          FLOW_004_OUT: tools/stranger-test/results/flow-004-cron.json
        run: |
          set +e
          bash scripts/flow-004-walk.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: flow-005-walk (MCP discovery + auth-wall)
        id: flow-005
        continue-on-error: true
        env:
          # FLOW-005 lives on mcp.nlqdb.com (a separate host from the
          # marketing / app surfaces). The walker consumes no credentials
          # per SK-STRG-005 — only the RFC 9728 / RFC 8414 discovery
          # endpoints and the 401-with-challenge path. Preview-MCP
          # overrides land as a separate input when the first preview
          # MCP environment exists; today the production host is canonical.
          NLQDB_MCP_URL: ${{ inputs.mcp_url || 'https://mcp.nlqdb.com' }}
          FLOW_005_OUT: tools/stranger-test/results/flow-005-cron.json
        run: |
          set +e
          bash scripts/flow-005-walk.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload walker artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: acquisition-health-${{ github.run_id }}
          path: tools/stranger-test/results/*
          retention-days: 90

      - name: Emit run summary
        if: always()
        run: |
          set -u
          flow004="tools/stranger-test/results/flow-004-cron.json"
          flow005="tools/stranger-test/results/flow-005-cron.json"
          walk="tools/stranger-test/results/walk-cron.json"
          # Read the canonical `state` from the JSON artifacts so the agent
          # re-fetching the summary can react without downloading the bundle.
          flow004_state="$([ -f "$flow004" ] && jq -r '.state // "missing"' "$flow004" || echo "skipped")"
          flow005_state="$([ -f "$flow005" ] && jq -r '.state // "missing"' "$flow005" || echo "missing")"
          walk_state="missing"
          if [ -f "$walk" ]; then
            walk_state="$(jq -r 'if .summary.failed > 0 then "failed (\(.summary.failed)/\(.summary.totalRuns))" else "passed (\(.summary.passed)/\(.summary.totalRuns))" end' "$walk")"
          fi
          vf_state="$([ "${{ steps.verify-flows.outputs.exit_code || '1' }}" = "0" ] && echo "passed" || echo "failed")"
          {
            echo "## Acquisition health — daily walk"
            echo ""
            echo "| Walker | State | Exit code | Artifact |"
            echo "|---|---|---|---|"
            echo "| verify-flows.sh | ${vf_state} | ${{ steps.verify-flows.outputs.exit_code || 'n/a' }} | verify-flows.log |"
            echo "| stranger-test.sh | ${walk_state} | ${{ steps.stranger-test.outputs.exit_code || 'n/a' }} | walk-cron.json |"
            echo "| flow-004-walk.sh | ${flow004_state} | ${{ steps.flow-004.outputs.exit_code || 'skipped' }} | flow-004-cron.json |"
            echo "| flow-005-walk.sh | ${flow005_state} | ${{ steps.flow-005.outputs.exit_code || 'n/a' }} | flow-005-cron.json |"
            echo ""
            if [ -f "$flow004" ]; then
              echo "### FLOW-004 outcome"
              jq -r '
                "- state: " + .state,
                "- gate_bypassed: " + (.gate_bypassed | tostring),
                "- control_blocked: " + (.control_blocked | tostring),
                "- email_latency_s: " + (.email_latency_s | tostring),
                "- total_wall_s: " + (.total_wall_s | tostring),
                "- ask_status: " + (.ask_status | tostring),
                "- ask_error_status: " + (.ask_error_status // "" | tostring),
                "- first_value_quality: " + (.first_value_quality // "n/a" | tostring) + " (kind=" + (.first_value_kind // "n/a" | tostring) + ", " + (.table_count // 0 | tostring) + " tables, " + (.row_count // 0 | tostring) + " rows)"
              ' "$flow004"
            fi
            if [ -f "$flow005" ]; then
              echo ""
              echo "### FLOW-005 outcome"
              jq -r '
                "- state: " + .state,
                "- discovery_ok: " + (.discovery_ok | tostring),
                "- auth_wall_ok: " + (.auth_wall_ok | tostring),
                "- challenge_url_matches: " + (.challenge_url_matches | tostring),
                "- checks_passed: " + (.checks_passed | tostring),
                "- checks_failed: " + (.checks_failed | tostring),
                "- total_wall_s: " + (.total_wall_s | tostring)
              ' "$flow005"
            fi
            if [ -f "$walk" ]; then
              echo ""
              echo "### stranger-test outcome"
              jq -r '
                "- total walks: " + (.summary.totalRuns | tostring),
                "- passed: " + (.summary.passed | tostring),
                "- failed: " + (.summary.failed | tostring),
                "- ttfv p50 ms: " + (.summary.ttfvP50Ms // 0 | tostring),
                "- ttfv p95 ms: " + (.summary.ttfvP95Ms // 0 | tostring)
              ' "$walk" || true
            fi
          } >> "$GITHUB_STEP_SUMMARY"
