# Close Stale Issues — marks issues and pull requests with no recent
# activity as `stale`, then closes them if they stay quiet. Wraps the
# "Close Stale Issues" marketplace action (actions/stale).
#
# Schedule: once daily at 01:30 UTC (off the top-of-hour congestion;
# actions/schedule cron is best-effort per GitHub and can drift ~15 min
# under load — fine here, the next run reconciles).
#
# Dry run: trigger manually via the Actions tab (workflow_dispatch) with
# debug-only=true to log what WOULD be marked/closed without touching
# anything. Recommended for the first run to sanity-check the policy.
#
# Permissions follow SK-CIPERM-001 (default-deny, least privilege): the
# action only needs to write issues and pull requests, nothing else.

name: Close stale issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      debug-only:
        description: "Dry run — log what would change without modifying anything"
        type: boolean
        default: false

permissions:
  issues: write
  pull-requests: write

# One in-flight run; a manual dry run shouldn't race the nightly cron.
concurrency:
  group: stale
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          # Issues: 60 days idle → stale, +14 days idle → closed.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked
            stale. Comment, or remove the `stale` label, to keep it open;
            otherwise it will be closed in 14 days.
          close-issue-message: >
            Closing as stale after a further 14 days of inactivity. Reopen
            if it's still relevant — thanks!
          # PRs get a longer fuse so in-flight work isn't reaped.
          days-before-pr-stale: 90
          days-before-pr-close: 21
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has had no activity for 90 days and is now
            marked stale. Push a commit or comment to keep it open;
            otherwise it will be closed in 21 days.
          close-pr-message: >
            Closing as stale after a further 21 days of inactivity. Reopen
            when you'd like to pick it back up — thanks!
          # Never reap pinned or security-tagged work.
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
          # Be a good API citizen on busy days.
          operations-per-run: 100
          debug-only: ${{ inputs.debug-only || false }}
