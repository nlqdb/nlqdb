# Suite C — UX + Cleanup (9 tests, ~15-20 min, ~140K tokens).
# Depends on Suite B having added Alice to the users table.
# Starts with a fresh browser session; #c-setup signs in and verifies state.
#
# FREE MODELS ONLY (GLOBAL-013 — $0 free tier). NEVER use a paid model here.
# On OpenRouter, ONLY slugs ending in :free are $0 — the bare slug (no :free) is PAID (2026-05-21 burned ~$14).
# Top-5 free LLM models for opencheck (researched 2026-06-09T01:10Z via live API: gpt-oss-120b:free tool-call returned cost:0, key balance $20.21, usage_daily 0; Groq app-side HTTP 200 fresh):
#   1. OpenRouter openai/gpt-oss-120b:free — $0 ($10+ balance → 1000 req/day, 20 RPM); reasoning-tuned; CURRENT agent model.
#   2. OpenRouter openai/gpt-oss-20b:free  — $0; lighter/faster; same OpenRouter free request budget.
#   3. Groq llama-3.3-70b-versatile        — 12K TPM / 1K RPM but ~100K tokens/DAY ACCOUNT cap (shared across ALL Groq models).
#   4. Groq openai/gpt-oss-120b            — 8K TPM; reasoning-tuned; shares the same Groq daily account cap.
#   5. Cerebras gpt-oss-120b               — 30K TPM / 1M TPD; tool-use verified; BUT only 5 RPM (too slow for agent loops).
# NOT usable: qwen/qwen3-32b (tool-call fails on Groq), llama-4-scout (type coercion error on number params).
# This suite's ~140K-token loop exceeds Groq's 100K/day cap on its own → must run on OpenRouter :free ($0 tokens).
# Switch provider: edit model: below + provider_base_url/preflight_model in e2e-opencheck.yml + LLM_API_KEY source.

baseUrl: "__BASE_URL__"
modelProvider: "openai"
model: "openai/gpt-oss-120b:free"

sessionMode: "persistent"
timeout: 240000

recording:
  trace: true
  video: false

tests:
  - name: "#c-setup"
    case: |
      Navigate directly to "/auth/sign-in". Call browser_snapshot.
      If the URL contains "/app" (already signed in), skip the sign-in step.
      Otherwise find the "Sign in as this user" button and click it with browser_click.
      If you receive "Not connected", navigate to "/app" and call browser_snapshot.
      Now verify the URL contains "/app".
      Pin the users database deterministically (do NOT rely on the newest-DB
      auto-pin — a stray empty DB can be newer and win the pin): call
      browser_snapshot and, in the left sidebar, find the database button whose
      visible text contains "users" (the DB Suite A created, seeded with Alice by
      Suite B) and click its ref. Confirm "?db=" then appears in the URL
      (re-snapshot up to 5 times, 3s apart, to let the sidebar finish loading).
      If no sidebar button contains "users" after 5 re-snapshots, TEST_FAILED —
      Suite A and B must have run first.
      Once the users DB is pinned ("?db=" in the URL), TEST_PASSED.

  - name: "#delete-row"
    case: |
      The browser is signed in and #c-setup already pinned the users DB, so
      this persistent session is already on "/app" with "?db=" in the URL.
      Do NOT navigate to a bare "/app" — that drops the pin and selects a
      different DB, so the delete would hit the wrong table and never find
      Alice (re-navigating repeatedly is also what blew the 240s budget).
      Call browser_snapshot on the CURRENT page. Only if the URL no longer
      contains "?db=" (or "Something broke on this page" is shown), re-pin:
      in the left sidebar click the database button whose visible text
      contains "users", then confirm "?db=" is back in the URL.
      Now do the delete, mirroring the proven Suite-B insert flow (bounded
      retry, no improvised navigation): get a FRESH browser_snapshot, find
      the chat textarea (placeholder "Ask about your data…") and IMMEDIATELY
      click its ref — do NOT call any other tool between the snapshot and the
      click (refs go stale on re-render). Type:
        delete the row where name = 'Alice'
      Press Enter as a SEPARATE browser_key_down call. If a confirm/diff chip
      appears, press Enter once more to approve (do NOT click any button —
      press Enter in the focused input). Wait 5 seconds, then call
      browser_snapshot and verify no row with name "Alice" remains in the
      users table. If Alice is still present, retry the whole delete ONCE
      more (fresh snapshot → click textarea → retype → Enter → approve chip
      → wait 5s → snapshot). TEST_PASSED when Alice is absent; TEST_FAILED if
      Alice is still present after 2 attempts.

  - name: "#create-second-database"
    case: |
      The browser is signed in from previous tests. Navigate to
      "/app". Call browser_snapshot. If the sidebar shows
      "Couldn't load databases." or a loading error, wait 5 seconds
      and call browser_snapshot again; repeat once more if needed
      (total wait up to 10 seconds). The sidebar should show at least
      one database entry from previous tests. In the left sidebar
      click the "+ New" button. A small form with a "Name" input
      appears. Type
        products-tracker
      into that input and click the "Create" button EXACTLY ONCE —
      do NOT click it again. Now poll: call browser_snapshot, wait
      3 seconds, call browser_snapshot, wait 3 seconds, ... repeating
      this pattern. Count your browser_snapshot calls after the
      Create click: on the 16th snapshot call, STOP immediately. If
      "products-tracker" is visible in ANY of those 16 snapshots,
      verify the sidebar now shows at least two database entries
      below "All databases" and TEST_PASSED. If after the 16th
      snapshot "products-tracker" is still not visible, output
      TEST_FAILED — database creation did not complete. Do NOT call
      browser_snapshot a 17th time. Do NOT click Create again.

  - name: "#delete-active-db-dialog-opens"
    case: |
      The browser is signed in and the sidebar (aria-label "Your
      databases") shows at least two database entries from previous
      tests — do NOT re-create any databases. Call browser_snapshot.
      Locate the currently active (highlighted) database row. If the
      sidebar shows "Couldn't load databases" or no database rows are
      visible, wait 3 seconds and call browser_snapshot again; do
      this at most 8 times total (24 seconds). If after 8 attempts
      the sidebar is still not loading, TEST_FAILED — sidebar did not
      load. If the sidebar IS loaded but shows fewer than 2 database
      entries below "All databases", TEST_FAILED immediately — the
      second database from #create-second-database is missing.
      Click the "×" button at the right edge of the active database
      row (aria-label starts with "Delete "). Call browser_snapshot.
      Verify a modal dialog with the heading "Delete database" is
      visible in the snapshot. Do NOT confirm the deletion here —
      just verify the modal opened. TEST_PASSED once you can see the
      "Delete database" heading in the snapshot.

  - name: "#delete-active-db-typed-confirm"
    case: |
      The "Delete database" modal is open from the previous test.
      Call browser_snapshot. The dialog shows a database name in a
      <code> block next to a "Copy" button. Read the exact text inside
      that <code> block, then type that EXACT same text into the input
      field below it (it must match character-for-character including
      spaces). Once the input matches, the "Delete" button becomes
      enabled — click it. Verify the dialog closes and that database
      entry is gone from the sidebar list.
      If the modal is NOT open (previous test closed it or it timed
      out), open it again: find the active database row in the sidebar,
      click its "×" button (aria-label starts with "Delete "), verify
      the "Delete database" heading is visible, then proceed with the
      typed confirmation above.

  - name: "#api-keys-mint-and-revoke"
    case: |
      Navigate the browser directly to "/app/keys". If the page shows
      an error message ("Something broke on this page" or similar),
      click the "Reload" button on that error card and wait 3 seconds
      before proceeding. Verify a heading "API keys" is visible.
      Use browser_snapshot for all verification (do NOT use
      browser_evaluate — it fails in this context).
      Click the "New key" button. A modal appears with the heading
      "Mint a new key". Type
        opencheck-smoke
      into the "Label (optional)" input and click the "Mint" button.
      The modal heading swaps to "Copy your new key" and a <code>
      block contains a string starting with "sk_live_". Click
      the "Done" button to close the dialog. Verify a key row with
      the label "opencheck-smoke" is now present in the list.
      Click "Revoke" on that row, then in the confirm dialog
      ("Revoke this key?") click the "Revoke" button. Verify the
      row moves to the "Revoked" group (the "Active" group no
      longer contains the "opencheck-smoke" row).

  - name: "#sign-out"
    case: |
      The browser is signed in from previous tests. Navigate directly
      to "/app". In the top navigation bar there is a direct "Sign
      out" button (no dropdown or user-menu needed — it is visible
      directly in the primary nav). Click it. Verify the URL is no
      longer "/app" and the "Sign out" button is no longer in the nav.

  - name: "#sign-in-again"
    case: |
      The previous test signed out. Navigate the browser directly
      to "/auth/sign-in". On the mock IdP form click the "Sign in as
      this user" button using browser_click (use browser_snapshot to
      find the button ref — do NOT use browser_evaluate). Wait for
      the URL path to become "/app". If the URL is "/app" but the
      sidebar shows "Loading…" or no database entries, wait 5 seconds
      and call browser_snapshot again (retry up to 3 times) — the
      sidebar loads asynchronously after sign-in.
      Use browser_snapshot ONLY — do NOT use browser_evaluate — to
      verify the sidebar shows at least one database row remaining
      from the prior session (its display name starts with "users").

  - name: "#delete-remaining-db"
    case: |
      The previous test signed in again. Delete ALL database entries in the sidebar
      whose names start with "users" (there may be one or more
      due to prior test runs). For each such entry: click its "×"
      button (aria-label starts with "Delete "), copy the exact
      name shown in the <code> block in the modal into the
      confirmation input (must match character-for-character,
      including spaces), click "Delete", and wait for the dialog
      to close before proceeding to the next. After all "users*"
      entries are gone, verify the sidebar's database list is
      empty (only the "All databases" item remains and the rail
      shows "No databases yet — create one." or no DB rows).
