# Suite A — Bootstrap (5 tests, ~12-18 min, ~105K tokens).
# Tests the anonymous → create-table → redirect → sign-in → auth-preserved →
# queryable-table path (the last test reads the adopted table to prove it works).
# Runs first; Suite B and C depend on the queryable users DB this suite creates.
#
# FREE MODELS ONLY (GLOBAL-013 — $0 free tier). NEVER use a paid model here.
# On OpenRouter, ONLY slugs ending in :free are $0 — the bare slug (no :free) is PAID (2026-05-21 burned ~$14).
# __MODEL__ is substituted at run time by _e2e-opencheck.yml's pre-flight, which walks its ordered
# `candidate_models` list (all OpenRouter :free) and picks the first that answers a tool-call probe.
# Agent on OpenRouter :free so its ~94K-token loop has its own budget; Groq's 100K/day is left for the app's /v1/ask.
# Free-model table + switching guide: docs/features/e2e-coverage/opencheck-operations.md

baseUrl: "__BASE_URL__"
modelProvider: "openai"
model: "__MODEL__"

sessionMode: "persistent"
timeout: 240000

recording:
  trace: true
  video: false

tests:
  - name: "#hero-or-cmdg"
    case: |
      Navigate to the base URL. Call browser_snapshot immediately
      after the page loads — do NOT press Control+G or any other
      key first. Use browser_snapshot to verify (do NOT use
      browser_evaluate or DOM queries). The homepage is the two-door
      hero (SK-WEB-003): the snapshot must contain BOTH
        (a) a heading line containing "Analytical memory"
        (b) a link whose text contains "describe your data"
          (the anonymous door, pointing at /app/new/)
      Once you see both, respond with TEST_PASSED immediately — do
      NOT take any further browser actions. If either is absent from
      the snapshot, the test fails.

  - name: "#create-table-anon"
    case: |
      Navigate to "/app/new/" (the anonymous-door target the homepage
      links as "just describe your data"). Call browser_snapshot. Find
      the input with placeholder "an orders tracker" — it hydrates
      client-side, so if it is not in the first snapshot wait 3 seconds
      and snapshot again (up to 3 times). Click it and type:
        create a users table with id, name, email
      Press Enter as a SEPARATE browser_key_down call (do NOT use submit: true).
      The form calls the API — DB creation (LLM inference + schema provision)
      takes 15-60 s. The page does NOT redirect (SK-ANON-012: the anonymous
      device's 1st /v1/ask call provisions the DB in place). Stay on the base
      URL and poll: call browser_snapshot every 5 seconds up to 12 times (60 s)
      until "Provisioned with" is visible anywhere on the page. If after 12
      polls "Provisioned with" is still absent, TEST_FAILED — DB creation timed
      out. Once "Provisioned with" is visible, TEST_PASSED immediately — do NOT
      sign in and do NOT navigate away. Stay anonymous: the next test exercises
      the per-device auth wall on the 2nd anonymous call, which only fires while
      still signed out.

  - name: "#add-row-redirects-to-auth"
    case: |
      This is the anonymous device's SECOND /v1/ask call. The previous test
      used the device's one free call (SK-ANON-012), so a 2nd anonymous
      submission must hit the per-device cap and redirect to sign-in. Do NOT
      sign in before this test — it must run while still anonymous.
      Step 1 — Navigate to the base URL (the marketing page).
      Step 2 — Call browser_snapshot and confirm the hero input
      with placeholder "an orders tracker" is visible. Do NOT
      re-create the users table — a previous session provisioned
      one already.
      Step 3 — Click the text input (placeholder "an orders
      tracker") and type
        add a new row: name='Alice', email='alice@example.com'
      Step 4 — Press Enter as a SEPARATE tool call (do NOT use
      the submit parameter on browser_type).
      Step 5 — Wait for the page to navigate AWAY from the base
      URL. The destination URL must contain "/auth/sign-in".
      Verify the URL contains "/auth/sign-in".
      Do not submit the sign-in form yet.

  - name: "#mock-sign-in"
    case: |
      Navigate directly to "/auth/sign-in". If the page immediately
      redirects to "/app" (session already active), that is acceptable
      — the test passes. Otherwise the mock-IdP form will be visible
      with a default email field and a "Sign in as this user" button.
      Use browser_snapshot to find the "Sign in as this user" button
      ref, then click it with browser_click using that ref (do NOT use
      browser_evaluate, browser_fill_form, or browser_run_code).
      After clicking, you may receive "Not connected" errors — this is
      normal and means the page navigated away successfully. If you get
      "Not connected", call browser_navigate to "/app" and take a
      browser_snapshot to verify the URL contains "/app".
      The test passes once the URL contains "/app" — do not fail based
      on any error or loading content visible on the page.

  - name: "#authed-state-preserved"
    case: |
      Navigate to "/app". The previous test signed in, so the
      session cookie is valid. Call browser_snapshot. If "Something
      broke on this page" is visible, click the "Reload" button
      (do NOT click "Sign out") and call browser_snapshot again.
      If the sidebar shows "Loading…", wait 5 seconds and call
      browser_snapshot one more time. Then check: does the left
      sidebar show at least one entry whose visible text contains
      "users" (any casing)? If no — TEST_FAILED immediately (the anon
      DB was not adopted into this account).
      If yes, verify the adopted users table is actually QUERYABLE — a
      sidebar entry alone does NOT prove a queryable table, and this is
      the real precondition Suite B depends on. Poll: call browser_snapshot,
      and if "?db=" is not yet in the URL wait 3 seconds and snapshot again,
      up to 5 times (the app auto-pins the newest DB). Then find the chat
      textarea (placeholder "Ask about your data…") and IMMEDIATELY click
      its ref (no other tool between snapshot and click). Type:
        how many users are there?
      Press Enter as a SEPARATE browser_key_down call. Wait 5 seconds and
      call browser_snapshot. If the reply is a table-missing or error
      message ("references a table this database doesn't have", "no such
      table", or "Something went wrong") — TEST_FAILED: the bootstrap flow
      did not leave a queryable users table. If the reply is a valid count
      or data response — TEST_PASSED (a count of 0 is valid: the table
      exists but stays empty until Suite B seeds Alice).
      Use browser_snapshot ONLY — do NOT use browser_evaluate or any
      DOM query tool (browser_evaluate errors in this context).
