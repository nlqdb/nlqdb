# E2E flow: anonymous → table-create → mutation-gate → mock-auth → write → UX coverage → delete → sign-out → cleanup.
# Runtime: caller workflow substitutes __BASE_URL__ via sed before invoking bunx opencheck (see .github/workflows/e2e-opencheck.yml).
# LLM: OpenRouter mistralai/mistral-small-3.2-24b-instruct (paid — no RPM cap, ~$0.06/run). Model table: docs/features/e2e-coverage/FEATURE.md.

baseUrl: "__BASE_URL__"
modelProvider: "openai"
model: "mistralai/mistral-small-3.2-24b-instruct"

# Persistent mode: auth cookie + localStorage persist across tests; page resets to about:blank each test (wrapper kills/restarts playwright-mcp).
sessionMode: "persistent"

timeout: 240000

# video: false — --save-video shells out to ffmpeg which ubuntu-latest doesn't ship.
recording:
  trace: true
  video: false

tests:
  - name: "#hero-or-cmdg"
    case: |
      Navigate to the base URL. Call browser_snapshot immediately
      after the page loads — do NOT press Control+G or any other
      key first (the hero form is unconditionally visible since
      GLOBAL-027 retired the Cmd+G gate). Use browser_snapshot to
      verify (do NOT use browser_evaluate or DOM queries).
      In the snapshot the hero input appears as:
        textbox "What are you building?" with /placeholder: an orders tracker
      Any snapshot line containing "an orders tracker" confirms it
      is present. Once you see it, respond with TEST_PASSED
      immediately — do NOT take any further browser actions.
      If the text "an orders tracker" is absent from the snapshot,
      the test fails. (The waitlist email input has a different
      placeholder — do not confuse them.)

  - name: "#create-table-anon"
    case: |
      Step 1 — Navigate to the base URL. Call browser_snapshot.
      Find the input with placeholder "an orders tracker". Click it,
      type:
        create a users table with id, name, email
      then press Enter as a SEPARATE browser_key_down call (do NOT
      use submit: true on browser_type). Do NOT use browser_wait_for
      anywhere in this test — use browser_snapshot to check URLs.
      Call browser_snapshot. If "Something broke on this page" is
      visible, click the "Reload" button once and call
      browser_snapshot again. (One retry only.)
      Step 2 — Navigate to "/auth/sign-in". Call browser_snapshot.
      If a "Sign in as this user" button is visible, click it with
      browser_click. If you receive "Not connected" after clicking,
      that is normal — the page navigated away. Navigate to "/app"
      and call browser_snapshot. If "Something broke on this page"
      is visible, click "Reload" and call browser_snapshot again.
      Step 3 — Check the "Page URL:" line at the top of the
      browser_snapshot result (do NOT use browser_wait_for — read
      the URL from the snapshot header directly).
      a) If the URL contains "?db=" — a database is active.
         Proceed to Step 4.
      b) If the URL does NOT contain "?db=" — no database yet.
         Click "+ New" in the left sidebar (aria-label "Your
         databases"), type "users-db" in the "Name" input, click
         "Create". Call browser_snapshot and verify the URL now
         contains "?db=". Then click the chat textarea (placeholder
         "Ask about your data…"), type:
           create a users table with id, name, email
         and press Enter as a SEPARATE browser_key_down call.
         If a confirm/diff chip appears, press Enter to approve.
         Call browser_snapshot and verify "Provisioned with" is
         visible in the snapshot text.
      Step 4 — Sign out: click the "Sign out" button in the top
      navigation bar and wait for the URL to change away from
      "/app". TEST_PASSED.

  - name: "#add-row-redirects-to-auth"
    case: |
      Step 1 — Navigate to the base URL (the marketing page).
      Step 2 — Call browser_snapshot and confirm the hero input
      with placeholder "an orders tracker" is visible. Do NOT
      re-create the users table — a previous session provisioned
      one already.
      Step 3 — Click the text input (placeholder "an orders
      tracker") and type
        add a new row: name='Alice', email='alice@example.com'
      Step 4 — Press Enter as a SEPARATE tool call (do NOT use
      the submit parameter on browser_type).
      Step 5 — Wait for the page to navigate AWAY from the base
      URL. The destination URL must contain "/auth/sign-in".
      Verify the URL contains "/auth/sign-in".
      Do not submit the sign-in form yet.

  - name: "#mock-sign-in"
    case: |
      Navigate directly to "/auth/sign-in". If the page immediately
      redirects to "/app" (session already active), that is acceptable
      — the test passes. Otherwise the mock-IdP form will be visible
      with a default email field and a "Sign in as this user" button.
      Use browser_snapshot to find the "Sign in as this user" button
      ref, then click it with browser_click using that ref (do NOT use
      browser_evaluate, browser_fill_form, or browser_run_code).
      After clicking, you may receive "Not connected" errors — this is
      normal and means the page navigated away successfully. If you get
      "Not connected", call browser_navigate to "/app" and take a
      browser_snapshot to verify the URL contains "/app".
      The test passes once the URL contains "/app" — do not fail based
      on any error or loading content visible on the page.

  - name: "#authed-state-preserved"
    case: |
      Navigate to "/app". The previous test signed in, so the
      session cookie is valid. Call browser_snapshot. If "Something
      broke on this page" is visible, click the "Reload" button
      (do NOT click "Sign out") and call browser_snapshot again.
      If the sidebar shows "Loading…", wait 5 seconds and call
      browser_snapshot one more time. Then check: does the left
      sidebar show at least one entry whose visible text contains
      "users" (any casing)?
      If yes — TEST_PASSED immediately.
      If no — TEST_FAILED immediately. A missing "users" entry
      means the anon DB was not adopted into this account.
      Use browser_snapshot ONLY — do NOT use browser_evaluate or any
      DOM query tool (browser_evaluate errors in this context).

  - name: "#submit-prefilled-row"
    case: |
      Navigate to "/app". Call browser_snapshot and check the
      "Page URL:" line at the top of the snapshot. If "?db=" is
      NOT in the URL (no databases): click "+ New" in the left
      sidebar (aria-label "Your databases"), type "users-db" in
      the "Name" input, click "Create", and verify the URL now
      contains "?db=" in a new browser_snapshot.
      If "Something broke on this page" is visible, click "Reload"
      (not "Sign out") and call browser_snapshot again.
      Find the chat textarea in the snapshot: look for
        textbox "Ask about your data…"
      in the snapshot YAML and note its ref. Click it using that
      ref and type the prompt fresh (do NOT check if pre-filled):
        add a new row: name='Alice', email='alice@example.com'
      Press Enter as a SEPARATE tool call. If a confirm/diff chip
      appears, press Enter once to approve — do NOT click any
      button labeled "Approve" or "Create new database".
      Check the response:
      a) If the response shows "Couldn't reach the database" or
         any network/connection error: wait 5 seconds. Call
         browser_snapshot, find the textarea ref in THIS snapshot,
         click it, re-type the same INSERT prompt, press Enter,
         and press Enter again if a chip appears. Retry once only.
      b) If the response shows "references a table this database
         doesn't have" or "no such table": click the textarea,
         type:
           create a users table with id, name, email
         press Enter separately. Do NOT click any "Create new
         database" button. If a confirm/diff chip appears, press
         Enter to approve. Wait for "Provisioned with" to appear.
         Then click the textarea, type the INSERT prompt, press
         Enter, and press Enter again if a chip appears.
      Verify the response shows a row with name "Alice" and
      email "alice@example.com".

  - name: "#read-shows-informative-data"
    case: |
      #submit-prefilled-row, then in the same chat input type
        list all users in the table
      and submit. Verify the chat reply has both: a data row with
      "Alice" / "alice@example.com", AND a natural-language summary
      sentence that mentions "Alice" or "1 user".

  - name: "#count-summarizes"
    case: |
      #read-shows-informative-data, then type
        how many users are there?
      and submit. If the reply shows an error (including "references
      a table this database doesn't have" or "Something went wrong"),
      wait 3 seconds and submit the same prompt once more (retry at
      most once). Verify the reply surfaces the number 1 (or more,
      if multiple Alice rows exist from prior test runs), either in
      the summary text or as a returned data cell.

  - name: "#trace-shows-sql"
    case: |
      Navigate to "/app". The app auto-pins the newest database on
      load; call browser_snapshot and check for "?db=" in the URL.
      If "?db=" is not in the URL after 5 seconds, TEST_FAILED —
      a signed-in session with a database is required.
      Click the chat textarea (placeholder "Ask about your data…")
      and type:
        how many users are there?
      Press Enter as a SEPARATE browser_key_down call. Wait for the
      reply to appear. Then open the trace pane on that reply: click
      the "trace" summary element (it appears as a collapsible label
      near the reply). Verify a <pre> block containing SQL is visible
      — it must contain "users" and a SQL keyword like SELECT or COUNT.

  - name: "#vague-question-handled"
    case: |
      Navigate to "/app". The app auto-pins the newest database on
      load; call browser_snapshot and check for "?db=" in the URL.
      If "?db=" is not in the URL after 5 seconds, TEST_FAILED —
      a signed-in session with a database is required.
      Click the chat textarea (placeholder "Ask about your data…")
      and type:
        anything interesting in here?
      Press Enter as a SEPARATE browser_key_down call. If the page
      shows a full-page React error ("Something broke" with a reload
      button), click reload and re-submit the prompt from the chat
      textarea. Verify the chat reply is NOT a bare dead-end message
      like "Something went wrong — try again."
      Acceptable: data rows, a clarification chip with a button, or a
      textual reply referencing users / Alice / row count.

  - name: "#schema-mismatch-clarifies"
    case: |
      Navigate to "/app". The app auto-pins the newest database on
      load; call browser_snapshot and check for "?db=" in the URL.
      If "?db=" is not in the URL after 5 seconds, TEST_FAILED —
      a signed-in session with a database is required.
      Click the chat textarea (placeholder "Ask about your data…")
      and type:
        show me all the orders
      Press Enter as a SEPARATE browser_key_down call. There is no
      orders table — only users.
      If a React error boundary appears ("Something broke on this
      page" with a Reload button), click the Reload button and
      re-submit the prompt from the chat textarea.
      Use browser_snapshot ONLY to verify (do NOT use browser_evaluate
      — it fails in this context).
      Verify the reply is NOT a bare "Something went wrong — try again."
      Acceptable: a message naming the missing "orders" table or
      the available "users" table, or a clarification chip.

  - name: "#cmdk-palette-discoverable"
    case: |
      Navigate to "/app". Call browser_snapshot to confirm the URL
      contains "/app". Click once on the page OUTSIDE the chat
      textarea (e.g. click the heading or sidebar area) to ensure
      the chat textarea is NOT focused. Then press Ctrl+K (Cmd+K on
      Mac). Verify a modal appears with placeholder "Type a command…"
      and action labels including at least two of "New database",
      "Copy embed snippet", "API keys", "Sign out". Press Escape
      and verify the modal closes.

  - name: "#delete-row"
    case: |
      The browser is signed in from previous tests. Navigate to
      "/app". Call browser_snapshot. If "Something broke on this
      page" is visible, click the "Reload" button (do NOT click
      "Sign out") and call browser_snapshot again.
      Find the chat textarea in THIS snapshot: look for
        textbox "Ask about your data…"
      in the snapshot YAML and note its ref. Use ONLY the ref
      from THIS snapshot — do NOT reuse refs from earlier calls.
      If the snapshot is truncated (ends with "[... N chars
      truncated ...]") and does not show the textarea, call
      browser_snapshot once more to get a fresh view. Click the
      textarea using the ref from the current snapshot and type:
        delete the row where name = 'Alice'
      and press Enter as a SEPARATE browser_key_down call. If a
      confirm/diff chip appears, press Enter once to approve (do NOT
      click any button — press Enter in the focused input). Call
      browser_snapshot and verify the Alice row is no longer present
      in the users table (0 rows OR the row is absent). If the
      textarea is not visible yet, wait 3 seconds and call
      browser_snapshot again before proceeding.

  - name: "#create-second-database"
    case: |
      The browser is signed in from previous tests. Navigate to
      "/app". Call browser_snapshot. If the sidebar shows
      "Couldn't load databases." or a loading error, wait 5 seconds
      and call browser_snapshot again; repeat once more if needed
      (total wait up to 10 seconds). The sidebar should show at least
      one database entry from previous tests. In the left sidebar
      click the "+ New" button. A small form with a "Name" input
      appears. Type
        products-tracker
      into that input and click the "Create" button. Wait until
      the new database appears in the sidebar list. The new entry
      will be active (highlighted) and the chat header changes
      to its name. Verify the sidebar now shows at least two
      database entries below the "All databases" item.

  - name: "#delete-active-db-dialog-opens"
    case: |
      The browser is signed in and the sidebar (aria-label "Your
      databases") shows at least two database entries from previous
      tests — do NOT re-create any databases. Call browser_snapshot.
      Locate the currently active (highlighted) database row. If the
      sidebar shows "Couldn't load databases" or no database rows are
      visible, wait 3 seconds and call browser_snapshot again; do
      this at most 5 times total (15 seconds). If after 5 attempts
      the sidebar is still not loading, the test fails.
      Click the "×" button at the right edge of the active database
      row (aria-label starts with "Delete "). Verify a modal dialog
      appears with the heading "Delete database" and body text that
      includes "This cannot be reverted" and a text input.

  - name: "#delete-active-db-typed-confirm"
    case: |
      #delete-active-db-dialog-opens. The dialog shows a database
      name in a <code> block next to a "Copy" button. Read the
      exact text inside that <code> block, then type that EXACT
      same text into the input field below it (it must match
      character-for-character including spaces). Once the input
      matches, the "Delete" button becomes enabled — click it.
      Verify the dialog closes and that database entry is gone
      from the sidebar list.

  - name: "#api-keys-mint-and-revoke"
    case: |
      #delete-active-db-typed-confirm, then navigate the browser
      directly to "/app/keys". If the page shows an error message
      ("Something broke on this page" or similar), click the
      "Reload" button on that error card and wait 3 seconds before
      proceeding. Verify a heading "API keys" is visible.
      Use browser_snapshot for all verification (do NOT use
      browser_evaluate — it fails in this context).
      Click the "New key" button. A modal appears with the heading
      "Mint a new key". Type
        opencheck-smoke
      into the "Label (optional)" input and click the "Mint" button.
      The modal heading swaps to "Copy your new key" and a <code>
      block contains a string starting with "sk_live_". Click
      the "Done" button to close the dialog. Verify a key row with
      the label "opencheck-smoke" is now present in the list.
      Click "Revoke" on that row, then in the confirm dialog
      ("Revoke this key?") click the "Revoke" button. Verify the
      row moves to the "Revoked" group (the "Active" group no
      longer contains the "opencheck-smoke" row).

  - name: "#sign-out"
    case: |
      The browser is signed in from previous tests. Navigate directly
      to "/app". In the top navigation bar there is a direct "Sign
      out" button (no dropdown or user-menu needed — it is visible
      directly in the primary nav). Click it. Verify the URL is no
      longer "/app" and the "Sign out" button is no longer in the nav.

  - name: "#sign-in-again"
    case: |
      The previous test signed out. Navigate the browser directly
      to "/auth/sign-in". On the mock IdP form click the "Sign in as
      this user" button using browser_click (use browser_snapshot to
      find the button ref — do NOT use browser_evaluate). Wait for
      the URL path to become "/app". Use browser_snapshot ONLY — do
      NOT use browser_evaluate — to verify the sidebar shows at least
      one database row remaining from the prior session (its display
      name starts with "users").

  - name: "#delete-remaining-db"
    case: |
      The previous test signed in again. Delete ALL database entries in the sidebar
      whose names start with "users" (there may be one or more
      due to prior test runs). For each such entry: click its "×"
      button (aria-label starts with "Delete "), copy the exact
      name shown in the <code> block in the modal into the
      confirmation input (must match character-for-character,
      including spaces), click "Delete", and wait for the dialog
      to close before proceeding to the next. After all "users*"
      entries are gone, verify the sidebar's database list is
      empty (only the "All databases" item remains and the rail
      shows "No databases yet — create one." or no DB rows).
