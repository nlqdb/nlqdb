# E2E flow for nlqdb: anonymous → table-create → mutation-gate → mock-auth →
# authed-state-preserved → write → UX coverage (informative read, count,
# trace pane, vague prompt, missing-table, Cmd+K palette) → delete-row →
# second-db-create → delete-db-while-signed-in → sign-out →
# sign-in-again → delete-remaining-db. Covers SK-HDC-016 (typed-name
# confirm dialog) across both authed sessions so cleanup runs whether
# or not the session survived between deletes.
# Run by .github/workflows/e2e-opencheck.yml (workflow_dispatch — external scheduler).
#
# Runtime substitution: the caller workflow renders `__BASE_URL__` to the
# per-run preview alias via `sed` before invoking `bunx opencheck`.
#
# LLM: Mistral via OpenAI-compat (https://docs.mistral.ai/api/).
# Current: `mistral-small-latest`
# Budget: 50K TPM, ~1B tokens/month, 50 RPM, 128K ctx.
# Fallback: swap to Groq llama-3.3-70b-versatile + update OPENAI_BASE_URL in workflow.
#
# Pivot history (newest first — researched 2026-05-19):
#   9. mistral-small-latest [CURRENT] — Mistral; switched back from Groq — run #42:
#      llama-4-scout sends `submit: "true"` (string) for boolean browser_type param
#      → 400 tool call validation error → stale-ref spiral → 24-min test stuck.
#      Mistral handles JSON schema booleans correctly; 50 RPM is safe now that
#      pkill self-kill cascade is fixed.
#   8. meta-llama/llama-4-scout-17b-16e-instruct — Groq, 30K TPM, 500K TPD,
#      1000 RPM, 512K ctx; switched from Mistral for run #39: 50 RPM cascade in
#      run #38 (caused by pkill self-kill bug, now fixed)
#   7. mistral-small-latest — Mistral, 50K TPM, ~1B/month, 128K ctx,
#      50 RPM; switched from Groq after Groq TPD exhausted on run #32
#   6. meta-llama/llama-4-scout-17b-16e-instruct — Groq, 30K TPM, 500K TPD,
#      1000 RPM, 512K ctx; exhausted 500K TPD on single run #32 (2026-05-18)
#   5. llama-3.3-70b-versatile — Groq, 12K TPM, 100K TPD (not 1M as assumed)
#   4. openai/gpt-oss-120b — Groq, 8K TPM + hidden reasoning_tokens → 85-90s/call
#   3. llama-4-scout early — Groq, 500K TPD but quota drained by debug runs
#   2. OpenRouter qwen3-coder:free — 429 on first call; shared upstream pool
#   1. Gemini 2.5 Flash — 10 RPM ceiling; 75-87s silent-retry tax
#
# Top 5 free LLM models for agentic/tool-use (verified 2026-05-19 via live rate-limit API checks):
#   1. Groq meta-llama/llama-4-scout-17b-16e-instruct — 30K TPM, 1000 RPM, 500K TPD, 512K ctx; fastest ReAct; current
#   2. Mistral mistral-small-latest — 50K TPM, 50 RPM, ~1B/month, 128K ctx; huge monthly budget; RPM too low for agentic loops
#   3. Groq llama-3.3-70b-versatile — 12K TPM, 1000 RPM, 100K TPD, 128K ctx; stronger reasoning, tighter daily budget
#   4. Groq qwen/qwen3-32b — 6K TPM, 1000 RPM, 128K ctx; Qwen3 architecture; tight TPM rules it out as sole model
#   5. Cerebras llama3.1-8b — 30K TPM, 1M TPD, 5 RPM, 8K ctx (free cap); vast daily budget; 8K ctx too small for snapshots

baseUrl: "__BASE_URL__"
modelProvider: "openai"
model: "mistral-small-latest"

# Persistent session shares cookies + localStorage across tests so the
# agent doesn't have to re-walk the prereq chain from a clean profile
# every time.
sessionMode: "persistent"

timeout: 240000

# `video: false` — @playwright/mcp's --save-video shells out to ffmpeg
# which ubuntu-latest doesn't ship. Trace stays on (trace.playwright.dev).
recording:
  trace: true
  video: false

tests:
  - name: "#hero-or-cmdg"
    case: |
      Navigate to the base URL. Press Control+G (Cmd+G on Mac) to
      reveal the hero create form. After pressing the key, call
      browser_snapshot. The accessibility tree must contain a text
      input with placeholder "an orders tracker" — this input is
      inside a div that starts with the HTML `hidden` attribute and
      only appears in the snapshot after Control+G removes it. Use
      browser_snapshot to verify (not browser_evaluate or DOM
      queries, which can find hidden elements). If the input is
      absent from the snapshot, the test fails. (The waitlist email
      input has a different placeholder — do not confuse them.)

  - name: "#create-table-anon"
    case: |
      #hero-or-cmdg, then in the input with placeholder "an orders
      tracker" type
        create a users table with id, name, email
      and submit. Wait for the response. Call browser_snapshot and
      verify: text containing "Provisioned with" is visible in the
      result, and a table section headed "Users" with columns id,
      name, email is rendered.

  - name: "#add-row-redirects-to-auth"
    case: |
      The session is already on the marketing page with the hero
      create form visible (Control+G was pressed in a prior test and
      the form stayed open; a "Provisioned with" result is shown
      below the form). The text input with placeholder "an orders
      tracker" is now EMPTY — it was cleared after the previous
      submission. Do NOT navigate away from this page. Do NOT press
      Control+G again. Do NOT re-create the users table.
      Start by calling browser_snapshot to confirm the page state
      and get valid element refs for the current session.
      Click the text input (placeholder "an orders tracker") and type
        add a new row: name='Alice', email='alice@example.com'
      then press Enter (as a SEPARATE step after typing — do NOT use
      the submit parameter on browser_type). Wait for navigation.
      Verify the URL ends up containing "/auth/sign-in".
      Do not submit the sign-in form yet.

  - name: "#mock-sign-in"
    case: |
      The browser is currently on /auth/sign-in (the previous test
      ended there). Do NOT navigate away. Do NOT repeat the add-row
      step. The mock-IdP form is already visible with a default email
      field and a "Sign in as this user" button.
      Click "Sign in as this user". Wait for the URL path to become
      "/app" (possibly with a "?db=" query).

  - name: "#authed-state-preserved"
    case: |
      The browser just signed in and is on /app (possibly with a
      ?db= query param). Do NOT navigate away. Take a
      browser_snapshot and verify: the left sidebar shows at least
      one entry whose visible text contains "users" (any casing;
      does not need to be highlighted or aria-selected — just
      visible).

  - name: "#submit-prefilled-row"
    case: |
      The browser is currently on /app with a ?db= query parameter
      in the URL (e.g. /app/?db=db_users_info_XXXXXX). Do NOT call
      browser_navigate. Do NOT modify the URL. Do NOT go to /app
      without the ?db= param — that breaks the page. Stay exactly
      where you are. Click the chat textarea (placeholder "Ask about
      your data…"). If the textarea already contains "add a new row:
      name='Alice', email='alice@example.com'" submit it directly
      (press Enter or click Send). If the textarea is empty, type
      that prompt fresh and then submit. If a confirm/diff chip
      appears (e.g. "This will insert 1 row"), click the "Approve"
      button inside the dialog (do NOT type in the confirm input —
      click the button). If the response shows "Couldn't reach the
      database" or any connectivity error, wait 5 seconds and submit
      the same prompt again. Verify a row with name "Alice" and email
      "alice@example.com" appears in the users table.

  - name: "#read-shows-informative-data"
    case: |
      #submit-prefilled-row, then in the same chat input type
        list all users in the table
      and submit. Verify the chat reply has both: a data row with
      "Alice" / "alice@example.com", AND a natural-language summary
      sentence that mentions "Alice" or "1 user".

  - name: "#count-summarizes"
    case: |
      #read-shows-informative-data, then type
        how many users are there?
      and submit. Verify the reply surfaces the number 1, either in
      the summary text or as a single returned data cell.

  - name: "#trace-shows-sql"
    case: |
      #count-summarizes, then open the trace pane on the latest
      reply (click the "trace" summary, or press Ctrl+/). Verify a
      <pre> block containing SQL is visible — must contain "users"
      and a SQL keyword like SELECT or COUNT.

  - name: "#vague-question-handled"
    case: |
      #trace-shows-sql, then type
        anything interesting in here?
      and submit. Verify the reply is NOT a bare dead-end message
      like "Something went wrong — try again." Acceptable: data
      rows, a clarification chip with a button, or a textual reply
      referencing users / Alice / row count.

  - name: "#schema-mismatch-clarifies"
    case: |
      #vague-question-handled, then type
        show me all the orders
      and submit. There is no orders table — only users. Verify the
      reply is NOT a bare "Something went wrong — try again."
      Acceptable: a message naming the missing "orders" table or
      the available "users" table, or a clarification chip.

  - name: "#cmdk-palette-discoverable"
    case: |
      #schema-mismatch-clarifies, then press Ctrl+K (Cmd+K on Mac).
      Verify a modal appears with placeholder "Type a command…" and
      action labels including at least two of "New database",
      "Copy embed snippet", "API keys", "Sign out". Press Escape
      and verify the modal closes.

  - name: "#delete-row"
    case: |
      #cmdk-palette-discoverable, then type
        delete the row where name = 'Alice'
      and submit. If a confirm chip appears, approve it. Verify
      the Alice row is no longer present in the users table.

  - name: "#create-second-database"
    case: |
      #delete-row, then in the left sidebar (aria-label "Your
      databases") click the "+ New" button. A small form with a
      "Name" input appears. Type
        products-tracker
      into that input and click the "Create" button. Wait until
      the new database appears in the sidebar list. The new entry
      will be active (highlighted) and the chat header changes
      to its name. Verify the sidebar now shows at least two
      database entries below the "All databases" item.

  - name: "#delete-active-db-dialog-opens"
    case: |
      #create-second-database, then in the sidebar locate the
      currently active database row (the highlighted one, named
      something like "products tracker"). Click the "×" button at
      the right edge of that row (aria-label starts with "Delete ").
      Verify a modal dialog appears with the heading "Delete
      database" and body text that includes "This cannot be reverted"
      and a text input.

  - name: "#delete-active-db-typed-confirm"
    case: |
      #delete-active-db-dialog-opens. The dialog shows a database
      name in a <code> block next to a "Copy" button. Read the
      exact text inside that <code> block, then type that EXACT
      same text into the input field below it (it must match
      character-for-character including spaces). Once the input
      matches, the "Delete" button becomes enabled — click it.
      Verify the dialog closes and that database entry is gone
      from the sidebar list.

  - name: "#api-keys-mint-and-revoke"
    case: |
      #delete-active-db-typed-confirm, then navigate the browser
      directly to "/app/keys" (the dashboard's API-key page from
      SK-APIKEYS-012). Verify a heading "API keys" is visible.
      Click the "New key" button. A modal appears with the heading
      "Mint a new key". Type
        opencheck-smoke
      into the "Label (optional)" input and click the "Mint" button.
      The modal heading swaps to "Copy your new key" and a <code>
      block contains a string starting with "sk_live_". Click
      the "Done" button to close the dialog. Verify a key row with
      the label "opencheck-smoke" is now present in the list.
      Click "Revoke" on that row, then in the confirm dialog
      ("Revoke this key?") click the "Revoke" button. Verify the
      row moves to the "Revoked" group (the "Active" group no
      longer contains the "opencheck-smoke" row).

  - name: "#sign-out"
    case: |
      #api-keys-mint-and-revoke, then navigate back to "/app". In
      the top navigation bar there is a direct "Sign out" button
      (no dropdown or user-menu needed — it is visible directly in
      the primary nav). Click it. Verify the URL is no longer "/app"
      and the "Sign out" button is no longer in the nav.

  - name: "#sign-in-again"
    case: |
      #sign-out, then navigate the browser directly to the path
      "/auth/sign-in" (the topnav "Sign in" link is gated behind
      Cmd+G — going URL-direct is faster). On the mock IdP form
      submit it (default email "test@example.com", button "Sign
      in as this user"). Wait for the URL path to become "/app".
      Verify the sidebar shows at least one database row remaining
      from the prior session (its display name starts with
      "users").

  - name: "#delete-remaining-db"
    case: |
      #sign-in-again. Delete ALL database entries in the sidebar
      whose names start with "users" (there may be one or more
      due to prior test runs). For each such entry: click its "×"
      button (aria-label starts with "Delete "), copy the exact
      name shown in the <code> block in the modal into the
      confirmation input (must match character-for-character,
      including spaces), click "Delete", and wait for the dialog
      to close before proceeding to the next. After all "users*"
      entries are gone, verify the sidebar's database list is
      empty (only the "All databases" item remains and the rail
      shows "No databases yet — create one." or no DB rows).
