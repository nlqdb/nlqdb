# E2E flow for nlqdb: anonymous → table-create → mutation-gate → mock-auth →
# authed-state-preserved → write → UX coverage (informative read, count,
# trace pane, vague prompt, missing-table, Cmd+K palette) → delete → sign-out.
# Run by .github/workflows/e2e-opencheck.yml (workflow_dispatch — external scheduler).
#
# Runtime substitution: the caller workflow renders `__BASE_URL__` to the
# per-run preview alias (e.g. https://e2e-nlqdb-api.omer-hochman.workers.dev)
# via `sed` before invoking `bunx opencheck`. opencheck's YAML parser is
# literal-string (no env interpolation), so the placeholder is mechanical.
#
# LLM: Gemini via OpenAI-compat (https://ai.google.dev/gemini-api/docs/openai).
# opencheck delegates to LangChain `initChatModel(model, { modelProvider })`,
# which auto-loads `@langchain/openai`. ChatOpenAI reads OPENAI_API_KEY +
# OPENAI_BASE_URL — both wired in the reusable workflow env.

baseUrl: "__BASE_URL__"
modelProvider: "openai"
model: "gemini-2.5-flash"
sessionMode: "isolated"

# opencheck's default per-test timeout is 60_000 ms, but each test
# starts with `#prev, then ...` and the LLM agent walks the full
# prereq chain from scratch (sessionMode=isolated → no shared state).
# The deepest test (#sign-out) has 13 prereqs and consistently times
# out at exactly 60.0s under that default. 240_000 (4 min) gives
# headroom for the chain tail; tests at the head still finish in
# ~20s. Once opencheck's step cache warms on a stable tests.yaml,
# repeat runs land well under this ceiling.
timeout: 240000

# `video: false` because @playwright/mcp's --save-video path shells out
# to ffmpeg, which ubuntu-latest does not ship by default. Trace stays
# on (it's the workflow's documented triage path — drag trace.zip into
# trace.playwright.dev per `.github/workflows/_e2e-opencheck.yml`).
recording:
  trace: true
  video: false

tests:
  - name: "#hero-or-cmdg"
    case: |
      Visit the home page. If the chat composer/input is not visible, press
      Cmd+G (or Ctrl+G on Linux) to reveal the cmd+g-gated chat UI. Confirm a
      chat input element is now visible and ready to accept text.

  - name: "#create-table-anon"
    case: |
      #hero-or-cmdg, then type
        "create a users table with id, name, email"
      into the chat input and submit. Within 5 seconds either a `users`
      table should be rendered on the page, or a chat reply should confirm
      the table was created.

  - name: "#add-row-redirects-to-auth"
    case: |
      #create-table-anon, then type
        "add a new row: name='Alice', email='alice@example.com'"
      into the chat input and submit. The browser should be redirected to a
      sign-in page (URL path contains "/auth/sign-in"). Do NOT submit the
      sign-in form in this step.

  - name: "#mock-sign-in"
    case: |
      #add-row-redirects-to-auth, then on the /auth/sign-in page submit the
      mock-IdP form: leave the email field at its default of
      "test@example.com" and click the sign-in / submit button. Wait for the
      browser to land on /app.

  - name: "#authed-state-preserved"
    case: |
      #mock-sign-in, then on /app verify BOTH conditions hold:
        (a) the users database created during the anonymous flow is the
            currently focused / selected database (visible in the sidebar
            or db selector), and
        (b) the chat input is pre-filled with the "add a new row" command
            that was typed before the auth redirect.

  - name: "#submit-prefilled-row"
    case: |
      #authed-state-preserved, then submit the pre-filled query in the chat
      input (Enter, or click the Send button). Within 5 seconds a new row
      with name "Alice" and email "alice@example.com" should be visible in
      the users table.

  # ----- UX coverage: "useful and informative with the least steps-to-value"
  # The block below tests REPLY QUALITY rather than functional plumbing —
  # each step asserts the reply itself is informative or that a vague /
  # error-y prompt produces an actionable next step instead of a dead end.

  - name: "#read-shows-informative-data"
    case: |
      #submit-prefilled-row, then type
        "list all users in the table"
      into the chat input and submit. Within 8 seconds verify BOTH:
        (a) a row with name "Alice" and email "alice@example.com" is
            visible in the rendered result rows, and
        (b) the assistant's natural-language reply text (the summary
            sentence(s) above or next to the data table — NOT the
            cell values themselves) explicitly mentions either
            "Alice" or "1 user" / "one user" — proving the summary
            actually describes the data instead of a generic phrase
            like "here are your results" or "your query ran".

  - name: "#count-summarizes"
    case: |
      #read-shows-informative-data, then type
        "how many users are there?"
      into the chat input and submit. Within 8 seconds verify the
      assistant's reply mentions the number 1 (the row count) —
      either inside the natural-language summary text (e.g. "There
      is 1 user.") or as the single returned data cell.

  - name: "#trace-shows-sql"
    case: |
      #count-summarizes, then reveal the trace pane for the most
      recent assistant reply. The pane is a collapsed "trace"
      disclosure on each reply with a "Cmd+/" affordance label;
      either click the trace summary on the latest reply OR press
      Cmd+/ (Ctrl+/ on Linux) to open it. Within 5 seconds verify
      the rendered SQL is visible — it should contain the word
      "users" (case-insensitive) and a SQL keyword such as SELECT
      or COUNT.

  - name: "#vague-question-handled"
    case: |
      #trace-shows-sql, then type
        "anything interesting in here?"
      into the chat input and submit. Within 10 seconds verify the
      chat does NOT display a dead-end failure like "Something went
      wrong", "That query was rejected", or "Couldn't generate a
      plan" with no follow-up affordance. ACCEPTABLE replies are
      any of:
        (a) rendered data rows from the users table with a summary,
        (b) a clarification chip prompting a next action (e.g.
            "Looks like you want to create something new" or "Which
            database did you mean?") with at least one clickable
            button,
        (c) a non-error textual reply that references the users
            table, the row count, or Alice.
      The point: a vague prompt produces SOME useful next step,
      never a dead end.

  - name: "#schema-mismatch-clarifies"
    case: |
      #vague-question-handled, then type
        "show me all the orders"
      (there is NO orders table in this database — only users) into
      the chat input and submit. Within 10 seconds verify the chat
      reply does NOT contain the bare string "Something went wrong"
      with no extra context. ACCEPTABLE replies are any of:
        (a) text that explicitly references the missing "orders"
            table OR the available "users" table (e.g. "no orders
            table", "the database doesn't have an orders table",
            "did you mean users?"),
        (b) a clarification chip offering to create a new database /
            table or rephrase,
        (c) a typed "schema mismatch" / "table not found" style
            message that names the issue.
      A generic dead-end without an actionable next step should NOT
      be considered passing.

  - name: "#cmdk-palette-discoverable"
    case: |
      #schema-mismatch-clarifies, then press Cmd+K (Ctrl+K on
      Linux) to open the command palette. Within 3 seconds verify a
      modal / overlay appears with a "Type a command…" input and a
      list of actions — it should show at least two of these labels
      (case-insensitive substring match is fine): "New database",
      "Copy embed snippet", "Settings", "Sign out". Then press
      Escape to close the palette and verify the chat composer
      input is visible and focusable again (the page is back to the
      pre-palette state).

  - name: "#delete-row"
    case: |
      #cmdk-palette-discoverable, then type
        "delete the row where name = 'Alice'"
      into the chat input and submit. Within 5 seconds the Alice row should
      no longer be present in the users table.

  - name: "#sign-out"
    case: |
      #delete-row, then sign out (open the topnav user menu and click the
      "Sign out" item). Confirm the topnav switches to an unauthenticated
      state and the URL is no longer /app.
