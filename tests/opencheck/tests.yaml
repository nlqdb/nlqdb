# E2E flow for nlqdb: anonymous → table-create → mutation-gate → mock-auth →
# authed-state-preserved → write → UX coverage (informative read, count,
# trace pane, vague prompt, missing-table, Cmd+K palette) → delete-row →
# second-db-create → delete-db-while-signed-in → sign-out →
# sign-in-again → delete-remaining-db. Covers SK-HDC-016 (typed-name
# confirm dialog) across both authed sessions so cleanup runs whether
# or not the session survived between deletes.
# Run by .github/workflows/e2e-opencheck.yml (workflow_dispatch — external scheduler).
#
# Runtime substitution: the caller workflow renders `__BASE_URL__` to the
# per-run preview alias via `sed` before invoking `bunx opencheck`.
#
# LLM: Groq via OpenAI-compat (https://console.groq.com/docs/openai).
# Current: `meta-llama/llama-4-scout-17b-16e-instruct`
# Cold-cache run: ~360 K tokens (20 tests × ~6 calls × 3 K tokens with snapshot
# truncation). Budget: 500 K TPD — leaves ~140 K headroom for a debug pass.
# Fallback: swap model line to `llama-3.3-70b-versatile` (12 K TPM, 100 K TPD).
#
# Pivot history (newest first — researched 2026-05-18):
#   6. meta-llama/llama-4-scout-17b-16e-instruct [CURRENT] — Groq, 30K TPM, 500K TPD,
#      1000 RPM, 512K ctx, function calling, best free agent model 2026-05-18
#   5. llama-3.3-70b-versatile — Groq, 12K TPM, 100K TPD (not 1M as assumed); one
#      cold run exhausts daily quota
#   4. openai/gpt-oss-120b — Groq, 8K TPM + hidden reasoning_tokens → 85-90s/call
#   3. llama-4-scout early — Groq, 500K TPD but quota drained by debug runs
#   2. OpenRouter qwen3-coder:free — 429 on first call; shared upstream pool
#   1. Gemini 2.5 Flash — 10 RPM ceiling; 75-87s silent-retry tax
#
# Top 5 free LLM models for agentic/tool-use (verified 2026-05-18):
#   1. Groq meta-llama/llama-4-scout-17b-16e-instruct — 30K TPM, 500K TPD, 512K ctx, fast ReAct; our primary
#   2. Mistral mistral-small-latest — 50K TPM, 50 RPM, ~1B tokens/month, 128K ctx; best TPM headroom
#   3. Groq llama-3.3-70b-versatile — 12K TPM, 100K TPD, 128K ctx; stronger reasoning, tighter daily budget
#   4. Cerebras llama3.1-8b — 30K TPM, 1M TPD, 5 RPM, 8K ctx (free cap); high daily but RPM+ctx constrained
#   5. NVIDIA NIM meta/llama-3.1-70b-instruct — credits-based, 40 RPM, 128K ctx; reliable fallback

baseUrl: "__BASE_URL__"
modelProvider: "openai"
model: "meta-llama/llama-4-scout-17b-16e-instruct"

# Persistent session shares cookies + localStorage across tests so the
# agent doesn't have to re-walk the prereq chain from a clean profile
# every time.
sessionMode: "persistent"

timeout: 240000

# `video: false` — @playwright/mcp's --save-video shells out to ffmpeg
# which ubuntu-latest doesn't ship. Trace stays on (trace.playwright.dev).
recording:
  trace: true
  video: false

tests:
  - name: "#hero-or-cmdg"
    case: |
      Navigate to the base URL. Press Ctrl+G (Cmd+G on Mac) to reveal
      the cmd+g-gated hero. The page's #hero-gate div starts with the
      HTML `hidden` attribute; Ctrl+G removes it. After pressing the
      key, call browser_evaluate with
        document.getElementById('hero-gate')?.hidden
      — it must return false. Then call browser_snapshot and confirm
      a text input with placeholder "an orders tracker" appears in
      the accessibility tree. (The waitlist email input is not the
      target — its placeholder is different.)

  - name: "#create-table-anon"
    case: |
      #hero-or-cmdg, then in the input with placeholder "an orders
      tracker" type
        create a users table with id, name, email
      and submit. Wait for the response. Use browser_evaluate to
      verify the result:
        document.querySelector('.createresult__schema')?.textContent
      must contain "Provisioned with". Also verify a "Users" table
      heading appears by checking
        document.querySelector('.createresult__table-name')?.textContent
      contains "Users" (case-insensitive). id, name, email columns
      should be present.

  - name: "#add-row-redirects-to-auth"
    case: |
      #create-table-anon, then clear that same input and type
        add a new row: name='Alice', email='alice@example.com'
      and submit. Verify the URL ends up containing "/auth/sign-in".
      Do not submit the sign-in form yet.

  - name: "#mock-sign-in"
    case: |
      #add-row-redirects-to-auth, then on /auth/sign-in submit the
      mock-IdP form (default email "test@example.com", button "Sign
      in as this user"). Wait for the URL path to become "/app"
      (possibly with a "?db=" query).

  - name: "#authed-state-preserved"
    case: |
      #mock-sign-in, then on /app verify both: a sidebar database
      whose name starts with "users" is highlighted as selected,
      AND the main chat input (placeholder "Ask about your data…")
      is pre-filled with "add a new row: name='Alice', email='alice@example.com'".

  - name: "#submit-prefilled-row"
    case: |
      #authed-state-preserved, then press Enter (or click "Send")
      to submit the pre-filled prompt. If a confirm/diff chip
      appears (e.g. "This will insert 1 row"), press Enter again
      or click "Approve". Verify a row with name "Alice" and email
      "alice@example.com" appears in the users table.

  - name: "#read-shows-informative-data"
    case: |
      #submit-prefilled-row, then in the same chat input type
        list all users in the table
      and submit. Verify the chat reply has both: a data row with
      "Alice" / "alice@example.com", AND a natural-language summary
      sentence that mentions "Alice" or "1 user".

  - name: "#count-summarizes"
    case: |
      #read-shows-informative-data, then type
        how many users are there?
      and submit. Verify the reply surfaces the number 1, either in
      the summary text or as a single returned data cell.

  - name: "#trace-shows-sql"
    case: |
      #count-summarizes, then open the trace pane on the latest
      reply (click the "trace" summary, or press Ctrl+/). Verify a
      <pre> block containing SQL is visible — must contain "users"
      and a SQL keyword like SELECT or COUNT.

  - name: "#vague-question-handled"
    case: |
      #trace-shows-sql, then type
        anything interesting in here?
      and submit. Verify the reply is NOT a bare dead-end message
      like "Something went wrong — try again." Acceptable: data
      rows, a clarification chip with a button, or a textual reply
      referencing users / Alice / row count.

  - name: "#schema-mismatch-clarifies"
    case: |
      #vague-question-handled, then type
        show me all the orders
      and submit. There is no orders table — only users. Verify the
      reply is NOT a bare "Something went wrong — try again."
      Acceptable: a message naming the missing "orders" table or
      the available "users" table, or a clarification chip.

  - name: "#cmdk-palette-discoverable"
    case: |
      #schema-mismatch-clarifies, then press Ctrl+K (Cmd+K on Mac).
      Verify a modal appears with placeholder "Type a command…" and
      action labels including at least two of "New database",
      "Copy embed snippet", "API keys", "Sign out". Press Escape
      and verify the modal closes.

  - name: "#delete-row"
    case: |
      #cmdk-palette-discoverable, then type
        delete the row where name = 'Alice'
      and submit. If a confirm chip appears, approve it. Verify
      the Alice row is no longer present in the users table.

  - name: "#create-second-database"
    case: |
      #delete-row, then in the left sidebar (aria-label "Your
      databases") click the "+ New" button. A small form with a
      "Name" input appears. Type
        products-tracker
      into that input and click the "Create" button. Wait until
      the new database appears in the sidebar list. The new entry
      will be active (highlighted) and the chat header changes
      to its name. Verify the sidebar now shows at least two
      database entries below the "All databases" item.

  - name: "#delete-active-db-dialog-opens"
    case: |
      #create-second-database, then in the sidebar locate the
      currently active database row (the highlighted one, named
      something like "products tracker"). Click the "×" button at
      the right edge of that row (aria-label starts with "Delete ").
      Verify a modal dialog appears with the heading "Delete
      database" and body text that includes "This cannot be reverted"
      and a text input.

  - name: "#delete-active-db-typed-confirm"
    case: |
      #delete-active-db-dialog-opens. The dialog shows a database
      name in a <code> block next to a "Copy" button. Read the
      exact text inside that <code> block, then type that EXACT
      same text into the input field below it (it must match
      character-for-character including spaces). Once the input
      matches, the "Delete" button becomes enabled — click it.
      Verify the dialog closes and that database entry is gone
      from the sidebar list.

  - name: "#api-keys-mint-and-revoke"
    case: |
      #delete-active-db-typed-confirm, then navigate the browser
      directly to "/app/keys" (the dashboard's API-key page from
      SK-APIKEYS-012). Verify a heading "API keys" is visible.
      Click the "New key" button. A modal appears with the heading
      "Mint a new key". Type
        opencheck-smoke
      into the "Label (optional)" input and click the "Mint" button.
      The modal heading swaps to "Copy your new key" and a <code>
      block contains a string starting with "sk_live_". Click
      the "Done" button to close the dialog. Verify a key row with
      the label "opencheck-smoke" is now present in the list.
      Click "Revoke" on that row, then in the confirm dialog
      ("Revoke this key?") click the "Revoke" button. Verify the
      row moves to the "Revoked" group (the "Active" group no
      longer contains the "opencheck-smoke" row).

  - name: "#sign-out"
    case: |
      #api-keys-mint-and-revoke, then navigate back to "/app", open
      the topnav user menu and click "Sign out". Verify the URL is
      no longer "/app" and the topnav shows a "Sign in" link instead
      of the user menu.

  - name: "#sign-in-again"
    case: |
      #sign-out, then navigate the browser directly to the path
      "/auth/sign-in" (the topnav "Sign in" link is gated behind
      Cmd+G — going URL-direct is faster). On the mock IdP form
      submit it (default email "test@example.com", button "Sign
      in as this user"). Wait for the URL path to become "/app".
      Verify the sidebar shows at least one database row remaining
      from the prior session (its display name starts with
      "users").

  - name: "#delete-remaining-db"
    case: |
      #sign-in-again, then in the sidebar click the "×" button on
      the remaining database row whose name starts with "users"
      (aria-label "Delete users…"). When the modal opens, copy the
      exact name from the <code> block into the confirmation input,
      then click "Delete". Verify the dialog closes and the
      sidebar's database list is now empty (only the "All
      databases" item remains; the rail shows "No databases yet —
      create one." or no DB rows).
